        const PAUSE_REASONS = ["Almoço / Refeição", "Chuva / Tempo Ruim", "Quebra de Equipamento", "Logística / Deslocamento", "Interferência de Munícipe", "Abastecimento", "Suspensão Rede (COPEL)", "Outros"];

        // ✅ GERAR ID ÚNICO MD5
        const generateTreeId = (species, cap, lat, lng) => {
            const normalized = `${species.trim().toUpperCase()}_${parseFloat(cap).toFixed(1)}_${parseFloat(lat).toFixed(4)}_${parseFloat(lng).toFixed(4)}`;
            return CryptoJS.MD5(normalized).toString().substring(0, 12).toUpperCase();
        };

        const formatDuration = (totalSeconds) => {
            const s = Math.max(0, totalSeconds);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        };

        const Card = ({ children, className = "" }) => (

        );

        const Label = ({ children, required }) => (

                {children} {required && <span className="text-red-500">*</span>}

        const PhotoUpload = ({ label, help, preview, onCapture, icon = "fa-camera", fullWidth = false }) => (

                    </div>
                )}

            </label>
        );

        const App = () => {
            const [view, setView] = useState('loading');
            const [shift, setShift] = useState({
                rt: '', tst: '', operador: '', placa: '', auxiliares: [''], placaAux: '',
                foto_unificada: null, journeyStartTime: null, journeyEndTime: null, journeyDate: null
            });
            const [activeAction, setActiveAction] = useState(null);
            const [logs, setLogs] = useState([]);
            const [gps, setGps] = useState({ lat: null, lng: null });
            const [elapsed, setElapsed] = useState(0);
            const [pauseElapsed, setPauseElapsed] = useState(0);
            const [journeyElapsed, setJourneyElapsed] = useState(0);
            const [showEndConfirm, setShowEndConfirm] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [downloadedBlob, setDownloadedBlob] = useState(null);

            // --- SYNC QUEUE SYSTEM (BLINDAGEM TOTAL) ---
            const [syncQueue, setSyncQueue] = useState([]);
            const [isSyncing, setIsSyncing] = useState(false);
            const [onlineStatus, setOnlineStatus] = useState(navigator.onLine);

            // 🔐 NOTA SOBRE SEGURANÇA: Esta chave anon requer RLS ativado no Supabase.

            const getFreshGPS = () => {
                return new Promise((resolve) => {
                    if (!navigator.geolocation) return resolve(gps);
                    navigator.geolocation.getCurrentPosition(
                        (pos) => resolve({ lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6), accuracy: pos.coords.accuracy }),
                        (err) => {
                            console.warn("⚠️ GPS alta precisão falhou:", err);
                            resolve(gps);
                        },
                        { enableHighAccuracy: true, maximumAge: 0, timeout: 10000 }
                    );
                });
            };

            // processador de fila (Centralizado e Robustecido)
            useEffect(() => {
                const processQueue = async () => {
                    if (!onlineStatus || syncQueue.length === 0 || isSyncing) return;
                    setIsSyncing(true);

                    const item = syncQueue[0];

                    if ((item.attempts || 0) >= 5) {
                        console.error("⛔ ITEM DESCARTADO (FALHAS):", item);
                        const failed = await idbKeyval.get('mcr_failed_sync_v21') || [];
                        await idbKeyval.set('mcr_failed_sync_v21', [...failed, { ...item, error: 'Max attempts' }]);
                        setSyncQueue(prev => prev.slice(1));
                        setIsSyncing(false);
                        return;
                    }

                    try {
                        if (item.type === 'IMAGE_UPLOAD') {
                            const { path, base64 } = item.payload;
                            // Conversão eficiente de Base64 para Blob
                            const arr = base64.split(','), mime = arr[0].match(/:(.*?);/)[1], bstr = atob(arr[1]);
                            let n = bstr.length, u8arr = new Uint8Array(n);
                            while (n--) u8arr[n] = bstr.charCodeAt(n);
                            const blob = new Blob([u8arr], { type: mime });

                            const { error } = await supabaseClient.storage.from('evidencias').upload(path, blob, { upsert: true });
                            if (error) throw error;
                        }
                        else if (item.type === 'DB_INSERT' || item.type === 'DB_UPDATE' || item.type === 'CLOSE_SHIFT') {
                            const { table, data } = item.payload;
                            // Mapeamento robusto de tabelas
                            const targetTable = (table === 'tb_turnos' || table === 'shifts') ? 'shifts' :
                                (table === 'tb_manejos' || table === 'logs') ? 'logs' :
                                    (table === 'tb_pausas') ? 'tb_pausas' : table;

                            const { error } = await supabaseClient.from(targetTable).upsert(data);
                            if (error) throw error;
                            if (item.logUid) {
                                setLogs(prev => prev.map(l => l.uid === item.logUid ? { ...l, synced: true } : l));
                            }
                        }

                        setSyncQueue(prev => {
                            const newQueue = prev.slice(1);
                            idbKeyval.set('mcr_sync_queue_v21', newQueue);
                            return newQueue;
                        });
                    } catch (err) {
                        console.error("❌ ERRO NO ITEM:", err.message);
                        setSyncQueue(prev => {
                            const newQueue = [...prev];
                            newQueue[0].attempts = (newQueue[0].attempts || 0) + 1;
                            idbKeyval.set('mcr_sync_queue_v21', newQueue);
                            return newQueue;
                        });
                    } finally {
                        setIsSyncing(false);
                    }
                };

                const interval = setInterval(processQueue, 1500); // Mais rápido (1.5s)
                return () => clearInterval(interval);
            }, [syncQueue, isSyncing, onlineStatus]);

            const addToSyncQueue = async (type, payload, logUid = null) => {
                const newItem = { id: Date.now() + Math.random(), type, payload, logUid, attempts: 0, timestamp: new Date().toISOString() };
                setSyncQueue(prev => {
                    const newQueue = [...prev, newItem];
                    idbKeyval.set('mcr_sync_queue_v21', newQueue);
                    return newQueue;
                });
            };


            useEffect(() => {
                const handleBeforeUnload = (e) => {
                    if (syncQueue.length > 0) {
                        e.preventDefault();
                        e.returnValue = "⚠️ DADOS NÃO ENVIADOS! SAIR AGORA É CONSIDERADO FALTA GRAVE.";
                        return e.returnValue;
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);
            }, [syncQueue]);

            useEffect(() => {
                const load = async () => {

                    try {
                        const s = await idbKeyval.get('mcr_shift_v21_oficial');
                        const a = await idbKeyval.get('mcr_active_v21_oficial');
                        const l = await idbKeyval.get('mcr_logs_v21_oficial') || [];
                        const q = await idbKeyval.get('mcr_sync_queue_v21') || [];

                        if (s) setShift(s);
                        setSyncQueue(q);

                        // RECUPERAÇÃO DE ESTADO (CRASH/RELOAD)
                        if (a) {
                            setActiveAction(a);
                            // Recalcula tempo decorrido desde o crash
                            const now = Date.now();
                            if (a.executionStartTime) {
                                // Se estava em execução, o tempo continua contando
                                setElapsed(Math.floor((now - a.executionStartTime) / 1000));
                            } else if (a.startTime) {
                                setElapsed(Math.floor((now - a.startTime) / 1000));
                            }
                        }

                        setLogs(l);

                        // CHECK DE INTEGRIDADE (ANTI-SABOTAGEM)
                        const lastExitSafety = localStorage.getItem('mcr_safety_exit');
                        if (lastExitSafety === 'unsafe' && s?.active) {
                            alert("⚠️ ALERTA DE SEGURANÇA \n\nA última sessão foi encerrada incorretamente ou os dados foram limpos sem envio.\nIsso foi registrado no log de auditoria do sistema.");
                        }
                        localStorage.setItem('mcr_safety_exit', 'unsafe'); // Marca como insegura até que faça logout correto

                        setView(s?.active ? (a ? (a.type === 'tree' && a.executionStartTime ? 'active_service' : 'tree_form') : 'dashboard') : 'setup');
                    } catch (err) { setView('setup'); }
                };
                load();
            }, []);

            useEffect(() => {
                const timer = setInterval(() => {
                    if (shift?.active && shift?.journeyStartTime) {
                        const now = shift.journeyEndTime || Date.now();
                        setJourneyElapsed(Math.floor((now - shift.journeyStartTime) / 1000));
                    }
                    if (activeAction) {
                        const baseTime = activeAction.executionStartTime || activeAction.startTime;
                        if (baseTime) {
                            setElapsed(Math.floor((Date.now() - baseTime) / 1000));
                        }

                        if (activeAction.isPaused && activeAction.pauseStartTime) {
                            setPauseElapsed(Math.floor((Date.now() - activeAction.pauseStartTime) / 1000));
                        }
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [activeAction, shift.active, shift.journeyStartTime, shift.journeyEndTime]);

            useEffect(() => {
                if (shift?.active) idbKeyval.set('mcr_shift_v21_oficial', shift);
                if (activeAction) idbKeyval.set('mcr_active_v21_oficial', activeAction);
                else idbKeyval.del('mcr_active_v21_oficial');
                idbKeyval.set('mcr_logs_v21_oficial', logs);
            }, [shift, activeAction, logs]);

            // ✅ BLINDAGEM TOTAL: BACKUP DE ESTADO A CADA 1 MINUTO
            useEffect(() => {
                const interval = setInterval(() => {
                    if (shift?.active) {
                        const safePlaca = (shift.placa || 'SEM_PLACA').replace(/[^a-zA-Z0-9]/g, '');
                        const backupState = {
                            shift: shift,
                            logs: logs,
                            activeAction: activeAction,
                            lastUpdate: new Date().toISOString()
                        };
                        const blob = new Blob([JSON.stringify(backupState, null, 2)], { type: 'application/json' });
                        const fileName = `ESTADO_TEMPO_REAL/${safePlaca}_LATEST.json`;

                        supabaseClient.storage.from('backups_zip').upload(fileName, blob, { upsert: true })
                            .then(() => console.log("Backup de Estado OK"))
                            .catch(err => console.warn("Erro Backup Estado:", err));
                    }
                }, 60000); // 60 segundos
                return () => clearInterval(interval);
            }, [shift, logs, activeAction]);

            useEffect(() => {
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => setGps({ lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) }),
                    (err) => console.log(err),
                    { enableHighAccuracy: true }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            // --- FUNÇÕES DE SUPORTE (EXTRACÃO DE METADADOS E PROCESSAMENTO) ---
            const getExifData = (file) => {
                return new Promise((resolve) => {
                    EXIF.getData(file, function () {
                        const allTags = EXIF.getAllTags(this);
                        const convertDMSToDD = (dms, ref) => {
                            if (!dms) return null;
                            let dd = dms[0] + dms[1] / 60 + dms[2] / 3600;
                            if (ref === "S" || ref === "W") dd = dd * -1;
                            return dd;
                        };
                        resolve({
                            dateTime: allTags.DateTimeOriginal || allTags.DateTime,
                            lat: convertDMSToDD(allTags.GPSLatitude, allTags.GPSLatitudeRef),
                            lng: convertDMSToDD(allTags.GPSLongitude, allTags.GPSLongitudeRef),
                            make: allTags.Make,
                            model: allTags.Model
                        });
                    });
                });
            };

            const processPhoto = async (file, photoType = 'GENERICO') => {
                if (!file) return null;

                // 1. Extração de GPS do EXIF antes de qualquer compressão
                let photoGps = null;
                try {
                    photoGps = await new Promise((resolve) => {
                        EXIF.getData(file, function () {
                            const tags = EXIF.getAllTags(this);
                            if (tags.GPSLatitude && tags.GPSLongitude) {
                                const convert = (dms, ref) => {
                                    let dd = dms[0] + dms[1] / 60 + dms[2] / 3600;
                                    return (ref === "S" || ref === "W") ? dd * -1 : dd;
                                };
                                resolve({ lat: convert(tags.GPSLatitude, tags.GPSLatitudeRef), lng: convert(tags.GPSLongitude, tags.GPSLongitudeRef) });
                            } else resolve(null);
                        });
                    });
                } catch (e) { console.warn("Erro EXIF:", e); }

                // 2. Fallback para GPS sob demanda (Se não houver no EXIF)
                if (!photoGps) photoGps = await getFreshGPS();

                const options = { maxSizeMB: 0.8, maxWidthOrHeight: 1280, useWebWorker: true };
                try {
                    const compressedFile = await imageCompression(file, options);
                    const base64 = await imageCompression.getDataUrlFromFile(compressedFile);
                    const storagePath = `${shift.id}/${photoType}_${Date.now()}_${Math.random().toString(36).substring(7)}.jpg`;

                    addToSyncQueue('IMAGE_UPLOAD', { path: storagePath, base64 });

                    return {
                        base64, localPreview: base64, storagePath,
                        metadata: { gps_lat: photoGps.lat, gps_lng: photoGps.lng, timestamp: new Date().toISOString() }
                    };
                } catch (e) {
                    console.error("Erro img:", e);
                    return null;
                }
            };

            // --- SISTEMA DE ENVIO SaaS (TABELAS RELACIONAIS) ---
            const pushToSupabase = async (logItem) => {
                // Se for PAUSA
                if (logItem.status === 'PAUSA') {
                    const freshGps = await getFreshGPS();
                    const pausaPayload = {
                        id_turno: shift.id_banco,
                        motivo: logItem.tempPauseReason,
                        descricao_detalhada: logItem.customPauseReason,
                        inicio: new Date(logItem.pauseStartTime).toISOString(),
                        fim: new Date(logItem.endTime).toISOString(),
                        duracao_seg: logItem.durationSec,
                        foto_evidencia: logItem.tempPausePhoto?.storagePath,
                        coords_lat: freshGps.lat,
                        coords_lng: freshGps.lng
                    };
                    addToSyncQueue('DB_INSERT', { table: 'tb_pausas', data: pausaPayload }, logItem.uid);
                    return;
                }

                // Se for MANEJO (Árvore)
                let finalLat = gps.lat;
                let finalLng = gps.lng;
                let finalTime = new Date(logItem.startTime || Date.now()).toISOString();

                const allPhotos = [...(logItem.photosBefore || []), ...(logItem.photosAfter || []), logItem.photoProblem].filter(p => p && p.metadata);
                const photoWithGps = allPhotos.find(p => p.metadata.gps_lat && p.metadata.gps_lng);

                if (photoWithGps) {
                    finalLat = photoWithGps.metadata.gps_lat;
                    finalLng = photoWithGps.metadata.gps_lng;
                    if (photoWithGps.metadata.originalDate) {
                        const d = new Date(photoWithGps.metadata.originalDate);
                        if (!isNaN(d.getTime())) finalTime = d.toISOString();
                    }
                } else {
                    const fresh = await getFreshGPS();
                    finalLat = fresh.lat;
                    finalLng = fresh.lng;
                }

                const manejoPayload = {

                    duration_sec: logItem.durationSec,
                    coords_lat: finalLat,
                    coords_lng: finalLng,
                    status: logItem.status,

            const stats = useMemo(() => {

                const journeySec = journeyElapsed;
                const logisticSec = Math.max(0, journeySec - hmTotalEfetivo);

                return {
                    work: hmTotalEfetivo,
                    preparo: totalFormSec,
                    manejo: totalManejoPuroSec,
                    logistics: logisticSec,
                    journey: journeySec,

                        <Card className="border-2 border-audit-600 bg-emerald-50">
                            <Label required>3 Fotos de Antes</Label>
                            <div className="grid grid-cols-3 gap-2 mb-2">
                                {[0, 1, 2].map(i => <PhotoUpload key={i} label={`F${i + 1}`} preview={activeAction.photosBefore?.[i]} onCapture={async f => {
                                    const processed = await processPhoto(f, `ANTES_${i + 1}`);
                                    setActiveAction(prev => {
                                        const list = [...(prev.photosBefore || [])];
                                        list[i] = processed;
                                        return { ...prev, photosBefore: list };
                                    });
                                }} />)}
                            </div>
                            {activeAction.status === 'IMPEDIDO' ? (
                                <button disabled={!activeAction.species || !activeAction.problemReport || !activeAction.photoProblem} onClick={async () => {
                                    const fresh = await getFreshGPS();
                                    const treeId = generateTreeId(activeAction.species, activeAction.cap || 0, fresh.lat, fresh.lng);
                                    const log = {
                                        ...activeAction,
                                        treeId,
                                        uid: Date.now() + "_" + Math.random(),
                                        synced: false,
                                        endTime: Date.now(),
                                        status: 'IMPEDIDO',
                                        coords: `${fresh.lat},${fresh.lng}`,
                                        timestamp: new Date().toISOString()
                                    };
                                    setLogs([log, ...logs]);
                                    await pushToSupabase(log);
                                    setActiveAction(null);
                                    setView('dashboard');
                                }} className="w-full mt-4 py-6 rounded-3xl bg-red-600 text-white font-black uppercase text-xl shadow-lg disabled:opacity-50">Registrar Impedimento</button>
                            ) : (
                                <button disabled={!activeAction.species || !activeAction.cap || !activeAction.height || (!isCorteFixo && !activeAction.pruningTypes?.length) || (isOsRequired && !activeAction.osId) || (activeAction.photosBefore?.filter(p => p).length < 3)} onClick={async () => {
                                    try {
                                        const fresh = await getFreshGPS();
                                        const now = Date.now();
                                        const treeId = generateTreeId(activeAction.species, activeAction.cap, fresh.lat, fresh.lng);
                                        const duplicate = logs.find(l => l.treeId === treeId && l.type === 'tree');
                                        let newActionState = null;

                                        if (duplicate) {
                                            const msg = `⚠️ ÁRVORE JÁ REGISTRADA HOJE!\n\nID: ${treeId}\nEspécie: ${activeAction.species}\n\nO que deseja fazer?`;
                                            if (confirm(msg + "\n\n[OK] = CONTINUAR O SERVIÇO ANTERIOR\n[CANCELAR] = É OUTRA ÁRVORE IGUAL")) {
                                                newActionState = {
                                                    ...activeAction,
                                                    ...duplicate,
                                                    photosBefore: activeAction.photosBefore?.length ? activeAction.photosBefore : duplicate.photosBefore,
                                                    isContinuation: true,
                                                    executionStartTime: now,
                                                    formDurationSec: (duplicate.formDurationSec || 0) + Math.floor((now - activeAction.startTime) / 1000),
                                                    treeCoords: `${fresh.lat},${fresh.lng}`
                                                };
                                                setLogs(logs.filter(l => l.treeId !== treeId));
                                            }
                                        }

                                        if (!newActionState) {
                                            newActionState = {
                                                ...activeAction,
                                                treeId,
                                                type: 'tree',
                                                executionStartTime: now,
                                                formDurationSec: Math.floor((now - activeAction.startTime) / 1000),
                                                desc: `${activeAction.species} [${activeAction.osId || (activeAction.pruningTypes?.[0] || 'MANEJO')}]`,
                                                treeCoords: `${fresh.lat},${fresh.lng}`,
                                                pruningTypes: activeAction.pruningTypes || []
                                            };
                                        }

                                        setActiveAction(newActionState);
                                        setView('active_service');
                                    } catch (err) { alert("Erro: " + err.message); }
                                }} className="w-full mt-4 py-6 rounded-3xl bg-audit-600 text-white font-black uppercase text-xl shadow-lg disabled:opacity-50">Iniciar Manejo</button>
                            )}
                        </Card>
                    </div>
                );
            }

            if (view === 'active_service') {
                if (!activeAction) {
                    setTimeout(() => setView('dashboard'), 0);
                    return null;
                }
                const totalElapsed = elapsed - (activeAction.totalPausedSeconds || 0);
                return (
                    <div className="p-6 screen-fade flex flex-col min-h-screen no-scrollbar">
                        <div className="text-center mt-6"><span className="bg-audit-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Execução em Curso</span><h2 className="text-xl font-black text-slate-800 uppercase mt-5 leading-tight">{activeAction.desc}</h2><p className="text-xs text-slate-400 font-mono mt-2">ID: {activeAction.treeId}</p></div>
                        <div className="flex-1 flex flex-col justify-center items-center"><div className="text-7xl font-black text-slate-900 timer-glow leading-none font-mono tracking-tighter">{formatDuration(totalElapsed)}</div></div>
                        <div className="mt-auto space-y-4 pb-8">
                            <button onClick={() => setView('pause_during_tree')} className="w-full bg-amber-500 text-black py-5 rounded-3xl font-black text-lg shadow-xl flex items-center justify-center gap-3"><i className="fas fa-pause"></i> Interromper Manejo</button>
                            <Card className="border-2 border-audit-900 shadow-xl">
                                <Label required>3 Fotos de Depois</Label>
                                <div className="grid grid-cols-3 gap-2 mb-2">
                                    {[0, 1, 2].map(i => <PhotoUpload key={i} label={`F${i + 1}`} preview={activeAction.photosAfter?.[i]} onCapture={async f => {
                                        const processed = await processPhoto(f, `DEPOIS_${i + 1}`);
                                        setActiveAction(prev => {
                                            const list = [...(prev.photosAfter || [])];
                                            list[i] = processed;
                                            return { ...prev, photosAfter: list };
                                        });
                                    }} />)}
                                </div>
                                <button disabled={(activeAction.photosAfter?.filter(p => p).length < 3)} onClick={async () => {
                                    const now = Date.now();
                                    const execDuration = Math.floor((now - activeAction.executionStartTime) / 1000);
                                    const effectiveDuration = execDuration - (activeAction.totalPausedSeconds || 0);

                                    const log = {
                                        ...activeAction,
                                        uid: Date.now() + "_" + Math.random(),
                                        synced: false,
                                        endTime: now,
                                        durationSec: Math.floor((now - activeAction.startTime) / 1000),
                                        executionDurationSec: execDuration,
                                        effectiveDurationSec: effectiveDuration,
                                        coords: activeAction.treeCoords || `${gps.lat},${gps.lng}`,
                                        status: 'OK',
                                        timestamp: new Date().toISOString()
                                    };
                                    setLogs([log, ...logs]);
                                    await pushToSupabase(log);
                                    setActiveAction(null);
                                    setView('dashboard');
                                }} className="w-full mt-4 py-5 rounded-2xl bg-audit-900 text-white font-black uppercase shadow-xl disabled:opacity-50">Finalizar e Salvar</button>
                            </Card>
                        </div>
                    </div>
                );
            }

            // PAUSAS
            if (view === 'global_pause_form' || view === 'pause_during_tree') {
                const isOther = activeAction?.tempPauseReason === 'Outros';
                return (
                    <div className="p-6 screen-fade no-scrollbar pb-24">
                        <h2 className="text-xl font-black text-slate-800 mb-6 uppercase italic">Registrar Parada</h2>
                        <Card>
                            <Label required>Motivo da Interrupção</Label>
                            <select className="w-full p-4 border-2 rounded-2xl mb-4 font-black bg-white text-sm" value={activeAction?.tempPauseReason || ''} onChange={e => setActiveAction({ ...activeAction, tempPauseReason: e.target.value })}><option value="">Selecione...</option>{PAUSE_REASONS.map(r => <option key={r} value={r}>{r}</option>)}</select>
                            {isOther && (
                                <div className="mb-4"><Label required>Motivação Detalhada</Label><textarea className="w-full p-3 border-2 border-amber-300 rounded-2xl text-sm font-black uppercase" rows="3" placeholder="DESCREVA O MOTIVO..." value={activeAction.customPauseReason || ''} onChange={e => setActiveAction({ ...activeAction, customPauseReason: e.target.value })} /></div>
                            )}
                            <PhotoUpload label="FOTO PAUSA" onCapture={async f => setActiveAction({ ...activeAction, tempPausePhoto: await processPhoto(f, 'PAUSA') })} preview={activeAction?.tempPausePhoto} />
                        </Card>
                        <button disabled={!activeAction?.tempPauseReason || !activeAction?.tempPausePhoto || (isOther && !activeAction.customPauseReason)} onClick={() => { const now = Date.now(); setActiveAction({ ...activeAction, type: activeAction?.type || 'pause', isPaused: true, pauseStartTime: now, startTime: activeAction?.startTime || now, pauseCoords: `${gps.lat},${gps.lng}` }); setPauseElapsed(0); setView('active_pause_screen'); }} className="w-full py-6 rounded-3xl bg-amber-600 text-white font-black text-xl uppercase shadow-xl disabled:opacity-50">Confirmar Pausa</button>
                        <button onClick={() => setView(activeAction.type === 'tree' ? 'active_service' : 'dashboard')} className="w-full p-5 text-slate-400 font-black uppercase text-[10px] tracking-widest underline decoration-dotted">Voltar</button>
                    </div>
                );
            }

            if (view === 'active_pause_screen') return (
                <div className="p-6 screen-fade flex flex-col min-h-screen bg-slate-900 text-white no-scrollbar">
                    <div className="text-center mt-12 px-4"><span className="bg-amber-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest leading-none">Serviço Suspenso</span><h2 className="text-2xl font-black uppercase mt-6 text-amber-500 leading-tight">{activeAction.tempPauseReason === 'Outros' ? activeAction.customPauseReason : activeAction.tempPauseReason}</h2></div>
                    <div className="flex-1 flex flex-col justify-center items-center"><div className="fit-timer font-black text-amber-500 pause-glow leading-none font-mono tracking-tighter">{formatDuration(pauseElapsed)}</div></div>
                    <button onClick={async () => {
                        const pDur = Math.floor((Date.now() - activeAction.pauseStartTime) / 1000);
                        if (activeAction.type === 'pause') {
                            const log = {
                                ...activeAction,
                                uid: Date.now() + "_" + Math.random(),
                                synced: false,
                                endTime: Date.now(),
                                durationSec: pDur,
                                status: 'PAUSA',
                                timestamp: new Date().toISOString(),
                                coords: activeAction.pauseCoords || `${gps.lat},${gps.lng}`
                            };
                            setLogs([log, ...logs]);
                            await pushToSupabase(log);
                            setActiveAction(null);
                            setView('dashboard');
                        }
                        else { setActiveAction({ ...activeAction, isPaused: false, totalPausedSeconds: (activeAction.totalPausedSeconds || 0) + pDur, tempPauseReason: null, tempPausePhoto: null, customPauseReason: null }); setView('active_service'); }
                    }} className="bg-emerald-600 text-white py-7 rounded-[2rem] font-black text-2xl mb-12 uppercase mx-4 shadow-xl">Retomar Operação</button>
                </div>
            );

            // ✅ END DAY COM CONFIRMAÇÃO DE DOWNLOAD
            if (view === 'end_day') return (
                <div className="p-6 screen-fade text-center pb-12 no-scrollbar">
                    <i className="fas fa-circle-check text-audit-600 text-5xl mb-4"></i><h2 className="text-2xl font-black text-audit-900 uppercase">Resumo Diário</h2>
                    <Card className="bg-emerald-50 mt-4 text-left border-audit-200">
                        <div className="flex justify-between font-black mb-2 border-b border-emerald-100 pb-2"><span className="text-[10px] uppercase">Hm Efetivo:</span><span className="font-mono">{formatDuration(stats.work)}</span></div>
                        <div className="flex justify-between font-black text-audit-900"><span className="text-[11px] uppercase">Jornada Total:</span><span className="text-lg font-mono">{formatDuration(stats.journey)}</span></div>
                    </Card>
                    <div className="grid grid-cols-3 gap-2 mb-6 text-center">
                        <div className="bg-white p-3 rounded-2xl border"><p className="text-[7px] font-black text-slate-400 uppercase">Total</p><p className="text-lg font-black">{stats.totalTrees}</p></div>
                        <div className="bg-white p-3 rounded-2xl border"><p className="text-[7px] font-black text-emerald-600 uppercase">Podas</p><p className="text-lg font-black">{stats.treesPruned}</p></div>
                        <div className="bg-white p-3 rounded-2xl border"><p className="text-[7px] font-black text-red-600 uppercase">Cortes</p><p className="text-lg font-black">{stats.treesSuppressed}</p></div>
                    </div>
                    <button disabled={isExporting} onClick={async () => {
                        setIsExporting(true);
                        try {
                            const safePlaca = (shift?.placa || 'SEM_PLACA').replace(/[^a-zA-Z0-9]/g, '');
                            const journeyDate = shift.journeyDate || new Date().toISOString().split('T')[0];

                            // 1. Centralização do Envio e Marcação de Fechamento
                            logs.filter(l => !l.synced).forEach(l => pushToSupabase(l));
                            const finalShift = { id: shift.id_banco || shift.id, journey_end_time: new Date().toLocaleTimeString(), status: 'FECHADO' };
                            addToSyncQueue('CLOSE_SHIFT', { table: 'tb_turnos', data: finalShift });

                            // 2. Espera cortesia para esvaziar fila (se houver internet)
                            let wait = 0;
                            while (syncQueue.length > 0 && navigator.onLine && wait < 20) {
                                await new Promise(r => setTimeout(r, 1000));
                                wait++;
                            }

                            // 2. Upload do JSON de Dados (Backup Rápido)
                            try {
                                const jsonBlob = new Blob([JSON.stringify({ shift, logs }, null, 2)], { type: 'application/json' });
                                const jsonName = `BACKUPS_JSON/${journeyDate}_${safePlaca}.json`;
                                await supabaseClient.storage.from('backups_zip').upload(jsonName, jsonBlob, { upsert: true });
                            } catch (err) { console.warn("Erro no JSON:", err); }

                            // 4. Geração de ZIP Sequencial (Ultra-Safe Memory)
                            const zip = new JSZip();
                            zip.file("RELATORIO_DETALHADO.json", JSON.stringify({ shift, logs }, null, 2));
                            const imgs = zip.folder("EVIDENCIAS");

                            // DDS Especial
                            if (shift.foto_unificada?.localPreview || shift.foto_unificada?.base64) {
                                const raw = (shift.foto_unificada.localPreview || shift.foto_unificada.base64).split(',')[1];
                                imgs.file("01_ABERTURA.jpg", raw, { base64: true });
                            }

                            for (const l of logs) {
                                const currentPhotos = [...(l.photosBefore || []), ...(l.photosAfter || []), l.photoProblem, l.tempPausePhoto].filter(Boolean);
                                for (const p of currentPhotos) {
                                    const dataUri = p.localPreview || p.base64;
                                    if (dataUri && dataUri.includes(',')) {
                                        const clean = dataUri.split(',')[1];
                                        const fName = p.storagePath ? p.storagePath.split('/').pop() : `IMG_${Date.now()}.jpg`;
                                        imgs.file(fName, clean, { base64: true });
                                    }
                                }
                                // Liberação agressiva a cada 3 registros
                                if (logs.indexOf(l) % 3 === 0) await new Promise(r => setTimeout(r, 50));
                            }

                            const zipBlob = await zip.generateAsync({ type: "blob", compression: "STORE", streamFiles: true });

                            // 5. Backup Cloud e Download Local
                            try {
                                await supabaseClient.storage.from('backups_zip').upload(`Backup_${journeyDate}_${safePlaca}.zip`, zipBlob, { upsert: true });
                            } catch (err) { console.error("Erro Cloud ZIP:", err); }

                            const a = document.createElement("a");
                            const u = URL.createObjectURL(zipBlob);
                            a.href = u;
                            a.download = `RAD_MCR_${journeyDate}_${safePlaca}.zip`;
                            a.click();
                            setTimeout(() => { URL.revokeObjectURL(u); }, 20000);

                            setDownloadedBlob(zipBlob);
                            setView('download_confirm');
                        } catch (e) {
                            alert("Erro Crítico: " + e.message);
                            console.error(e);
                        } finally { setIsExporting(false); }
                    }} className="w-full py-6 rounded-3xl bg-audit-600 text-white font-black text-xl shadow-xl mt-2 uppercase flex items-center justify-center gap-3 disabled:opacity-50">
                        <i className={isExporting ? "fas fa-spinner fa-spin" : "fas fa-cloud-upload-alt"}></i>
                        {isExporting ? "PROCESSANDO..." : "FINALIZAR TURNOS"}
                    </button>
                    <button onClick={() => setView('dashboard')} className="mt-8 text-slate-300 font-black uppercase text-[10px] underline">Voltar</button>
                </div>
            );

            if (view === 'download_confirm') {
                localStorage.setItem('mcr_safety_exit', 'safe');
                return (
                    <div className="min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-8 text-center text-white screen-fade">
                        <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-2xl animate-bounce">
                            <i className="fas fa-check text-4xl text-emerald-600"></i>
                        </div>
                        <h1 className="text-4xl font-black mb-2 uppercase">Turno Finalizado!</h1>
                        <p className="font-medium opacity-80 mb-8 max-w-xs mx-auto">Dados sincronizados e o backup ZIP foi gerado.</p>
                        <div className="space-y-3 w-full max-w-sm">
                            <button onClick={() => {
                                const a = document.createElement("a");
                                a.href = URL.createObjectURL(downloadedBlob);
                                a.download = `RAD_MCR_REBACKUP.zip`;
                                a.click();
                            }} className="w-full py-4 rounded-xl bg-white/20 font-bold uppercase backdrop-blur-sm border border-white/30">Baixar Novamente</button>
                            <button onClick={async () => {
                                await idbKeyval.del('mcr_shift_v21_oficial');
                                await idbKeyval.del('mcr_active_v21_oficial');
                                await idbKeyval.del('mcr_logs_v21_oficial');
                                localStorage.removeItem('mcr_safety_exit');
                                window.location.reload();
                            }} className="w-full py-4 rounded-xl bg-white text-emerald-700 font-black uppercase shadow-xl hover:scale-105 transition">Iniciar Novo Turno</button>
                        </div>
                    </div>
                );
            }

            if (view === 'loading') return <div className="h-screen bg-audit-900 flex items-center justify-center text-white font-black italic animate-pulse">RAD PODA v21...</div>;
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
