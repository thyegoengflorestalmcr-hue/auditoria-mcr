        const generateTreeId = (species, cap, lat, lng) => {
            const safeLat = (!lat || isNaN(parseFloat(lat))) ? '0.0000' : parseFloat(lat).toFixed(4);
            const safeLng = (!lng || isNaN(parseFloat(lng))) ? '0.0000' : parseFloat(lng).toFixed(4);
            const normalized = `${species.trim().toUpperCase()}_${parseFloat(cap || 0).toFixed(1)}_${safeLat}_${safeLng}`;
            return CryptoJS.MD5(normalized).toString().substring(0, 12).toUpperCase();
        };

        const formatDuration = (totalSeconds) => {
            const s = Math.max(0, totalSeconds);
            const h = Math.floor(s / 3600);
            const m = Math.floor((s % 3600) / 60);
            const sec = s % 60;
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;

        const App = () => {
            const [view, setView] = useState('loading');
            const [shift, setShift] = useState({
                rt: '', tst: '', operador: '', placa: '', auxiliares: [''], placaAux: '',
                foto_unificada: null, journeyStartTime: null, journeyEndTime: null, journeyDate: null
            });
            const [activeAction, setActiveAction] = useState(null);
            const [activeDisposal, setActiveDisposal] = useState(null);
            const [logs, setLogs] = useState([]);
            const [gps, setGps] = useState({ lat: null, lng: null });
            const [elapsed, setElapsed] = useState(0);
            const [pauseElapsed, setPauseElapsed] = useState(0);
            const [disposalElapsed, setDisposalElapsed] = useState(0);
            const [journeyElapsed, setJourneyElapsed] = useState(0);
            const [showEndConfirm, setShowEndConfirm] = useState(false);
            const [isExporting, setIsExporting] = useState(false);
            const [downloadedBlob, setDownloadedBlob] = useState(null);
            const [confirmModal, setConfirmModal] = useState(null);
            
            const showConfirm = (title, body, onConfirm, onCancel, confirmLabel = 'Confirmar', cancelLabel = 'Cancelar') => {
                setConfirmModal({ title, body, onConfirm, onCancel, confirmLabel, cancelLabel });
            };

            const [syncQueue, setSyncQueue] = useState([]);
            const [isSyncing, setIsSyncing] = useState(false);
            const [onlineStatus, setOnlineStatus] = useState(navigator.onLine);

            useEffect(() => {
                const initSync = async () => {
                    const q = await idbKeyval.get('mcr_sync_queue_v21') || [];
                    setSyncQueue(q);
                };
                initSync();

                const handleOnline = () => setOnlineStatus(true);
                const handleOffline = () => setOnlineStatus(false);
                window.addEventListener('online', handleOnline);
                window.addEventListener('offline', handleOffline);
                return () => {
                    window.removeEventListener('online', handleOnline);
                    window.removeEventListener('offline', handleOffline);
                };
            }, []);

            useEffect(() => {
                if (syncQueue) idbKeyval.set('mcr_sync_queue_v21', syncQueue);
            }, [syncQueue]);

            useEffect(() => {
                const processQueue = async () => {
                    if (!onlineStatus) return;
                    if (syncQueue.length === 0) return;
                    if (isSyncing) return; 

                    setIsSyncing(true);
                    const item = syncQueue[0];

                    try {
                        console.log(`🔄 TENTANDO SINCRONIZAR: ${item.type}`, item.payload);

                        if (item.type === 'IMAGE_UPLOAD') {
                            const { path, bucket, base64 } = item.payload;
                            const res = await fetch(base64);
                            const blob = await res.blob();

                            const { error } = await supabaseClient.storage
                                .from(bucket || 'evidencias') 
                                .upload(path, blob, { upsert: true });

                            if (error) throw new Error(`Erro Upload: ${error.message}`);
                        }
                        else if (item.type === 'DB_INSERT' || item.type === 'DB_UPDATE') {
                            let { table, data, id } = item.payload;

                            if (table === 'tb_turnos') table = 'shifts'; 
                            if (table === 'tb_manejos') table = 'logs';  
                            if (table === 'tb_pausas') table = 'logs';   

                            let error;

                            if (table === 'shifts') {
                                const mappedData = {
                                    id: data.id, 
                                    journey_date: (() => {
                                        if (!data.inicio_jornada) return new Date().toISOString().split('T')[0];
                                        if (data.inicio_jornada.includes('T')) return data.inicio_jornada.split('T')[0];
                                        const parts = data.inicio_jornada.split('/');
                                        if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                                        return new Date().toISOString().split('T')[0];
                                    })(),
                                    rt: data.rt_responsavel,
                                    operador: data.equipe_operador,
                                    journey_start_time: data.inicio_jornada ? data.inicio_jornada.split('T')[1] : null,
                                    dds_image_path: data.img_dds_url
                                };
                                Object.keys(mappedData).forEach(key => mappedData[key] === undefined && delete mappedData[key]);

                                if (item.type === 'DB_INSERT') {
                                    const res = await supabaseClient.from(table).insert(mappedData);
                                    error = res.error;
                                } else {
                                    const res = await supabaseClient.from(table).update(mappedData).eq('id', id);
                                    error = res.error;
                                }
                            }
                            else if (table === 'logs') {
                                const mappedData = {
                                    shift_id: data.id_turno || data.shift_id,
                                    tree_desc: data.especie || 'NÃO IDENTIFICADA',
                                    os_id: data.protocolo_os,
                                    coords: `${data.coords_lat}, ${data.coords_lng}`,
                                    start_time: data.inicio_form,
                                    end_time: data.fim_execucao,
                                    execution_duration_sec: data.duracao_efetiva_seg || data.duracao_total_seg,
                                    form_duration_sec: (data.duracao_total_seg - (data.duracao_efetiva_seg || 0)),
                                    total_paused_seconds: data.total_paused_seconds || 0,
                                    pruning_types: data.tipos_poda,
                                    demand_source: data.origem_demanda,
                                    status: data.status,
                                    cap: data.cap,
                                    height: data.altura,
                                    photos: {} 
                                };

                                if (data.fotos_antes && Array.isArray(data.fotos_antes)) {
                                    data.fotos_antes.forEach((url, i) => {
                                        const fullUrl = url.startsWith('http') ? url : supabaseClient.storage.from('evidencias').getPublicUrl(url).data.publicUrl;
                                        mappedData.photos[`A${i + 1}`] = fullUrl;
                                    });
                                }
                                if (data.fotos_depois && Array.isArray(data.fotos_depois)) {
                                    data.fotos_depois.forEach((url, i) => {
                                        const fullUrl = url.startsWith('http') ? url : supabaseClient.storage.from('evidencias').getPublicUrl(url).data.publicUrl;
                                        mappedData.photos[`D${i + 1}`] = fullUrl;
                                    });
                                }
                                if (data.foto_impedimento) {
                                    const url = data.foto_impedimento;
                                    const fullUrl = url.startsWith('http') ? url : supabaseClient.storage.from('evidencias').getPublicUrl(url).data.publicUrl;
                                    mappedData.photos['IMP'] = fullUrl;
                                }

                                if (item.type === 'DB_INSERT') {
                                    const res = await supabaseClient.from(table).insert(mappedData);
                                    error = res.error;
                                } else {
                                    const res = await supabaseClient.from(table).update(mappedData).eq('id', id);
                                    error = res.error;
                                }
                            }
                            else {
                                if (item.type === 'DB_INSERT') {
                                    const res = await supabaseClient.from(table).insert(data);
                                    error = res.error;
                                } else {
                                    const res = await supabaseClient.from(table).update(data).eq('id', id);
                                    error = res.error;
                                }
                            }

                            if (error) throw new Error(`Erro Banco ${item.type}: ${error.message} (Tabela: ${table})`);
                        }

                        console.log("✅ SUCESSO! Item enviado.");
                        const newQueue = syncQueue.slice(1);
                        setSyncQueue(newQueue);
                        await idbKeyval.set('mcr_sync_queue_v21', newQueue);

                    } catch (err) {
                        console.error("❌ FALHA NO SYNC:", err);
                        if (err.message.includes("row-level security") || err.message.includes("permission denied")) {
                            alert("ERRO DE PERMISSÃO: O sistema de nuvem bloqueou o envio. Avise o suporte imediatamente com o código: 'RLS_BLOCK'");

                        // ✅ CORREÇÃO: DESENTUPIR A FILA (IMPEDE TRAVAMENTO)
                        const failedItem = syncQueue[0];

                            const newQueue = syncQueue.slice(1);
                            setSyncQueue(newQueue);
                            await idbKeyval.set('mcr_sync_queue_v21', newQueue);
                        } else {
                            // Move o item com erro para o final da fila para dar chance aos outros passarem
                            const newQueue = [...syncQueue.slice(1), failedItem];
                            setSyncQueue(newQueue);
                            await idbKeyval.set('mcr_sync_queue_v21', newQueue);

            const addToSyncQueue = async (type, payload) => {
                const newItem = { id: Date.now() + Math.random(), type, payload, timestamp: new Date().toISOString() };

                setSyncQueue(newQueue);

            useEffect(() => {

                        return e.returnValue;
                    }
                };
                window.addEventListener('beforeunload', handleBeforeUnload);
                return () => window.removeEventListener('beforeunload', handleBeforeUnload);

                    try {
                        const s = await idbKeyval.get('mcr_shift_v21_oficial');
                        const a = await idbKeyval.get('mcr_active_v21_oficial');
                        const d = await idbKeyval.get('mcr_disposal_v21_oficial');

                            if (d.startTime) setDisposalElapsed(Math.floor((Date.now() - d.startTime) / 1000));

                        setLogs(l);

                        const storedSafety = localStorage.getItem('mcr_safety_exit') || '';
                        const storedHmac = localStorage.getItem('mcr_safety_exit_hmac') || '';
                        const hmacSecret = s?.id_banco || 'MCR_RAD_V21_FALLBACK';
                        const expectedHmac = CryptoJS.HmacSHA256('safe', hmacSecret).toString().slice(0, 20);

                        if (storedSafety === 'unsafe' && s?.active) {
                            alert("⚠️ ALERTA DE SEGURANÇA \n\nA última sessão foi encerrada incorretamente ou os dados foram limpos sem envio.\nIsso foi registrado no log de auditoria do sistema.");
                        }
                        if (storedSafety === 'safe' && storedHmac !== expectedHmac) {
                            console.warn('🚨 TAMPER ALERT: mcr_safety_exit adulterado manualmente!');
                            alert("⚠️ ALERTA CRÍTICO DE SEGURANÇA\n\nDado de controle de sessão adulterado. Esta ocorrência foi registrada.");
                        }
                        localStorage.setItem('mcr_safety_exit', 'unsafe');
                        localStorage.removeItem('mcr_safety_exit_hmac');

                        setView(s?.active ? (a ? (a.type === 'tree' && a.executionStartTime ? 'active_service' : 'tree_form') : 'dashboard') : 'setup');
                    } catch (err) { setView('setup'); }
                };
                load();
            }, []);

                    if (shift?.active && shift?.journeyStartTime) {
                        const now = shift.journeyEndTime || Date.now();
                        setJourneyElapsed(Math.floor((now - shift.journeyStartTime) / 1000));
                    }
                    if (activeAction) {
                        const baseTime = activeAction.executionStartTime || activeAction.startTime;
                        if (baseTime) setElapsed(Math.floor((Date.now() - baseTime) / 1000));

                        if (activeAction.isPaused && activeAction.pauseStartTime) {
                            setPauseElapsed(Math.floor((Date.now() - activeAction.pauseStartTime) / 1000));
                        }
                    }

                    if (activeDisposal && activeDisposal.startTime) {
                        setDisposalElapsed(Math.floor((Date.now() - activeDisposal.startTime) / 1000));
                    }
                }, 1000);
                return () => clearInterval(timer);
            }, [activeAction, activeDisposal, shift.active, shift.journeyStartTime, shift.journeyEndTime]);

            useEffect(() => {
                if (shift?.active) idbKeyval.set('mcr_shift_v21_oficial', shift);
                if (activeAction) idbKeyval.set('mcr_active_v21_oficial', activeAction);
                else idbKeyval.del('mcr_active_v21_oficial');
                if (activeDisposal) idbKeyval.set('mcr_disposal_v21_oficial', activeDisposal);
                else idbKeyval.del('mcr_disposal_v21_oficial');
                idbKeyval.set('mcr_logs_v21_oficial', logs);
            }, [shift, activeAction, activeDisposal, logs]);

            useEffect(() => {
                const interval = setInterval(() => {
                    if (shift?.active) {
                        const safePlaca = (shift.placa || 'SEM_PLACA').replace(/[^a-zA-Z0-9]/g, '');
                        const backupState = {
                            shift: shift,
                            logs: logs,
                            activeAction: activeAction,
                            activeDisposal: activeDisposal,
                            lastUpdate: new Date().toISOString()
                        };
                        const blob = new Blob([JSON.stringify(backupState, null, 2)], { type: 'application/json' });
                        const fileName = `ESTADO_TEMPO_REAL/${safePlaca}_LATEST.json`;

                        supabaseClient.storage.from('backups_zip').upload(fileName, blob, { upsert: true })
                            .then(() => console.log("Backup de Estado OK"))
                            .catch(err => console.warn("Erro Backup Estado:", err));
                    }
                }, 60000); 
                return () => clearInterval(interval);
            }, [shift, logs, activeAction, activeDisposal]);

            useEffect(() => {
                const watchId = navigator.geolocation.watchPosition(
                    (pos) => setGps({ lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) }),
                    (err) => console.log(err),
                    { enableHighAccuracy: true }
                );
                return () => navigator.geolocation.clearWatch(watchId);
            }, []);

            const getExifData = (file) => {
                return new Promise((resolve) => {
                    EXIF.getData(file, function () {
                        const allTags = EXIF.getAllTags(this);
                        const convertDMSToDD = (dms, ref) => {
                            try {
                                if (!dms || !Array.isArray(dms) || dms.length < 3) return null;
                                
                                const getValue = (val) => {
                                    if (val && typeof val.numerator !== 'undefined' && typeof val.denominator !== 'undefined') {
                                        return val.denominator === 0 ? 0 : val.numerator / val.denominator;
                                    }
                                    return parseFloat(val);
                                };

                                let d = getValue(dms[0]);
                                let m = getValue(dms[1]);
                                let s = getValue(dms[2]);
                                
                                if (isNaN(d) || isNaN(m) || isNaN(s)) return null;

                                let dd = d + m / 60 + s / 3600;
                                if (ref === "S" || ref === "W") dd = dd * -1;
                                return dd;
                            } catch (err) {
                                console.warn("Falha ao converter GPS EXIF:", err);
                                return null;
                            }
                        };
                        resolve({
                            dateTime: allTags.DateTimeOriginal || allTags.DateTime,
                            lat: convertDMSToDD(allTags.GPSLatitude, allTags.GPSLatitudeRef),
                            lng: convertDMSToDD(allTags.GPSLongitude, allTags.GPSLongitudeRef),
                            make: allTags.Make,
                            model: allTags.Model
                        });
                    });
                });
            };

            const processPhoto = async (file, photoType = 'GENERICO') => {
                if (!file) return null;
                const options = { maxSizeMB: 0.2, maxWidthOrHeight: 1280, useWebWorker: true }; 

                try {
                    const compressedFile = await imageCompression(file, options);
                    const metadata = await getExifData(file); 
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                    const storagePath = `${shift.journeyDate || 'SEM_DATA'}/${shift.placa || 'SEM_PLACA'}/${photoType}/${fileName}`;

                    const base64 = await imageCompression.getDataUrlFromFile(compressedFile);

                    addToSyncQueue('IMAGE_UPLOAD', {
                        path: storagePath,
                        base64: base64, 
                        bucket: 'evidencias'
                    });

                    return {
                        base64: base64, 
                        localPreview: base64,
                        storagePath: storagePath,
                        publicUrl: supabaseClient.storage.from('evidencias').getPublicUrl(storagePath).data.publicUrl,
                        metadata: {
                            ...metadata,
                            originalDate: metadata.dateTime,
                            gps_lat: metadata.lat,
                            gps_lng: metadata.lng
                        },
                        capturedAt: new Date().toISOString()
                    };
                } catch (e) {
                    console.error("Erro processamento img:", e);
                    alert("Erro ao processar imagem. Tente novamente.");
                    return null;
                }
            };

            const pushToSupabase = async (logItem) => {
                if (logItem.status === 'PAUSA' || logItem.type === 'disposal') {
                    const extraPayload = {
                        id_turno: shift.id_banco,
                        type: logItem.type,
                        motivo: logItem.tempPauseReason || logItem.type.toUpperCase(),
                        descricao_detalhada: logItem.customPauseReason || null,
                        inicio: new Date(logItem.startTime || logItem.pauseStartTime).toISOString(),
                        fim: new Date(logItem.endTime).toISOString(),
                        duracao_seg: logItem.durationSec,
                        foto_evidencia: logItem.tempPausePhoto?.storagePath,
                        coords_lat: gps.lat,
                        coords_lng: gps.lng
                    };

                    if (logItem.status === 'PAUSA') {
                        addToSyncQueue('DB_INSERT', { table: 'pausas', data: extraPayload });
                    }

                    const unifiedLog = {
                        shift_id: shift.id_banco,
                        type: logItem.type,
                        status: logItem.status || 'OK',
                        start_time: extraPayload.inicio,
                        end_time: extraPayload.fim,
                        duration_sec: logItem.durationSec,
                        coords_lat: gps.lat,
                        coords_lng: gps.lng,
                        temp_pause_reason: extraPayload.motivo,
                        photos: {}
                    };

                    if (logItem.type === 'disposal') {
                        if (logItem.photoBefore?.storagePath) unifiedLog.photos['DEST_A'] = supabaseClient.storage.from('evidencias').getPublicUrl(logItem.photoBefore.storagePath).data.publicUrl;
                        if (logItem.photoAfter?.storagePath) unifiedLog.photos['DEST_D'] = supabaseClient.storage.from('evidencias').getPublicUrl(logItem.photoAfter.storagePath).data.publicUrl;
                    } else if (extraPayload.foto_evidencia) {
                        unifiedLog.photos['PAUSA'] = supabaseClient.storage.from('evidencias').getPublicUrl(extraPayload.foto_evidencia).data.publicUrl;
                    }

                    addToSyncQueue('DB_INSERT', { table: 'logs', data: unifiedLog });
                    return;
                }

                let finalLat = gps.lat;
                let finalLng = gps.lng;
                let finalTime = new Date(logItem.startTime || Date.now()).toISOString();

                const allPhotos = [
                    ...(logItem.photosBefore || []),
                    ...(logItem.photosAfter || []),
                    logItem.photoProblem
                ].filter(p => p && p.metadata);

                const photoWithGps = allPhotos.find(p => p.metadata.gps_lat && p.metadata.gps_lng);

                if (photoWithGps) {
                    finalLat = photoWithGps.metadata.gps_lat;
                    finalLng = photoWithGps.metadata.gps_lng;
                } 

                if (photoWithGps && photoWithGps.metadata.originalDate) {
                    const d = new Date(photoWithGps.metadata.originalDate);
                    if (!isNaN(d.getTime())) finalTime = d.toISOString();
                }

                const manejoPayload = {
                    id_turno: shift.id_banco,
                    tree_id_md5: logItem.treeId,
                    especie: logItem.species,
                    cap: parseFloat(logItem.cap),
                    altura: parseFloat(logItem.height),
                    origem_demanda: activeAction?.demandSource || 'ROTINA',
                    protocolo_os: activeAction?.osId,
                    tipos_poda: logItem.pruningTypes,
                    destinacao_galhos: logItem.destinacaoGalhos,
                    inicio_form: finalTime, 
                    inicio_execucao: new Date(logItem.executionStartTime).toISOString(),
                    fim_execucao: new Date(logItem.endTime).toISOString(),
                    duracao_total_seg: logItem.durationSec,
                    duracao_efetiva_seg: logItem.effectiveDurationSec,
                    total_paused_seconds: logItem.totalPausedSeconds || 0,
                    fotos_antes: logItem.photosBefore?.map(p => p?.storagePath).filter(Boolean),
                    fotos_depois: logItem.photosAfter?.map(p => p?.storagePath).filter(Boolean),
                    foto_impedimento: logItem.photoProblem?.storagePath,
                    status: logItem.status,
                    motivo_impedimento: logItem.problemReport,
                    coords_lat: finalLat,
                    coords_lng: finalLng,
                    endereco_aproximado: photoWithGps ? '📍 GPS DA FOTO (EXIF)' : '📱 GPS DO DISPOSITIVO'
                };

                addToSyncQueue('DB_INSERT', { table: 'tb_manejos', data: manejoPayload });

                const mainPruningType = (logItem.pruningTypes || [])[0] || '';
                const unifiedLog = {
                    shift_id: shift.id_banco,
                    type: 'tree',
                    status: logItem.status || 'OK',
                    start_time: manejoPayload.inicio_form,
                    end_time: manejoPayload.fim_execucao,
                    duration_sec: logItem.durationSec,
                    execution_duration_sec: logItem.executionDurationSec || logItem.durationSec,
                    effective_duration_sec: logItem.effectiveDurationSec,
                    form_duration_sec: logItem.formDurationSec || 0,
                    total_paused_seconds: logItem.totalPausedSeconds || 0,
                    species: logItem.species,
                    tree_desc: mainPruningType ? `${logItem.species} [${mainPruningType}]` : logItem.species,
                    os_id: logItem.osId,
                    demand_source: activeAction?.demandSource || 'manutencao',
                    pruning_types: logItem.pruningTypes || [],
                    cap: parseFloat(logItem.cap) || null,
                    height: parseFloat(logItem.height) || null,
                    copel_required: activeAction?.copelRequired || 'NÃO',
                    problem_report: logItem.problemReport || null,
                    coords: logItem.coords,
                    lat: finalLat,
                    lng: finalLng,
                    temp_pause_reason: logItem.tempPauseReason,
                    photos: {}
                };

                logItem.photosBefore?.forEach((p, i) => { if (p?.storagePath) unifiedLog.photos[`A${i + 1}`] = p.publicUrl; });
                logItem.photosAfter?.forEach((p, i) => { if (p?.storagePath) unifiedLog.photos[`D${i + 1}`] = p.publicUrl; });
                if (logItem.photoProblem?.storagePath) unifiedLog.photos['IMP'] = logItem.photoProblem.publicUrl;
                if (logItem.tempPausePhoto?.storagePath) unifiedLog.photos['PAUSA'] = logItem.tempPausePhoto.publicUrl;

                addToSyncQueue('DB_INSERT', { table: 'logs', data: unifiedLog });
            };

            const stats = useMemo(() => {
                const treeLogs = logs.filter(l => l.type === 'tree' && l.status !== 'IMPEDIDO');
                const disposalLogs = logs.filter(l => l.type === 'disposal');

                const totalFormSec = treeLogs.reduce((acc, log) => acc + (log.formDurationSec || 0), 0);
                const totalManejoPuroSec = treeLogs.reduce((acc, log) => acc + (log.effectiveDurationSec || 0), 0);
                const totalDisposalSec = disposalLogs.reduce((acc, log) => acc + (log.durationSec || 0), 0);

                const runningManejo = (activeAction?.type === 'tree') ? elapsed : 0;
                const runningDisposal = (activeDisposal) ? disposalElapsed : 0;
                const runningPause = (activeAction?.isPaused || activeAction?.type === 'pause') ? pauseElapsed : 0;

                const hmTotalEfetivo = totalFormSec + totalManejoPuroSec + totalDisposalSec + runningManejo + runningDisposal;

                const journeySec = journeyElapsed;
                const pausesSec = logs.filter(l => l.status === 'PAUSA').reduce((acc, log) => acc + (log.durationSec || 0), 0) + runningPause;

                const logisticSec = Math.max(0, journeySec - hmTotalEfetivo - pausesSec);

                return {
                    work: hmTotalEfetivo,
                    preparo: totalFormSec,
                    manejo: totalManejoPuroSec,
                    disposal: totalDisposalSec,
                    logistics: logisticSec,
                    journey: journeySec,
                    totalTrees: logs.filter(l => l.type === 'tree').length,
                    treesPruned: treeLogs.filter(t => t.pruningTypes?.some(p => !p.includes('CORTE'))).length,
                    treesSuppressed: treeLogs.filter(t => t.pruningTypes?.some(p => p.includes('CORTE'))).length
                };
            }, [logs, journeyElapsed]);

            const finalizeAndClearAll = async (forceBypass = false) => {
                if (syncQueue.length > 0 && !forceBypass) {
                    alert(`⚠️ OPERAÇÃO BLOQUEADA\n\nExistem ${syncQueue.length} registro(s) ainda não enviados ao servidor.\n\nAguarde o indicador "NUVEM OK" antes de reiniciar.`);
                    return;
                }
                await idbKeyval.clear();
                localStorage.removeItem('mcr_safety_exit');
                localStorage.removeItem('mcr_safety_exit_hmac');
                window.location.reload();
            };

            if (view === 'setup' || view === 'edit_team') {
                return (
                    <div className="p-6 screen-fade pb-20 no-scrollbar">
                        <div className="text-center mb-8"><i className="fas fa-helmet-safety text-audit-600 text-5xl mb-4"></i><h1 className="text-2xl font-black text-slate-800 uppercase leading-none">Abertura de Turno v21</h1></div>
                        <Card>
                            <Label required>Equipe Técnica</Label>
                            <div className="space-y-3">
                                <input className="w-full p-4 border-2 rounded-2xl text-sm font-black uppercase" placeholder="Engenheiro Resp. (RT)" value={shift?.rt || ''} onChange={e => setShift({ ...shift, rt: e.target.value.toUpperCase() })} />
                                <input className="w-full p-4 border-2 rounded-2xl text-sm font-black uppercase" placeholder="Téc. Segurança (TST)" value={shift?.tst || ''} onChange={e => setShift({ ...shift, tst: e.target.value.toUpperCase() })} />
                                <div className="grid grid-cols-2 gap-2">
                                    <input className="w-full p-4 border-2 rounded-2xl font-black text-sm uppercase" placeholder="Encarregado" value={shift?.operador || ''} onChange={e => setShift({ ...shift, operador: e.target.value.toUpperCase() })} />
                                    <input className="w-full p-4 border-2 rounded-2xl font-black uppercase text-sm" placeholder="Placa Munk" value={shift?.placa || ''} onChange={e => setShift({ ...shift, placa: e.target.value.toUpperCase() })} />
                                </div>
                            </div>
                        </Card>
                        <Card>
                            <div className="flex justify-between items-center mb-4"><Label required>Equipe de Apoio</Label><button onClick={() => setShift({ ...shift, auxiliares: [...(shift?.auxiliares || ['']), ''] })} className="bg-audit-600 text-white text-[9px] px-3 py-1.5 rounded-xl font-black uppercase">+ ADD</button></div>
                            <div className="space-y-2 mb-4">
                                {(shift?.auxiliares || ['']).map((aux, idx) => (
                                    <div key={idx} className="flex gap-2 items-center">
                                        <input className="flex-1 p-4 border-2 rounded-2xl text-sm font-black uppercase" placeholder={`Auxiliar ${idx + 1}`} value={aux} onChange={e => { let list = [...shift.auxiliares]; list[idx] = e.target.value.toUpperCase(); setShift({ ...shift, auxiliares: list }); }} />
                                        {shift?.auxiliares?.length > 1 && <button onClick={() => { let list = [...shift.auxiliares]; list.splice(idx, 1); setShift({ ...shift, auxiliares: list }); }} className="text-red-400 p-2"><i className="fas fa-trash"></i></button>}
                                    </div>
                                ))}
                            </div>
                            <Label>Logística de Apoio</Label>
                            <input className="w-full p-4 border-2 rounded-2xl font-black uppercase text-sm" placeholder="Placa Veículo de Apoio" value={shift?.placaAux || ''} onChange={e => setShift({ ...shift, placaAux: e.target.value.toUpperCase() })} />
                        </Card>
                        <Card><Label required>DDS / Checklist</Label><PhotoUpload fullWidth label="DDS + CHECKLIST" preview={shift?.foto_unificada} onCapture={async f => setShift({ ...shift, foto_unificada: await processPhoto(f, 'DDS') })} /></Card>
                        <button disabled={!shift?.rt || !shift?.operador || !shift?.placa || !shift?.foto_unificada || shift?.auxiliares?.some(a => !a)} onClick={async () => {
                            const now = new Date();
                            const journeyDate = now.toLocaleDateString();

                            const newShiftState = {
                                ...shift,
                                active: true,
                                journeyStartTime: Date.now(),
                                journeyEndTime: null,
                                journeyDate: journeyDate
                            };

                            const turnoPayload = {
                                equipe_operador: shift.operador,
                                placa_veiculo: shift.placa,
                                rt_responsavel: shift.rt,
                                tst_responsavel: shift.tst,
                                auxiliares: shift.auxiliares,
                                inicio_jornada: now.toISOString(),
                                img_dds_url: shift.foto_unificada?.storagePath,
                                audit_device_info: { userAgent: navigator.userAgent }
                            };

                            try {
                                const journeyDateISO = now.toISOString().split('T')[0];
                                const { data, error } = await supabaseClient.from('shifts').insert({
                                    journey_date: journeyDateISO,
                                    rt: shift.rt,
                                    operador: shift.operador,
                                    journey_start_time: now.toLocaleTimeString(),
                                    dds_image_path: shift.foto_unificada?.storagePath 
                                }).select().single();

                                if (error) throw error;
                                if (data) newShiftState.id_banco = data.id; 
                            } catch (e) {
                                console.error("Erro ao iniciar turno no banco (offline?):", e);
                                const tempId = crypto.randomUUID();
                                newShiftState.id_banco = tempId;
                                addToSyncQueue('DB_INSERT', { table: 'tb_turnos', data: { ...turnoPayload, id: tempId } });
                            }

                            setShift(newShiftState);
                            setView('dashboard');
                        }} className="w-full py-6 rounded-3xl bg-audit-600 text-white font-black text-xl shadow-xl disabled:bg-slate-300 uppercase tracking-tighter">Iniciar Expediente</button>

                        <div className="mt-8 text-center">
                            <button onClick={() => {
                                const p = prompt("🔐 ACESSO RESTRITO\nDigite a Senha de Supervisor para forçar o reset (ignora fila pendente):");
                                if (checkSupervisor(p)) finalizeAndClearAll(true);
                                else if (p !== null) alert("Senha incorreta.");
                            }} className="text-[9px] text-slate-200 font-bold uppercase tracking-widest hover:text-red-400 transition-colors opacity-60 hover:opacity-100">
                                <i className="fas fa-lock mr-1"></i> Opções de Suporte (Reset)
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'dashboard') return (
                <div className="screen-fade pb-24 no-scrollbar min-h-screen">
                    <div className="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-40 shadow-sm">
                        <div className="flex items-center gap-3"><div className="w-10 h-10 bg-audit-600 rounded-full flex items-center justify-center text-white shadow-lg"><i className="fas fa-tree"></i></div><div><p className="text-[10px] font-black text-audit-600 uppercase leading-none">RAD PODA v21</p><p className="font-black text-slate-800 text-sm truncate max-w-[140px] uppercase leading-none mt-1.5">{shift.operador}</p></div></div>
                        <div className="text-right">
                            <div className={`inline-flex items-center gap-2 px-2 py-1 rounded-lg mb-1 ${syncQueue.length === 0 ? 'bg-emerald-50 text-emerald-600' : 'bg-amber-50 text-amber-600'}`}>
                                <div className={`w-2 h-2 rounded-full ${syncQueue.length === 0 ? 'bg-emerald-500' : 'bg-amber-500 animate-pulse'}`}></div>
                                <span className="text-[8px] font-black uppercase">{syncQueue.length === 0 ? 'NUVEM OK' : `ENVIANDO (${syncQueue.length})`}</span>
                                {syncQueue.length > 0 && (
                                    <button onClick={async (e) => {
                                        e.stopPropagation();
                                        const p = prompt("🔐 ACESSO RESTRITO\nDigite a Senha de Supervisor:");
                                        if (checkSupervisor(p)) {
                                            setSyncQueue([]);
                                            await idbKeyval.del('mcr_sync_queue_v21');
                                            alert("Fila limpa com sucesso.");
                                        } else if (p !== null) {
                                            alert("Senha incorreta.");
                                        }
                                    }} className="ml-2 text-slate-300 hover:text-red-500 transition-colors" title="Limpeza Técnica (Senha Requerida)">
                                        <i className="fas fa-trash-alt text-[10px]"></i>
                                    </button>
                                )}
                            </div>
                            <p className="text-[7px] font-black text-slate-400 uppercase leading-none">{shift.journeyDate}</p>
                            <div className={`inline-flex items-center gap-1 px-2 py-0.5 rounded text-[7px] font-black uppercase mt-0.5 ${gps.lat ? 'text-emerald-600' : 'text-amber-600 animate-pulse'}`}>
                                <i className={`fas fa-location-dot text-[8px]`}></i>
                                <span>{gps.lat ? `${parseFloat(gps.lat).toFixed(3)},${parseFloat(gps.lng).toFixed(3)}` : 'SEM GPS'}</span>
                            </div>
                        </div>
                    </div>
                    <div className="p-5">
                        <div className="bg-slate-900 p-5 rounded-3xl text-white shadow-2xl mb-4 text-center border-b-4 border-audit-500"><p className="text-[10px] font-black opacity-50 uppercase mb-1 tracking-widest leading-none">Jornada Total Diária</p><p className="text-4xl font-black font-mono text-audit-500 tracking-tighter leading-none">{formatDuration(stats.journey)}</p></div>
                        <div className="grid grid-cols-2 gap-3 mb-4">
                            <div className="bg-audit-600 p-4 rounded-3xl text-white shadow-xl"><p className="text-[9px] font-bold opacity-70 uppercase mb-1">Hm Total Efetivo</p><p className="text-2xl font-black leading-none">{formatDuration(stats.work)}</p></div>
                            <div className="bg-slate-800 p-4 rounded-3xl text-white shadow-xl border-b-4 border-amber-500"><p className="text-[9px] font-bold opacity-70 uppercase mb-1">Logística / Ocioso</p><p className="text-2xl font-black leading-none">{formatDuration(stats.logistics)}</p></div>
                        </div>
                        <div className="grid grid-cols-3 gap-2 mb-6 bg-white p-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                            <div className="border-r border-slate-100"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Total</p><p className="text-xl font-black text-slate-800">{stats.totalTrees}</p></div>
                            <div className="border-r border-slate-100"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Podas</p><p className="text-xl font-black text-emerald-600">{stats.treesPruned}</p></div>
                            <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Cortes</p><p className="text-xl font-black text-red-600">{stats.treesSuppressed}</p></div>
                        </div>
                        <div className="space-y-4">
                            {activeDisposal && activeDisposal.step === 'running' && (

                                </div>
                            )}

                            <button onClick={() => { setActiveAction({ pruningTypes: [], status: 'OK', totalPausedSeconds: 0, photosBefore: [], photosAfter: [], startTime: Date.now(), copelRequired: 'NÃO' }); setView('tree_form'); }} className="w-full bg-audit-600 text-white p-9 rounded-[2rem] shadow-xl flex flex-col items-center gap-2 btn-active"><i className="fas fa-plus-circle text-3xl"></i><span className="font-black text-xl uppercase tracking-tighter">Registrar Manejo</span></button>

                            {!activeDisposal && (
                                <button onClick={() => { setActiveAction({ type: 'disposal', step: 'start', photoBefore: null }); setView('disposal_form'); }} className="w-full bg-blue-600 text-white p-6 rounded-3xl shadow-sm flex items-center justify-center gap-4 btn-active"><i className="fas fa-truck-loading text-2xl"></i><span className="font-black text-lg uppercase tracking-tighter">Destinação de Galhos</span></button>
                            )}

                            <button onClick={() => { setActiveAction({ type: 'pause', isPaused: false, photosBefore: [], photosAfter: [] }); setView('global_pause_form'); }} className="w-full bg-white border-2 border-slate-200 text-slate-600 p-6 rounded-3xl shadow-sm flex items-center justify-center gap-4 btn-active"><i className="fas fa-pause-circle text-2xl"></i><span className="font-black text-lg uppercase tracking-tighter text-center">Registrar Parada<br /><span className="text-[10px] opacity-60">(Almoço / Chuva / Quebra)</span></span></button>

                                                onChange={() => setActiveAction({ ...activeAction, pruningTypes: ['PODA EMERGENCIAL'] })}

                                            <span className="font-black text-sm text-slate-700">PODA EMERGENCIAL (RISCO QUEDA GALHOS)</span>

                                        <label className={`flex items-center p-4 border-2 rounded-xl bg-white transition-all ${activeAction.pruningTypes?.includes('CORTE EMERGENCIAL') ? 'border-red-500 bg-red-50' : ''}`}>

                                        }} />
                                </div>

                        </Card>

                                    </div>
                                </>

                                        ...activeAction,
                                        treeId,
                                        type: 'tree',
                                        executionStartTime: now,
                                        executionDurationSec: 0,
                                        effectiveDurationSec: 0,
                                        durationSec: 0,
                                        formDurationSec: Math.floor((now - (activeAction.startTime || now)) / 1000),
                                        endTime: now,

                                        lat: safeFloat(gps.lat),
                                        lng: safeFloat(gps.lng),
                                        timestamp: new Date().toISOString()
                                    };
                                    setLogs([log, ...logs]);
                                    try { await pushToSupabase(log); } catch(e) { console.error('pushToSupabase impedimento:', e); }
                                    setActiveAction(null);
                                    setView('dashboard');
                                }} className="w-full mt-4 py-6 rounded-3xl bg-red-600 text-white font-black uppercase text-xl shadow-lg disabled:opacity-50">Registrar Impedimento</button>

                                    try {
                                        const now = Date.now();
                                        const treeId = generateTreeId(activeAction.species, activeAction.cap, gps.lat, gps.lng);

                                        const duplicate = logs.find(l => l.treeId === treeId && l.type === 'tree');

                                        const proceedWithNew = () => {
                                            const newActionState = {
                                                ...activeAction,
                                                treeId,
                                                type: 'tree',
                                                executionStartTime: now,
                                                formDurationSec: Math.floor((now - activeAction.startTime) / 1000),
                                                desc: `${activeAction.species} [${activeAction.osId || (activeAction.pruningTypes?.[0] || 'MANEJO')}]`,
                                                treeCoords: coordsStr,
                                                pruningTypes: activeAction.pruningTypes || []
                                            };
                                            if (!newActionState.desc) newActionState.desc = `${newActionState.species || 'ÁRVORE'} (SEM DESC)`;
                                            setActiveAction(newActionState);
                                            setView('active_service');

                                                `ID: ${treeId}\nEspécie: ${activeAction.species}\n\nO que deseja fazer?`,
                                                () => {
                                                    const continuationState = {
                                                        ...activeAction,
                                                        ...duplicate,
                                                        photosBefore: activeAction.photosBefore?.length ? activeAction.photosBefore : duplicate.photosBefore,
                                                        isContinuation: true,
                                                        executionStartTime: now,
                                                        formDurationSec: (duplicate.formDurationSec || 0) + Math.floor((now - activeAction.startTime) / 1000),
                                                        treeCoords: coordsStr

                                                    setLogs(logs.filter(l => l.treeId !== treeId));

                                        ...activeAction,
                                        endTime: now,
                                        durationSec: Math.floor((now - activeAction.startTime) / 1000),

                                    };

                                    setActiveAction(null);
                                    setView('dashboard');

                                <PhotoUpload label="FOTO FINAL" preview={activeDisposal?.photoAfter} onCapture={async f => {
                                    const p = await processPhoto(f, 'DEST_FIM');

                            {isStart ? (
                                <button disabled={!activeDisposal?.photoBefore} onClick={() => {
                                    setActiveDisposal({ ...activeDisposal, step: 'running', startTime: Date.now() });
                                    setView('dashboard');
                                }} className="w-full py-6 rounded-3xl bg-blue-600 text-white font-black text-xl uppercase shadow-xl disabled:opacity-50">Confirmar Início</button>
                            ) : (
                                <button disabled={!activeDisposal?.photoAfter} onClick={async () => {
                                    const now = Date.now();
                                    const dispCoords = safeCoords(gps.lat, gps.lng);
                                    const log = {
                                        ...activeDisposal,
                                        endTime: now,
                                        durationSec: Math.floor((now - activeDisposal.startTime) / 1000),
                                        coords: dispCoords,
                                        lat: safeFloat(gps.lat),
                                        lng: safeFloat(gps.lng),
                                        status: 'OK',
                                        timestamp: new Date().toISOString(),
                                        type: 'disposal'
                                    };
                                    setLogs([log, ...logs]);
                                    await pushToSupabase(log);
                                    setActiveDisposal(null);
                                    setDisposalElapsed(0);
                                    setView('dashboard');
                                }} className="w-full py-6 rounded-3xl bg-audit-900 text-white font-black text-xl uppercase shadow-xl disabled:opacity-50">Encerrar Destinação</button>
                            )}
                        </div>
                    </div>
                );
            }

            if (view === 'end_day') return (
                <div className="p-6 screen-fade text-center pb-12 no-scrollbar">
                    <i className="fas fa-circle-check text-audit-600 text-5xl mb-4"></i><h2 className="text-2xl font-black text-audit-900 uppercase">Resumo Diário</h2>
                    <Card className="bg-emerald-50 mt-4 text-left border-audit-200">
                        <div className="flex justify-between font-black mb-2 border-b border-emerald-100 pb-2"><span className="text-[10px] uppercase">Hm Efetivo:</span><span className="font-mono">{formatDuration(stats.work)}</span></div>
                        <div className="flex justify-between font-black text-audit-900"><span className="text-[11px] uppercase">Jornada Total:</span><span className="text-lg font-mono">{formatDuration(stats.journey)}</span></div>
                    </Card>
                    <div className="grid grid-cols-3 gap-2 mb-6 text-center">
                        <div className="bg-white p-3 rounded-2xl border"><p className="text-[7px] font-black text-slate-400 uppercase">Total</p><p className="text-lg font-black">{stats.totalTrees}</p></div>
                        <div className="bg-white p-3 rounded-2xl border"><p className="text-[7px] font-black text-emerald-600 uppercase">Podas</p><p className="text-lg font-black">{stats.treesPruned}</p></div>
                        <div className="bg-white p-3 rounded-2xl border"><p className="text-[7px] font-black text-red-600 uppercase">Cortes</p><p className="text-lg font-black">{stats.treesSuppressed}</p></div>
                    </div>
                    <button disabled={isExporting} onClick={async () => {
                        setIsExporting(true);
                        try {
                            const exportLogs = [...logs];
                            const exportShift = { ...shift };

                            const safePlaca = (exportShift?.placa || 'SEM_PLACA').replace(/[^a-zA-Z0-9]/g, '');
                            const journeyDate = (() => {
                                if (!exportShift.journeyDate) return new Date().toISOString().split('T')[0];
                                const parts = exportShift.journeyDate.split('/');
                                if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                                return new Date().toISOString().split('T')[0];
                            })();

                            let shiftId = exportShift.id_banco; 

                            try {
                                console.log('📤 Enviando dados para Supabase...');

                                if (!shiftId) {
                                    const { data: existingShift } = await supabaseClient
                                        .from('shifts')
                                        .select('id')
                                        .eq('journey_date', journeyDate)
                                        .eq('rt', exportShift.rt)
                                        .eq('operador', exportShift.operador)
                                        .maybeSingle();

                                    if (existingShift) {
                                        shiftId = existingShift.id;
                                    }
                                }

                                const shiftPayload = {
                                    rt: exportShift.rt,
                                    tst: exportShift.tst || null,
                                    operador: exportShift.operador,
                                    placa: exportShift.placa,
                                    auxiliares: exportShift.auxiliares || [],
                                    placa_aux: exportShift.placaAux || null,
                                    dds_image_path: exportShift.foto_unificada?.storagePath || null,
                                    journey_start_time: new Date(exportShift.journeyStartTime).toLocaleTimeString('pt-BR', { hour12: false }),
                                    journey_date: journeyDate,
                                    status: 'FECHADO'
                                };

                                if (shiftId) {
                                    const { error: updateError } = await supabaseClient
                                        .from('shifts')
                                        .update(shiftPayload)
                                        .eq('id', shiftId);
                                    if (updateError) throw updateError;
                                    console.log('✅ Shift atualizado:', shiftId);
                                } else {
                                    const { data: newShift, error: insertError } = await supabaseClient
                                        .from('shifts')
                                        .insert([shiftPayload])
                                        .select()
                                        .single();
                                    if (insertError) throw insertError;
                                    shiftId = newShift.id;
                                    console.log('✅ Shift criado:', shiftId);
                                }

                                if (exportLogs && exportLogs.length > 0) {
                                    const logsToInsert = exportLogs.map(log => {
                                        const [lat, lng] = (log.coords || ',').split(',');
                                        const photosJson = {};
                                        log.photosBefore?.forEach((item, i) => {
                                            if (item?.storagePath) photosJson[`A${i + 1}`] = supabaseClient.storage.from('evidencias').getPublicUrl(item.storagePath).data.publicUrl;
                                        });
                                        log.photosAfter?.forEach((item, i) => {
                                            if (item?.storagePath) photosJson[`D${i + 1}`] = supabaseClient.storage.from('evidencias').getPublicUrl(item.storagePath).data.publicUrl;
                                        });
                                        if (log.tempPausePhoto?.storagePath) photosJson['PAUSA'] = supabaseClient.storage.from('evidencias').getPublicUrl(log.tempPausePhoto.storagePath).data.publicUrl;
                                        if (log.photoDisposal?.storagePath) photosJson['DEST'] = supabaseClient.storage.from('evidencias').getPublicUrl(log.photoDisposal.storagePath).data.publicUrl;
                                        if (log.photoBefore?.storagePath) photosJson['DEST_A'] = supabaseClient.storage.from('evidencias').getPublicUrl(log.photoBefore.storagePath).data.publicUrl;
                                        if (log.photoAfter?.storagePath) photosJson['DEST_D'] = supabaseClient.storage.from('evidencias').getPublicUrl(log.photoAfter.storagePath).data.publicUrl;
                                        if (log.photoProblem?.storagePath) photosJson['IMP'] = supabaseClient.storage.from('evidencias').getPublicUrl(log.photoProblem.storagePath).data.publicUrl;

                                        return {
                                            shift_id: shiftId,
                                            type: log.type || 'tree',
                                            status: log.status || 'OK',
                                            species: log.species || null,
                                            tree_desc: log.species || log.desc || 'NÃO IDENTIFICADA',
                                            cap: log.cap ? parseFloat(log.cap) : null,
                                            height: log.height ? parseFloat(log.height) : null,
                                            pruning_types: log.pruningTypes || [],
                                            demand_source: log.demandSource || null,
                                            os_id: log.osId || null,
                                            copel_required: log.copelRequired || 'NÃO',
                                            start_time: new Date(log.startTime).toISOString(),
                                            end_time: log.endTime ? new Date(log.endTime).toISOString() : null,
                                            timestamp: log.timestamp || new Date().toISOString(),
                                            duration_sec: log.durationSec || null,
                                            effective_duration_sec: log.effectiveDurationSec || null,
                                            execution_duration_sec: log.executionDurationSec || log.durationSec || 0,
                                            form_duration_sec: log.type === 'tree' ? (log.formDurationSec || 0) : 0,
                                            total_paused_seconds: log.totalPausedSeconds || 0,
                                            coords: log.coords || null,
                                            lat: lat ? parseFloat(lat) : null,
                                            lng: lng ? parseFloat(lng) : null,
                                            temp_pause_reason: log.tempPauseReason || null,
                                            custom_pause_reason: log.customPauseReason || null,
                                            problem_report: log.problemReport || null,
                                            photos: photosJson
                                        };
                                    });

                                    const { error: logsError } = await supabaseClient.from('logs').insert(logsToInsert);
                                    if (logsError) { console.error('❌ Erro ao inserir logs:', logsError); throw logsError; }
                                    console.log(`✅ ${logsToInsert.length} logs inseridos com sucesso!`);
                                }

                                alert(`✅ DADOS SINCRONIZADOS COM SUCESSO!\n\nTurno atualizado e ${exportLogs.length} registros enviados.`);

                            } catch (dbError) {
                                console.error('❌ Erro no processo:', dbError);
                                alert(`⚠️ Erro na sincronização: ${dbError.message}\n\nO backup local (ZIP/JSON) será gerado para segurança.`);
                            }

                            try {
                                const jsonBlob = new Blob([JSON.stringify({ shift: exportShift, logs: exportLogs }, null, 2)], { type: 'application/json' });
                                const jsonName = `DADOS_TURNO/${journeyDate}_${safePlaca}.json`;
                                await supabaseClient.storage.from('backups_zip').upload(jsonName, jsonBlob, { upsert: true });
                            } catch (err) { console.warn("Erro ao salvar JSON na nuvem:", err); }

                            const zip = new JSZip();

                            if (!exportShift.dds_image_path && exportShift.foto_unificada?.storagePath) {
                                exportShift.dds_image_path = exportShift.foto_unificada.storagePath;
                            }

                            zip.file("RELATORIO_DETALHADO.json", JSON.stringify({ shift: exportShift, logs: exportLogs }, null, 2));

                            const csvCols = [
                                "ID_ITEM", "DATA", "OPERADOR", "PLACA", "TIPO", "PROTOCOLO", "ESPECIE", "CAP", "ALTURA",
                                "SERVICOS", "STATUS", "INICIO", "FIM", "DURACAO_SEG", "REFERENCIA_FOTOS"
                            ];
                            const csvHeader = csvCols.join(";") + "\n";
                            const csvRows = exportLogs.map((l, idx) => {
                                const photoRef = l.type === 'tree' ? `ARV_${idx}` : `LOG_${idx}`;
                                return [
                                    idx + 1,
                                    exportShift.journeyDate,
                                    exportShift.operador,
                                    exportShift.placa,
                                    l.type?.toUpperCase(),
                                    l.osId || 'ROTINA',
                                    l.species || 'N/A',
                                    l.cap || '',
                                    l.height || '',
                                    (l.pruningTypes || []).join(", "),
                                    l.status,
                                    new Date(l.startTime).toLocaleTimeString(),
                                    l.endTime ? new Date(l.endTime).toLocaleTimeString() : '',
                                    l.durationSec || 0,
                                    photoRef
                                ].join(";");
                            }).join("\n");

                            zip.file("PLANILHA_EXCEL_DIARIA.csv", "\ufeff" + csvHeader + csvRows);
                            const imgs = zip.folder("EVIDENCIAS");

                            const getImageData = async (imgObj) => {
                                if (!imgObj) return null;
                                const data = imgObj.base64 || imgObj.localPreview;
                                if (data && data.includes(',')) return data.split(',')[1];

                                const path = imgObj.storagePath || imgObj.dds_image_path || imgObj.path;
                                if (path) {
                                    try {
                                        console.log(`🔄 Baixando evidência remota: ${path}...`);
                                        const { data: blob, error } = await supabaseClient.storage.from('evidencias').download(path);
                                        if (error) throw error;
                                        return new Promise((resolve) => {
                                            const reader = new FileReader();
                                            reader.onloadend = () => resolve(reader.result.split(',')[1]);
                                            reader.readAsDataURL(blob);
                                        });
                                    } catch (err) {
                                        console.warn(`⚠️ Imagem não encontrada (Local/Nuvem): ${path}`, err);
                                        return null;
                                    }
                                }
                                return null;
                            };

                            try {
                                const ddsObj = {
                                    base64: exportShift.foto_unificada?.base64,
                                    localPreview: exportShift.foto_unificada?.localPreview,
                                    dds_image_path: exportShift.dds_image_path
                                };
                                const ddsBase64 = await getImageData(ddsObj);
                                if (ddsBase64) {
                                    imgs.file("01_ABERTURA.jpg", ddsBase64, { base64: true });
                                } else {
                                    console.warn("❌ FOTO DDS NÃO ENCONTRADA.");
                                }
                            } catch (e) {
                                console.error("Erro ao processar DDS:", e);
                            }

                            for (let idx = 0; idx < exportLogs.length; idx++) {
                                const l = exportLogs[idx];

                                const pPausa = await getImageData(l.tempPausePhoto);
                                if (pPausa) imgs.file(`LOG_${idx}_PAUSA.jpg`, pPausa, { base64: true });

                                const pImp = await getImageData(l.photoProblem);
                                if (pImp) imgs.file(`LOG_${idx}_IMPEDIMENTO.jpg`, pImp, { base64: true });

                                const pDestA = await getImageData(l.photoBefore);
                                if (pDestA) imgs.file(`LOG_${idx}_DEST_A.jpg`, pDestA, { base64: true });
                                const pDestD = await getImageData(l.photoAfter);
                                if (pDestD) imgs.file(`LOG_${idx}_DEST_D.jpg`, pDestD, { base64: true });

                                if (l.photosBefore) {
                                    for (let i = 0; i < l.photosBefore.length; i++) {
                                        const data = await getImageData(l.photosBefore[i]);
                                        if (data) imgs.file(`ARV_${idx}_ANTES_${i + 1}.jpg`, data, { base64: true });
                                    }
                                }

                                if (l.photosAfter) {
                                    for (let i = 0; i < l.photosAfter.length; i++) {
                                        const data = await getImageData(l.photosAfter[i]);
                                        if (data) imgs.file(`ARV_${idx}_DEPOIS_${i + 1}.jpg`, data, { base64: true });
                                    }
                                }
                            }

                            const blob = await zip.generateAsync({
                                type: "blob",
                                compression: "STORE",  
                                streamFiles: true
                            });

                            try {
                                const fileName = `Backup_Completo_${journeyDate}_${safePlaca}.zip`;
                                await supabaseClient.storage.from('backups_zip').upload(fileName, blob, { upsert: true });
                            } catch (err) { console.error("Erro no backup nuvem ZIP", err); }

                            const a = document.createElement("a");
                            a.href = URL.createObjectURL(blob);
                            a.download = `RAD_MCR_${journeyDate}_${safePlaca}.zip`;
                            a.click();

                            setDownloadedBlob(blob);
                            setView('download_confirm');
                        } catch (e) {
                            alert("Erro ao Gerar ZIP: " + e.message + "\n\nTente baixar apenas o JSON se persistir.");
                            console.error(e);
                        } finally { setIsExporting(false); }
                    }} className="w-full py-6 rounded-3xl bg-audit-600 text-white font-black text-xl shadow-xl mt-2 uppercase flex items-center justify-center gap-3 disabled:opacity-50"><i className={isExporting ? "fas fa-spinner fa-spin" : "fas fa-cloud-upload-alt"}></i> {isExporting ? "ENVIANDO DADOS..." : "FINALIZAR E ENVIAR"}</button>

                    <button onClick={() => setView('dashboard')} className="mt-8 text-slate-300 font-black uppercase text-[10px] underline">Voltar</button>
                </div>
            );

            if (view === 'download_confirm') {
                const hmacSecret = shift?.id_banco || 'MCR_RAD_V21_FALLBACK';
                const safetyHmac = CryptoJS.HmacSHA256('safe', hmacSecret).toString().slice(0, 20);
                localStorage.setItem('mcr_safety_exit', 'safe');
                localStorage.setItem('mcr_safety_exit_hmac', safetyHmac);

                return (
                    <div className="min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-8 text-center text-white screen-fade">
                        <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-2xl animate-bounce">
                            <i className="fas fa-check text-4xl text-emerald-600"></i>
                        </div>
                        <h1 className="text-4xl font-black mb-2 uppercase">Turno Finalizado!</h1>
                        <p className="font-medium opacity-80 mb-8 max-w-xs mx-auto">Os dados foram sincronizados com sucesso. O arquivo ZIP contém as fotos e a <b>PLANILHA EXCEL</b> para seu relatório mensal (RAM).</p>

                        <div className="space-y-3 w-full max-w-sm">
                            <button onClick={() => {
                                const a = document.createElement("a");
                                a.href = URL.createObjectURL(downloadedBlob);
                                a.download = `RAD_MCR_REBACKUP.zip`;
                                a.click();
                            }} className="w-full py-4 rounded-xl bg-white/20 hover:bg-white/30 font-bold uppercase transition backdrop-blur-sm border border-white/30">Baixar Novamente</button>

                            <button onClick={async () => {
                                if (syncQueue.length > 0) {
                                    alert(`⚠️ Aguarde: ${syncQueue.length} item(s) ainda sendo enviados.`);
                                    return;
                                }
                                await idbKeyval.clear();
                                localStorage.removeItem('mcr_safety_exit');
                                localStorage.removeItem('mcr_safety_exit_hmac');
                                window.location.reload();
                            }} className="w-full py-4 rounded-xl bg-white text-emerald-700 font-black uppercase shadow-xl hover:scale-105 transition">Iniciar Novo Turno</button>
                        </div>
                        <p className="mt-8 text-[10px] opacity-60 font-mono">ID: {shift?.id?.split('-')[0]}</p>
                    </div>
                );
            }

            if (view === 'loading') return <div className="h-screen bg-audit-900 flex items-center justify-center text-white font-black italic animate-pulse">RAD PODA v21...</div>;

            if (confirmModal) return (
                <div className="fixed inset-0 z-[99999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 screen-fade">
                    <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center">
                        <i className="fas fa-exclamation-triangle text-amber-500 text-4xl mb-4"></i>
                        <h3 className="text-lg font-black text-slate-800 uppercase leading-tight mb-2">{confirmModal.title}</h3>
                        <p className="text-sm text-slate-500 mb-8 whitespace-pre-line">{confirmModal.body}</p>
                        <div className="space-y-3">
                            <button onClick={confirmModal.onConfirm}
                                className="w-full bg-audit-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm">
                                {confirmModal.confirmLabel}
                            </button>
                            <button onClick={confirmModal.onCancel}
                                className="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black uppercase text-xs">
                                {confirmModal.cancelLabel}
                            </button>
                        </div>
                    </div>
                </div>
            );

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
