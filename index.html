        // ============================================================
        // EXTRAÇÃO DE METADADOS EXIF DAS FOTOS (Anti-Fraude)
        // ============================================================
        function extractEXIF(arrayBuffer) {
            try {
                const view = new DataView(arrayBuffer);
                if (view.getUint16(0) !== 0xFFD8) return {};
                let offset = 2;
                while (offset < view.byteLength - 2) {
                    const marker = view.getUint16(offset);
                    if (marker === 0xFFE1) {
                        const len = view.getUint16(offset + 2);
                        const exifStr = String.fromCharCode(...new Uint8Array(arrayBuffer, offset + 4, 4));
                        if (exifStr === 'Exif') {
                            const tiffStart = offset + 10;
                            const tiffView = new DataView(arrayBuffer, tiffStart);
                            const le = tiffView.getUint16(0) === 0x4949;
                            const ifo = tiffView.getUint32(4, le);
                            const cnt = tiffView.getUint16(ifo, le);
                            const res = {};
                            const STR_TAGS = { 0x010F: 'Make', 0x0110: 'Model', 0x9003: 'DateTimeOriginal', 0x013B: 'Artist' };
                            for (let i = 0; i < cnt; i++) {
                                const e = ifo + 2 + i * 12;
                                const tag = tiffView.getUint16(e, le);
                                if (STR_TAGS[tag]) {
                                    const n = tiffView.getUint32(e + 4, le);
                                    let vOff = (n > 4) ? tiffView.getUint32(e + 8, le) : (e + 8);
                                    const bytes = new Uint8Array(arrayBuffer, tiffStart + vOff, Math.max(0, n - 1));
                                    res[STR_TAGS[tag]] = String.fromCharCode(...bytes).trim();
                                }
                            }
                            return res;
                        }
                        offset += 2 + len;
                    } else if ((marker & 0xFF00) === 0xFF00) {
                        offset += 2 + view.getUint16(offset + 2);
                    } else { break; }
                }
            } catch(e) {}
            return {};
        }

            // processPhoto: Comprime a imagem E extrai metadados EXIF para auditoria
            const processPhoto = async (file) => {
                if (!file) return null;
                // Qualidade boa para visualização clara, mas sem estouro de memória
                const options = { maxSizeMB: 0.3, maxWidthOrHeight: 1440, useWebWorker: true };
                try {
                    // Extrair EXIF do arquivo ORIGINAL (antes de comprimir, pois compressão apaga EXIF)
                    const originalBuffer = await file.arrayBuffer();
                    const exif = extractEXIF(originalBuffer);

                    exif.arquivoOriginal = file.name;
                    exif.tamanhoOriginalKB = Math.round(file.size / 1024);

                    const compressed = await imageCompression(file, options);
                    const base64 = await new Promise(r => { const reader = new FileReader(); reader.readAsDataURL(compressed); reader.onloadend = () => r(reader.result); });

            const stats = useMemo(() => {

                    const bruteExec = log.executionDurationSec || 0;
                    const pausedInTree = (log.totalPausedSeconds || 0);
                    return acc + Math.max(0, bruteExec - pausedInTree);

                                    <div><p className="text-[6px] font-black uppercase opacity-60 leading-none">Manejo</p><p className="text-[11px] font-black font-mono mt-0.5">{formatDuration(stats.manejo)}</p></div>

                            <div className="border-r border-slate-100"><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Podas</p><p className="text-xl font-black text-emerald-600">{stats.treesPruned}</p></div>
                            <div><p className="text-[8px] font-black text-slate-400 uppercase mb-1">Cortes</p><p className="text-xl font-black text-red-600">{stats.treesSuppressed}</p></div>
                        </div>
                        <div className="space-y-4">
                            <button onClick={() => { setActiveAction({ pruningTypes: [], status: 'OK', totalPausedSeconds: 0, photosBefore: [], photosAfter: [], startTime: Date.now(), copelRequired: 'NÃO' }); setView('tree_form'); }} className="w-full bg-audit-600 text-white p-9 rounded-[2rem] shadow-xl flex flex-col items-center gap-2 btn-active">
                                <i className="fas fa-plus-circle text-3xl"></i><span className="font-black text-xl uppercase tracking-tighter">Registrar Manejo</span>
                            </button>
                            <button onClick={() => { setActiveAction({ type: 'pause', isPaused: false, photosBefore: [], photosAfter: [] }); setView('global_pause_form'); }} className="w-full bg-white border-2 border-slate-200 text-slate-600 p-6 rounded-3xl shadow-sm flex items-center justify-center gap-4 btn-active">
                                <i className="fas fa-pause-circle text-2xl"></i><span className="font-black text-lg uppercase tracking-tighter">Registrar Parada</span>
                            </button>
                        </div>
                    </div>
                    <div className="fixed bottom-0 left-0 right-0 p-4 bg-white/95 border-t z-40"><button onClick={() => setShowEndConfirm(true)} className="w-full bg-audit-900 text-white py-5 rounded-3xl font-black text-sm uppercase tracking-widest">Encerrar Turno</button></div>
                    {showEndConfirm && (
                        <div className="fixed inset-0 z-50 modal-overlay flex items-center justify-center p-6 screen-fade">
                            <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center border-t-4 border-audit-900">
                                <i className="fas fa-warning text-audit-900 text-5xl mb-4"></i><h3 className="text-xl font-black text-slate-800 uppercase leading-none">Confirmar Fechamento?</h3>
                                <div className="mt-8 space-y-3">
                                    <button onClick={() => { setShift({...shift, journeyEndTime: Date.now()}); setShowEndConfirm(false); setView('end_day'); }} className="w-full bg-audit-900 text-white py-5 rounded-2xl font-black uppercase shadow-lg">Sim, Encerrar</button>
                                    <button onClick={() => setShowEndConfirm(false)} className="w-full bg-slate-100 text-slate-400 py-4 rounded-2xl font-black uppercase text-[10px]">Voltar</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );

            // TIPOS PARA O NOVO FORMULÁRIO
            const SUBTIPOS_PODA = ["Levantamento", "Limpeza", "Adequação", "Estrutural", "Segurança", "Emergencial"];

            // FORMULÁRIO DE DADOS DA ÁRVORE (PRONTUÁRIO)
            if (view === 'tree_form') {
                const fazPoda = activeAction.fazPoda || false;
                const fazCorte = activeAction.fazCorte || false;
                const precisaOS = (fazPoda && activeAction.podaOrigem === 'protocolo') || (fazCorte && activeAction.corteClassificacao === 'protocolo');
                const togglePodaTipo = (tipo) => {
                    const cur = activeAction.podaSubtipos || [];
                    setActiveAction({...activeAction, podaSubtipos: cur.includes(tipo) ? cur.filter(x => x !== tipo) : [...cur, tipo]});
                };
                const servicoValido = (fazPoda && (activeAction.podaSubtipos?.length > 0) && activeAction.podaOrigem) ||
                                      (fazCorte && activeAction.corteClassificacao);
                return (
                    <div className="p-6 screen-fade pb-20 no-scrollbar">
                        <div className="flex items-center gap-4 mb-6"><button onClick={() => { setActiveAction(null); setView('dashboard'); }} className="w-10 h-10 rounded-full bg-slate-200 flex items-center justify-center"><i className="fas fa-arrow-left"></i></button><h2 className="text-xl font-black text-slate-800 uppercase italic leading-none">Prontuário</h2></div>
                        
                        {/* SELEÇÃO PRINCIPAL: PODA e/ou CORTE */}

                            <Label required>Tipo de Serviço</Label>
                            <p className="text-[9px] text-slate-400 font-black uppercase mb-3">Selecione o tipo de serviço da árvore</p>
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <button onClick={() => setActiveAction({...activeAction, fazPoda: !fazPoda, fazCorte: false, corteClassificacao: null, podaSubtipos: fazPoda ? [] : activeAction.podaSubtipos, podaOrigem: fazPoda ? null : activeAction.podaOrigem})}
                                    className={`p-5 rounded-2xl border-2 font-black text-sm uppercase transition-all flex flex-col items-center gap-2 ${fazPoda ? 'border-audit-600 bg-emerald-50 text-audit-700' : 'border-slate-200 text-slate-400'}`}>
                                    <i className={`fas fa-scissors text-xl ${fazPoda ? 'text-audit-600' : 'text-slate-300'}`}></i>
                                    PODA
                                    {fazPoda && <i className="fas fa-check-circle text-audit-600 text-sm"></i>}
                                </button>
                                <button onClick={() => setActiveAction({...activeAction, fazCorte: !fazCorte, fazPoda: false, podaSubtipos: [], podaOrigem: null, corteClassificacao: fazCorte ? null : activeAction.corteClassificacao})}
                                    className={`p-5 rounded-2xl border-2 font-black text-sm uppercase transition-all flex flex-col items-center gap-2 ${fazCorte ? 'border-red-500 bg-red-50 text-red-700' : 'border-slate-200 text-slate-400'}`}>
                                    <i className={`fas fa-tree text-xl ${fazCorte ? 'text-red-500' : 'text-slate-300'}`}></i>
                                    CORTE
                                    {fazCorte && <i className="fas fa-check-circle text-red-500 text-sm"></i>}
                                </button>
                            </div>

                            {/* SUB-OPÇÕES PODA */}
                            {fazPoda && (
                                <div className="border-t border-emerald-100 pt-4 mb-4 screen-fade">
                                    <p className="text-[10px] font-black text-audit-700 uppercase mb-2 tracking-widest"><i className="fas fa-scissors mr-1"></i> Sub-tipo de Poda:</p>
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        {SUBTIPOS_PODA.map(t => (
                                            <label key={t} className={`flex items-center p-3 border-2 rounded-xl cursor-pointer transition-all ${(activeAction.podaSubtipos||[]).includes(t) ? 'border-audit-600 bg-emerald-50' : 'border-slate-100'}`}>
                                                <input type="checkbox" className="hidden" checked={(activeAction.podaSubtipos||[]).includes(t)} onChange={() => togglePodaTipo(t)} />
                                                <i className={`fas ${(activeAction.podaSubtipos||[]).includes(t) ? 'fa-check-square text-audit-600' : 'fa-square text-slate-300'} mr-2 text-sm`}></i>
                                                <span className="text-[10px] font-black uppercase">{t}</span>
                                            </label>
                                        ))}
                                    </div>
                                    <p className="text-[10px] font-black text-audit-700 uppercase mb-2 tracking-widest">Origem da Poda:</p>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[{v:'rotina', label:'Rotina', icon:'fa-wrench'}, {v:'protocolo', label:'Com Protocolo', icon:'fa-file-alt'}].map(o => (
                                            <button key={o.v} onClick={() => setActiveAction({...activeAction, podaOrigem: o.v})}
                                                className={`p-3 rounded-xl border-2 font-black text-[10px] uppercase flex items-center gap-2 ${activeAction.podaOrigem === o.v ? 'border-audit-600 bg-emerald-50 text-audit-700' : 'border-slate-200 text-slate-400'}`}>
                                                <i className={`fas ${o.icon}`}></i>{o.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* SUB-OPÇÕES CORTE */}
                            {fazCorte && (
                                <div className="border-t border-red-100 pt-4 mb-4 screen-fade">
                                    <p className="text-[10px] font-black text-red-700 uppercase mb-2 tracking-widest"><i className="fas fa-tree mr-1"></i> Classificação do Corte:</p>
                                    <div className="grid grid-cols-2 gap-2">
                                        {[{v:'sinistro', label:'Sinistro/Emergência', icon:'fa-bolt'}, {v:'protocolo', label:'Com Protocolo/Laudo', icon:'fa-file-alt'}].map(o => (
                                            <button key={o.v} onClick={() => setActiveAction({...activeAction, corteClassificacao: o.v})}
                                                className={`p-3 rounded-xl border-2 font-black text-[10px] uppercase flex items-center gap-2 ${activeAction.corteClassificacao === o.v ? 'border-red-500 bg-red-50 text-red-700' : 'border-slate-200 text-slate-400'}`}>
                                                <i className={`fas ${o.icon}`}></i>{o.label}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* OS / PROTOCOLO - aparece se necessário */}
                            {precisaOS && (
                                <div className="border-t border-slate-100 pt-4 mb-2 screen-fade">
                                    <Label required>Nº OS / Protocolo</Label>
                                    <input className="w-full p-4 border-2 border-audit-600 rounded-2xl font-black uppercase text-sm bg-emerald-50" placeholder="NÚMERO DA OS OBRIGATÓRIO" value={activeAction.osId || ''} onChange={e => setActiveAction({...activeAction, osId: e.target.value.toUpperCase()})} />
                                </div>
                            )}
                            {!precisaOS && (
                                <div className="border-t border-slate-100 pt-4 mb-2">
                                    <Label>Nº OS / Protocolo (Opcional)</Label>
                                    <input className="w-full p-4 border-2 rounded-2xl font-black uppercase text-sm" placeholder="SE HOUVER..." value={activeAction.osId || ''} onChange={e => setActiveAction({...activeAction, osId: e.target.value.toUpperCase()})} />
                                </div>
                            )}

                            <div className="border-t border-slate-100 pt-4 mt-2">
                                <Label required>Suspensão Rede (COPEL)?</Label>
                                <select className={`w-full p-4 border-2 rounded-2xl font-black text-sm ${activeAction.copelRequired === 'SIM' ? 'border-amber-500 bg-amber-50' : 'bg-white'}`} value={activeAction.copelRequired || 'NÃO'} onChange={e => setActiveAction({...activeAction, copelRequired: e.target.value})}><option value="NÃO">NÃO NECESSÁRIO</option><option value="SIM">SIM (SOLICITAR DESLIGAMENTO)</option></select>
                            </div>
                        </Card>

                        {/* DADOS DA ÁRVORE */}
                        <Card>
                            <Label required>Espécie</Label>
                            <input list="especies" className="w-full p-4 border-2 rounded-2xl bg-slate-50 font-black mb-4 uppercase text-sm" placeholder="Pesquisar espécie..." value={activeAction.species || ''} onChange={e => setActiveAction({...activeAction, species: e.target.value.toUpperCase()})} /><datalist id="especies">{LISTA_ESPECIES.map(s => <option key={s} value={s} />)}</datalist>
                            <div className="grid grid-cols-2 gap-4">
                                <div><Label required>CAP (cm)</Label><input type="number" className="w-full p-4 border-2 rounded-2xl font-black text-sm" placeholder="CAP" value={activeAction.cap || ''} onChange={e => setActiveAction({...activeAction, cap: e.target.value})} /></div>
                                <div><Label required>Altura (m)</Label><input type="number" className="w-full p-4 border-2 rounded-2xl font-black text-sm" placeholder="Altura" value={activeAction.height || ''} onChange={e => setActiveAction({...activeAction, height: e.target.value})} /></div>
                            </div>
                        </Card>
                        
                        <Card className={`border-2 ${activeAction.status === 'IMPEDIDO' ? 'border-red-600 bg-red-50' : 'border-slate-200 bg-white'}`}>
                            <label className="flex items-center gap-3 cursor-pointer p-2">
                                <input type="checkbox" className="w-6 h-6 rounded" checked={activeAction.status === 'IMPEDIDO'} onChange={e => setActiveAction({...activeAction, status: e.target.checked ? 'IMPEDIDO' : 'OK'})} />
                                <span className="font-black text-red-600 uppercase text-xs">Relatar Impedimento (Serviço Impossível)</span>
                            </label>
                            {activeAction.status === 'IMPEDIDO' && (
                                <div className="mt-4 space-y-4 screen-fade">
                                    <Label required>Relato Técnico do Impedimento</Label>
                                    <textarea className="w-full p-3 border-2 border-red-300 rounded-2xl text-sm font-black uppercase" placeholder="DESCREVA O MOTIVO DA IMPOSSIBILIDADE..." rows="3" value={activeAction.problemReport || ''} onChange={e => setActiveAction({...activeAction, problemReport: e.target.value})} />
                                    <PhotoUpload label="FOTO EVIDÊNCIA" help="MOSTRAR O IMPEDIMENTO" preview={getBase64(activeAction.photoProblem)} onCapture={async f => setActiveAction({...activeAction, photoProblem: await processPhoto(f)})} />
                                </div>
                            )}
                        </Card>

                        <Card className="border-2 border-audit-600 bg-emerald-50 shadow-md">
                            <Label required>3 Fotos de Antes (Orientação TR)</Label>
                            <div className="grid grid-cols-3 gap-2 mb-2">
                                <PhotoUpload label="F1" help="GERAL" preview={getBase64(activeAction.photosBefore?.[0])} onCapture={async f => { let list = [...activeAction.photosBefore]; list[0] = await processPhoto(f); setActiveAction({...activeAction, photosBefore: list}); }} />
                                <PhotoUpload label="F2" help="DETALHE" preview={getBase64(activeAction.photosBefore?.[1])} onCapture={async f => { let list = [...activeAction.photosBefore]; list[1] = await processPhoto(f); setActiveAction({...activeAction, photosBefore: list}); }} />
                                <PhotoUpload label="F3" help="RUA" preview={getBase64(activeAction.photosBefore?.[2])} onCapture={async f => { let list = [...activeAction.photosBefore]; list[2] = await processPhoto(f); setActiveAction({...activeAction, photosBefore: list}); }} />
                            </div>
                            
                            {activeAction.status === 'IMPEDIDO' ? (
                                <button disabled={!activeAction.species || !activeAction.problemReport || !activeAction.photoProblem || !gps.lat || !servicoValido} onClick={() => {
                                    const now = Date.now();
                                    const formDur = Math.floor((now - activeAction.startTime) / 1000);
                                    const servDesc = [activeAction.fazPoda && `PODA (${(activeAction.podaSubtipos||[]).join('/')}/${activeAction.podaOrigem||''})`, activeAction.fazCorte && `CORTE (${activeAction.corteClassificacao||''})`].filter(Boolean).join(' + ');
                                    setLogs([{ 
                                        ...activeAction, 
                                        type: 'tree',
                                        endTime: now, 
                                        status: 'IMPEDIDO', 
                                        formDurationSec: formDur,
                                        executionDurationSec: 0,
                                        effectiveDurationSec: formDur,
                                        servDesc,
                                        pruningTypes: [...(activeAction.podaSubtipos||[]), activeAction.fazCorte ? 'CORTE TOTAL (SUPRESSÃO)' : null].filter(Boolean),
                                        coords: `${gps.lat},${gps.lng}`, 
                                        timestamp: new Date().toISOString() 
                                    }, ...logs]);
                                    setActiveAction(null); setView('dashboard');
                                }} className="w-full mt-4 py-6 rounded-3xl bg-red-600 text-white font-black uppercase text-xl shadow-lg disabled:bg-slate-300">Registrar Impedimento</button>
                            ) : (
                                <button disabled={!activeAction.species || !activeAction.cap || !activeAction.height || !servicoValido || (precisaOS && !activeAction.osId) || activeAction.photosBefore?.filter(p=>p).length < 3 || !gps.lat} onClick={() => { 
                                    const now = Date.now();
                                    const formDuration = Math.floor((now - activeAction.startTime) / 1000);
                                    const servDesc = [activeAction.fazPoda && `PODA (${(activeAction.podaSubtipos||[]).join('/')})`, activeAction.fazCorte && `CORTE (${activeAction.corteClassificacao||''})`].filter(Boolean).join(' + ');
                                    const pruningTypes = [...(activeAction.podaSubtipos||[]), activeAction.fazCorte ? 'CORTE TOTAL (SUPRESSÃO)' : null].filter(Boolean);
                                    setActiveAction({ ...activeAction, type: 'tree', executionStartTime: now, formDurationSec: formDuration, pruningTypes, servDesc, desc: `${activeAction.species} [${activeAction.osId || servDesc}]`, treeCoords: `${gps.lat},${gps.lng}` }); 
                                    setView('active_service'); 
                                }} className="w-full mt-4 py-6 rounded-3xl bg-audit-600 text-white font-black uppercase text-xl shadow-lg disabled:bg-slate-300">Iniciar Manejo Técnico</button>
                            )}
                        </Card>
                    </div>
                );
            }

            // TELA DE EXECUÇÃO
            if (view === 'active_service') {
                const execElapsed = Math.floor((Date.now() - (activeAction.executionStartTime || activeAction.startTime)) / 1000);
                const currentPausedSec = (activeAction.totalPausedSeconds || 0);
                const netExecElapsed = Math.max(0, execElapsed - currentPausedSec);
                const formElapsed = activeAction.formDurationSec || 0;
                const totalEffective = formElapsed + netExecElapsed;
                return (
                    <div className="p-6 screen-fade flex flex-col min-h-screen no-scrollbar">
                        <div className="text-center mt-6"><span className="bg-audit-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest leading-none">Execução em Curso</span><h2 className="text-xl font-black text-slate-800 uppercase mt-5 leading-tight">{activeAction.desc}</h2></div>
                        <div className="flex-1 flex flex-col justify-center items-center">
                            <div className="text-7xl font-black text-slate-900 timer-glow leading-none font-mono tracking-tighter">{formatDuration(totalEffective)}</div>
                            <p className="text-slate-400 font-black text-[11px] mt-2 uppercase tracking-widest">Hm Efetivo Total</p>
                            <div className="mt-12 grid grid-cols-2 gap-4 w-full max-w-sm">
                                <div className="bg-slate-50 p-5 rounded-[2rem] border border-slate-200 text-center"><p className="text-[7px] font-black text-slate-400 uppercase mb-1">Preparo</p><p className="text-lg font-black text-slate-600 font-mono leading-none">{formatDuration(formElapsed)}</p></div>
                                <div className="bg-emerald-50 p-5 rounded-[2rem] border border-emerald-200 text-center"><p className="text-[7px] font-black text-emerald-500 uppercase mb-1">Poda</p><p className="text-lg font-black text-emerald-700 font-mono leading-none">{formatDuration(netExecElapsed)}</p></div>
                            </div>
                        </div>
                        <div className="mt-auto space-y-4 pb-8">
                            <button onClick={() => setView('pause_during_tree')} className="w-full bg-amber-500 text-black py-5 rounded-3xl font-black text-lg shadow-xl flex items-center justify-center gap-3 active:scale-95 transition-transform"><i className="fas fa-pause"></i> Interromper Manejo</button>
                            <Card className="border-2 border-audit-900 shadow-xl">
                                <Label required>3 Fotos de Depois</Label>
                                <div className="grid grid-cols-3 gap-2 mb-2">
                                    <PhotoUpload label="F1" help="COPA" preview={getBase64(activeAction.photosAfter?.[0])} onCapture={async f => { let list = [...activeAction.photosAfter]; list[0] = await processPhoto(f); setActiveAction({...activeAction, photosAfter: list}); }} />
                                    <PhotoUpload label="F2" help="CORTE" preview={getBase64(activeAction.photosAfter?.[1])} onCapture={async f => { let list = [...activeAction.photosAfter]; list[1] = await processPhoto(f); setActiveAction({...activeAction, photosAfter: list}); }} />
                                    <PhotoUpload label="F3" help="LIMPO" preview={getBase64(activeAction.photosAfter?.[2])} onCapture={async f => { let list = [...activeAction.photosAfter]; list[2] = await processPhoto(f); setActiveAction({...activeAction, photosAfter: list}); }} />
                                </div>
                                <button disabled={activeAction.photosAfter?.filter(p=>p).length < 3} onClick={() => { 
                                    const now = Date.now();
                                    const totalDuration = Math.floor((now - activeAction.startTime) / 1000);
                                    const executionDuration = totalDuration - (activeAction.formDurationSec || 0);
                                    setLogs([{ ...activeAction, endTime: now, durationSec: totalDuration, effectiveDurationSec: totalDuration - (activeAction.totalPausedSeconds || 0), executionDurationSec: executionDuration, coords: activeAction.treeCoords || `${gps.lat},${gps.lng}`, status: 'OK', timestamp: new Date().toISOString() }, ...logs]); 
                                    setActiveAction(null); setView('dashboard'); 
                                }} className="w-full mt-4 py-5 rounded-2xl bg-audit-900 text-white font-black uppercase shadow-xl disabled:bg-slate-300">Finalizar e Salvar</button>
                            </Card>
                        </div>
                    </div>
                );
            }

            // TELAS DE PAUSA / INTERVALO
            if (view === 'global_pause_form' || view === 'pause_during_tree') {
                const isOther = activeAction?.tempPauseReason === 'Outros';
                return (
                    <div className="p-6 screen-fade no-scrollbar">
                        <h2 className="text-xl font-black text-slate-800 mb-6 uppercase italic">Registrar Parada</h2>
                        <Card>
                            <Label required>Motivo da Interrupção</Label>
                            <select className="w-full p-4 border-2 rounded-2xl mb-4 font-black bg-white text-sm" value={activeAction?.tempPauseReason || ''} onChange={e => setActiveAction({...activeAction, tempPauseReason: e.target.value})}><option value="">Selecione...</option>{PAUSE_REASONS.map(r => <option key={r} value={r}>{r}</option>)}</select>
                            {isOther && (<div className="mb-4"><Label required>Motivação Detalhada</Label><textarea className="w-full p-3 border-2 border-amber-300 rounded-2xl text-sm font-black uppercase" rows="3" placeholder="DESCREVA O MOTIVO..." value={activeAction.customPauseReason || ''} onChange={e => setActiveAction({...activeAction, customPauseReason: e.target.value})} /></div>)}
                            <Label required>Foto Evidência (Obrigatório)</Label>
                            <PhotoUpload label="FOTO PAUSA" onCapture={async f => setActiveAction({...activeAction, tempPausePhoto: await processPhoto(f)})} preview={activeAction?.tempPausePhoto} />
                        </Card>
                        <button disabled={!activeAction?.tempPauseReason || !activeAction?.tempPausePhoto || (isOther && !activeAction.customPauseReason)} onClick={() => { 
                            const now = Date.now();
                            const isNewPause = !activeAction?.startTime;
                            setActiveAction({ ...activeAction, type: activeAction?.type || 'pause', isPaused: true, pauseStartTime: now, startTime: isNewPause ? now : activeAction.startTime, pauseCoords: `${gps.lat},${gps.lng}` }); 
                            setPauseElapsed(0); setView('active_pause_screen'); 
                        }} className="w-full py-6 rounded-3xl bg-amber-600 text-white font-black text-xl uppercase shadow-xl disabled:bg-slate-300">Confirmar Pausa</button>
                        <button onClick={()=>setView(activeAction.type==='tree' ? 'active_service' : 'dashboard')} className="w-full p-5 text-slate-400 font-black uppercase text-[10px] tracking-widest underline decoration-dotted">Voltar</button>
                    </div>
                );
            }

            if (view === 'active_pause_screen') return (
                <div className="p-6 screen-fade flex flex-col min-h-screen bg-slate-900 text-white no-scrollbar">
                    <div className="text-center mt-12 px-4"><span className="bg-amber-500 text-black px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-widest">Serviço Suspenso</span><h2 className="text-2xl font-black uppercase mt-6 text-amber-500 leading-tight">{activeAction.tempPauseReason === 'Outros' ? activeAction.customPauseReason : activeAction.tempPauseReason}</h2></div>
                    <div className="flex-1 flex flex-col justify-center items-center px-2">
                        <div className="fit-timer font-black text-amber-500 pause-glow leading-none font-mono tracking-tighter">{formatDuration(pauseElapsed)}</div>
                        <p className="text-[10px] font-black text-slate-500 mt-4 uppercase tracking-widest">Cronômetro de Parada</p>
                    </div>
                    <button onClick={() => { const pDur = Math.floor((Date.now() - activeAction.pauseStartTime) / 1000); 
                        if (activeAction.type === 'pause') { setLogs([{...activeAction, endTime: Date.now(), durationSec: pDur, status: 'PAUSA', timestamp: new Date().toISOString(), coords: activeAction.pauseCoords || `${gps.lat},${gps.lng}`}, ...logs]); setActiveAction(null); setView('dashboard'); } 
                        else { setActiveAction({...activeAction, isPaused: false, totalPausedSeconds: (activeAction.totalPausedSeconds || 0) + pDur, tempPauseReason: null, tempPausePhoto: null, customPauseReason: null}); setView('active_service'); }
                    }} className="bg-emerald-600 text-white py-7 rounded-[2rem] font-black text-2xl mb-12 uppercase shadow-xl tracking-tighter mx-4">Retomar Operação</button>
                </div>
            );

            // RESUMO FINAL E ENVIO
            if (view === 'end_day') return (
                <div className="p-6 screen-fade text-center pb-12 no-scrollbar">
                    <i className="fas fa-circle-check text-audit-600 text-5xl mb-4"></i><h2 className="text-2xl font-black text-audit-900 uppercase leading-none tracking-tighter">Fechamento do Dia</h2>
                    
                    <Card className="bg-slate-50 border-slate-200 mt-4 text-left p-3">
                        <p className="text-[9px] font-black text-audit-600 uppercase mb-2 leading-none tracking-widest"><i className="fas fa-shield-halved mr-1"></i> Proteção de Dados:</p>
                        <p className="text-[10px] text-slate-500 font-bold leading-tight">O sistema salva tudo automaticamente no seu navegador. Se o celular estragar, os dados permanecem salvos até que o cache do navegador seja limpo. Em caso de perda, apenas o envio do RAD garante a segurança total.</p>
                    </Card>

                    <Card className="bg-emerald-50 mt-4 space-y-4 text-left border-audit-200">
                        <div className="flex justify-between border-b border-emerald-100 pb-2 font-black"><span className="text-[10px] text-emerald-600 uppercase tracking-widest leading-none">Hm Efetivo Acumulado:</span><span className="text-sm font-mono">{formatDuration(stats.work)}</span></div>
                        <div className="flex justify-between border-b border-emerald-100 pb-2"><span className="text-[10px] font-black text-slate-400 uppercase tracking-widest leading-none">Logística / Pausas:</span><span className="text-sm font-bold text-slate-800 font-mono">{formatDuration(stats.logistics)}</span></div>
                        <div className="flex justify-between font-black text-audit-700 border-t pt-2 mt-2"><span className="text-[11px] uppercase tracking-widest leading-none font-black text-audit-900">Jornada Total:</span><span className="text-base font-black font-mono">{formatDuration(stats.journey)}</span></div>
                    </Card>
                    
                    <div className="grid grid-cols-3 gap-2 mb-6 text-center">
                        <div className="bg-white p-3 rounded-2xl border border-emerald-100"><p className="text-[7px] font-black text-slate-400 uppercase">Atendidas</p><p className="text-lg font-black">{stats.totalTrees}</p></div>
                        <div className="bg-white p-3 rounded-2xl border border-emerald-100"><p className="text-[7px] font-black text-slate-400 uppercase">Podadas</p><p className="text-lg font-black text-emerald-600">{stats.treesPruned}</p></div>
                        <div className="bg-white p-3 rounded-2xl border border-emerald-100"><p className="text-[7px] font-black text-slate-400 uppercase">Cortes</p><p className="text-lg font-black text-red-600">{stats.treesSuppressed}</p></div>
                    </div>

                    <div class="p-4 bg-emerald-50 rounded-2xl text-left border border-emerald-200 mb-6">
                        <p class="text-[9px] font-black text-emerald-700 uppercase mb-2 leading-none tracking-widest"><i class="fas fa-envelope mr-1"></i> Destinatário do RAD:</p>
                        <p class="text-[11px] text-emerald-900 font-black mb-2">{TARGET_EMAIL}</p>
                        <p class="text-[8px] font-bold text-emerald-600 uppercase leading-tight italic">O arquivo será exportado num pacote normal com Excel Formatado. <b>Atenção:</b> Só limpe o aparelho após confirmar que o arquivo foi enviado!</p>
                    </div>

                    <button disabled={isExporting} onClick={async () => {
                            setIsExporting(true);
                            try {
                                const zip = new JSZip();
                                const shiftInfo = { ...shift, totalStats: stats };
                                zip.file("DADOS_DETALHADOS_AUDITORIA.json", JSON.stringify({ shift: shiftInfo, logs }, null, 2));

                                const humanHeaders = [
                                    "Status da Operação", "Nº Protocolo / OS", "Descrição (Espécie)", 
                                    "Início do Serviço", "Término do Serviço", "Duração Efetiva Total", 
                                    "Tempo de Preparo", "Tempo de Manejo (Corte)", "Coordenadas (GPS)", 
                                    "Encarregado da Equipe", "Placa Veículo/Munk", "Dependência COPEL?", "Data/Hora do Registo"
                                ];
                                
                                const formatDateTime = (iso) => {
                                    if (!iso) return '';
                                    try {
                                        const d = new Date(iso);
                                        return isNaN(d) ? iso : d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', year:'numeric', hour:'2-digit', minute:'2-digit', second:'2-digit' });
                                    } catch(e) { return iso; }
                                };

                                const allCsvRows = [];
                                logs.forEach(l => {
                                    const prep = l.formDurationSec || 0;
                                    const mane = (l.executionDurationSec || 0) - (l.totalPausedSeconds || 0);
                                    allCsvRows.push([
                                        l.status,
                                        l.osId || 'ROTINA',
                                        l.desc,
                                        formatDateTime(new Date(l.startTime).toISOString()),
                                        formatDateTime(new Date(l.endTime).toISOString()),
                                        formatDuration(l.effectiveDurationSec || 0),
                                        formatDuration(prep),
                                        formatDuration(mane),
                                        l.coords || '',
                                        shift.operador,
                                        shift.placa,
                                        l.copelRequired || 'NÃO',
                                        formatDateTime(l.timestamp || '')
                                    ]);
                                });

                                const wsData = [humanHeaders, ...allCsvRows];
                                const ws = XLSX.utils.aoa_to_sheet(wsData);
                                const wscols = humanHeaders.map(h => ({wch: Math.max(h.length, 15)}));
                                ws['!cols'] = wscols;
                                const wb = XLSX.utils.book_new();
                                XLSX.utils.book_append_sheet(wb, ws, "RELATÓRIO_PODA");
                                const excelBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                                
                                zip.file(`RELATÓRIO_CONSOLIDADO_${new Date().toISOString().slice(0,10)}.xlsx`, excelBuffer);

                                // Coletar todos os metadados EXIF para o arquivo de auditoria
                                const exifAuditoria = {
                                    versaoApp: APP_VERSION,
                                    dataHoraExportacao: new Date().toISOString(),
                                    operador: shift.operador,
                                    placa: shift.placa,
                                    fotos: []
                                };
                                const addPhoto = (fotoObj, nome) => {
                                    const b64 = getBase64(fotoObj);
                                    if (!b64) return false;
                                    const exif = (fotoObj && typeof fotoObj === 'object') ? fotoObj.exif : {};
                                    exifAuditoria.fotos.push({ arquivo: nome, ...exif });
                                    return b64.split(',')[1];
                                };

                                const imgs = zip.folder("EVIDENCIAS_GEORREFERENCIADAS");
                                const b64dds = addPhoto(shift.foto_unificada, '01_ABERTURA.jpg');
                                if(b64dds) imgs.file("01_ABERTURA.jpg", b64dds, {base64: true});
                                logs.forEach((l, idx) => {
                                    const b64pp = addPhoto(l.tempPausePhoto, `LOG_${idx}_PAUSA.jpg`);
                                    if(b64pp) imgs.file(`LOG_${idx}_PAUSA.jpg`, b64pp, {base64: true});
                                    const b64imp = addPhoto(l.photoProblem, `LOG_${idx}_IMPEDIMENTO.jpg`);
                                    if(b64imp) imgs.file(`LOG_${idx}_IMPEDIMENTO.jpg`, b64imp, {base64: true});
                                    l.photosBefore?.forEach((p, i) => {
                                        const b = addPhoto(p, `ARV_${idx}_ANTES_${i+1}.jpg`);
                                        if(b) imgs.file(`ARV_${idx}_ANTES_${i+1}.jpg`, b, {base64: true});
                                    });
                                    l.photosAfter?.forEach((p, i) => {
                                        const b = addPhoto(p, `ARV_${idx}_DEPOIS_${i+1}.jpg`);
                                        if(b) imgs.file(`ARV_${idx}_DEPOIS_${i+1}.jpg`, b, {base64: true});
                                    });
                                });
                                // Arquivo de metadados EXIF para auditoria anti-fraude
                                zip.file("METADADOS_FOTOS_AUDITORIA.json", JSON.stringify(exifAuditoria, null, 2));
                                
                                const blob = await zip.generateAsync({type:"blob"});
                                const fileName = `RAD_MCR_DESENCRIPTADO_${new Date().toISOString().slice(0,10)}.zip`;
                                const file = new File([blob], fileName, { type: "application/zip" });

                                // Guardar ZIP gerado para os botões de compartilhamento abaixo
                                window._lastZipBlob = blob;
                                window._lastZipFile = file;
                                window._lastZipFileName = fileName;

                            } catch(e) { 
                                alert("Erro na exportação: " + e.message); 
                            } finally { 
                                setIsExporting(false); 
                            }
                        }} className="w-full py-6 rounded-3xl bg-audit-600 text-white font-black text-xl shadow-xl mt-2 uppercase tracking-tighter flex items-center justify-center gap-3"><i className={isExporting ? "fas fa-spinner fa-spin" : "fas fa-file-zipper"}></i> {isExporting ? "PROCESSANDO..." : "GERAR ZIP DO DIA"}</button>

                    {/* Botões de compartilhamento - aparecem fora do onClick do botão de gerar */}
                    <div className="grid grid-cols-2 gap-3 mt-3">
                        <button onClick={() => {
                            if (!window._lastZipFile) { alert('Gere o ZIP primeiro clicando no botão acima.'); return; }
                            if (navigator.share && navigator.canShare && navigator.canShare({ files: [window._lastZipFile] })) {
                                navigator.share({ files: [window._lastZipFile], title: 'RAD MCR', text: `RAD DO DIA - ENVIAR PARA: ${TARGET_EMAIL}` }).catch(e => { if(e.name!=='AbortError') alert('Erro ao compartilhar: '+e.message); });
                            } else { alert('Compartilhamento não suportado neste navegador. Use o botão Baixar ZIP e envie manualmente.'); }
                        }} className="py-5 rounded-2xl bg-green-500 text-white font-black text-sm shadow-lg uppercase flex items-center justify-center gap-2">
                            <i className="fab fa-whatsapp text-xl"></i> WhatsApp
                        </button>
                        <button onClick={() => {
                            if (!window._lastZipBlob) { alert('Gere o ZIP primeiro clicando no botão acima.'); return; }
                            const a = document.createElement('a'); a.href = URL.createObjectURL(window._lastZipBlob); a.download = window._lastZipFileName; a.click();
                        }} className="py-5 rounded-2xl bg-slate-700 text-white font-black text-sm shadow-lg uppercase flex items-center justify-center gap-2">
                            <i className="fas fa-download text-lg"></i> Baixar ZIP
                        </button>
                    </div>
                    <p className="text-center text-[9px] text-slate-400 font-black uppercase mt-2">Gere o ZIP → compartilhe pelo WhatsApp ou baixe para enviar por e-mail</p>
                    
                    <div className="mt-8 pt-8 border-t border-slate-100">
                        <p className="text-[10px] font-black text-red-600 uppercase mb-4 tracking-widest"><i className="fas fa-triangle-exclamation mr-1"></i> Zona de Perigo:</p>
                        <button onClick={async () => {
                            if(confirm("ATENÇÃO: Você só deve clicar aqui APÓS ter certeza que o arquivo foi enviado corretamente para o email. Isso apagará todos os dados de hoje para iniciar amanhã. Confirmar?")) {
                                await finalizeAndClearAll();
                            }
                        }} className="w-full py-4 rounded-2xl border-2 border-red-500 text-red-600 font-extrabold text-xs mb-2 uppercase hover:bg-red-50">Limpar Aparelho e Iniciar Novo Dia</button>
                    </div>
                    
                    <button onClick={()=>setView('dashboard')} className="mt-8 text-slate-300 font-black uppercase text-[10px] tracking-widest underline underline-offset-4">Voltar ao Painel</button>
                </div>
            );

            if (view === 'loading') return <div className="h-screen bg-audit-900 flex items-center justify-center text-white font-black italic tracking-widest animate-pulse">SGP AUDIT...</div>;
            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
