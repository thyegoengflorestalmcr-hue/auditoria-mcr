                        Math.abs(new Date(l.endTime || 0).getTime() - new Date(newLog.endTime || 0).getTime()) < 5000 &&
                        (l.treeId || '') === (newLog.treeId || '') &&

            const safeGetPublicUrl = (path) => path;

            // Carregamento do Local/IndexedDB ao iniciar
            useEffect(() => {

            // GPS Tracker - Exige aprovação para as funções vitais
            useEffect(() => {

                    (err) => { console.warn("Erro GPS:", err); setGps(prev => ({ ...prev, status: 'denied' })); },

            // Busca e preenchimento de endereço (Endereço se online, Coordenadas se offline/sem rede)
            useEffect(() => {

                let isMounted = true;
                
                const getAddressOrCoords = async () => {
                    if (gps.lat && gps.lng) {

                            const res = await fetch(`https://nominatim.openstreetmap.org/reverse?format=json&lat=${gps.lat}&lon=${gps.lng}&zoom=18&addressdetails=1`);
                            if (!res.ok) throw new Error("Sem rede");
                            const data = await res.json();
                            if (data && data.display_name && isMounted) {

                                setActiveAction(prev => {
                                    if (prev && (!prev.endereco || prev.endereco.includes('BUSCANDO') || !prev.endereco.trim() || prev.endereco.match(/^-?[0-9.]+,\s*-?[0-9.]+$/))) {

                    } else if (gps.status === 'denied' || gps.status === 'error') {

                        if (activeAction.endereco !== fallbackAddr && isMounted) {
                            setActiveAction(prev => {

                                return prev;
                            });

                    } else {

            // Timers

            // ============================================================

            const getExifData = (file) => {
                return new Promise((resolve) => {
                    EXIF.getData(file, function () {
                        const tags = EXIF.getAllTags(this);
                        const conv = (dms, ref) => { if(!dms) return null; let dd = dms[0] + dms[1]/60 + dms[2]/3600; return (ref==="S"||ref==="W") ? -dd : dd; };
                        resolve({ dateTime: tags.DateTimeOriginal || tags.DateTime, lat: conv(tags.GPSLatitude, tags.GPSLatitudeRef), lng: conv(tags.GPSLongitude, tags.GPSLongitudeRef) });
                    });
                });
            };

            const getUsedPhotoBase64s = () => {
                const list = [];
                if (shift && shift.foto_unificada) list.push(shift.foto_unificada);
                
                if (Array.isArray(pendingTrees)) {
                    pendingTrees.forEach(t => {
                        if (t.photosBefore) t.photosBefore.forEach(p => p && list.push(p.base64 || p));
                        if (t.photosAfter) t.photosAfter.forEach(p => p && list.push(p.base64 || p));
                    });
                }
                
                if (Array.isArray(logs)) {
                    logs.forEach(l => {
                        if (l.photosBefore) l.photosBefore.forEach(p => p && list.push(p.base64 || p));
                        if (l.photosAfter) l.photosAfter.forEach(p => p && list.push(p.base64 || p));
                    });
                }
                
                if (activeAction) {
                    if (activeAction.photosBefore) activeAction.photosBefore.forEach(p => p && list.push(p.base64 || p));
                    if (activeAction.photosAfter) activeAction.photosAfter.forEach(p => p && list.push(p.base64 || p));
                }
                
                return list.map(item => typeof item === 'string' ? item : (item ? item.base64 : null)).filter(Boolean);
            };

            const processPhoto = async (file, photoType = 'GENERICO') => {
                if (!file) return null;

                // Validação Anti-Fraude: Verificar se a foto foi capturada nos últimos 5 minutos (evitar galeria antiga)
                let photoTime = null;
                try {
                    const exif = await getExifData(file);
                    if (exif && exif.dateTime) {
                        const parts = exif.dateTime.split(/[:\s]/);
                        if (parts.length >= 6) {
                            const parsedDate = new Date(parts[0], parts[1] - 1, parts[2], parts[3], parts[4], parts[5]);
                            if (!isNaN(parsedDate.getTime())) {
                                photoTime = parsedDate.getTime();
                            }
                        }
                    }
                } catch (exifErr) {
                    console.warn("Falha ao ler EXIF para tempo:", exifErr);
                }

                if (!photoTime && file.lastModified) {
                    photoTime = file.lastModified;
                }

                if (photoTime) {
                    const diffMinutes = Math.abs(Date.now() - photoTime) / (1000 * 60);
                    const isFotoAntiga = diffMinutes > 5; 
                    if (isFotoAntiga) {
                        console.warn("⚠️ [MODO TESTE - GALERIA LIBERADA]: Foto antiga detectada (" + Math.round(diffMinutes) + " min), mas permitida para demonstração e testes no PC.");
                        // throw new Error("FOTO_ANTIGA");
                    }
                }

                try {
                    // Carrega a imagem usando ObjectURL (extremamente leve)
                    const objectUrl = URL.createObjectURL(file);
                    
                    const img = new Image();
                    img.src = objectUrl;
                    
                    // Espera carregar a imagem com timeout de segurança
                    await new Promise((res, rej) => {
                        const t = setTimeout(() => rej(new Error('timeout')), 10000);
                        img.onload = () => { clearTimeout(t); res(); };
                        img.onerror = () => { clearTimeout(t); rej(new Error('img_load_error')); };
                    });

                    // Redimensiona proporcionalmente para largura ou altura máxima de 1024px
                    let width = img.width;
                    let height = img.height;
                    const maxDim = 1024;
                    if (width > maxDim || height > maxDim) {
                        if (width > height) {
                            height = Math.round((height * maxDim) / width);
                            width = maxDim;
                        } else {
                            width = Math.round((width * maxDim) / height);
                            height = maxDim;
                        }
                    }

                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    
                    // Desenha a imagem redimensionada
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Libera o object URL imediatamente
                    URL.revokeObjectURL(objectUrl);

                    // Desenha a marca d'água de georreferenciamento (data + GPS)
                    const fontSize = Math.max(12, Math.floor(width / 35));
                    ctx.font = `bold ${fontSize}px monospace`;
                    ctx.fillStyle = 'white';
                    ctx.strokeStyle = 'black';
                    ctx.lineWidth = Math.max(1, fontSize / 8);

                    const dateStr = new Date().toLocaleString('pt-BR');
                    const lat = gps.lat;
                    const lng = gps.lng;
                    const gpsStr = (lat && lng) ? `${parseFloat(lat).toFixed(6)}, ${parseFloat(lng).toFixed(6)}` : 'GPS N/A';
                    const text = `${dateStr} | GPS: ${gpsStr}`;
                    
                    // Desenha no canto inferior esquerdo
                    ctx.strokeText(text, 20, height - 25);
                    ctx.fillText(text, 20, height - 25);

                    // Exporta como jpeg compacto direto (qualidade 0.65)
                    const base64 = canvas.toDataURL('image/jpeg', 0.65);

                    // Validação Anti-Fraude de Duplicidade de Fotos no Turno
                    try {
                        const usedBase64s = getUsedPhotoBase64s();
                        if (usedBase64s.includes(base64)) {
                            alert("⚠️ ERRO DE SEGURANÇA: Esta foto já foi utilizada neste turno!\n\nPor favor, tire uma nova foto real. A duplicação de imagens é proibida por razões de fiscalização e compliance.");
                            throw new Error("FOTO_DUPLICADA");
                        }
                    } catch (err) {
                        if (err.message === "FOTO_DUPLICADA") throw err;
                        // Silencia outros possíveis erros de leitura de array para não travar a câmera
                        console.error("Erro na validação de fotos: ", err);
                    }

                    const fileExt = (file.name || 'foto.jpg').split('.').pop() || 'jpg';
                    const treeId = activeAction?.treeId || '';
                    const treeFolder = treeId ? `${treeId}/` : '';
                    const treePrefix = treeId ? `${treeId}_` : '';
                    const fileName = `${treePrefix}${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                    const storagePath = `${shift.journeyDate || 'SEM_DATA'}/${shift.placa || 'SEM_PLACA'}/${photoType}/${treeFolder}${fileName}`;

                    return {
                        base64: base64,
                        localPreview: base64,
                        storagePath: storagePath,
                        publicUrl: base64,
                        metadata: { originalDate: dateStr, gps_lat: lat, gps_lng: lng },
                        capturedAt: new Date().toISOString()
                    };
                } catch (e) {
                    const msg = (e && e.message) ? e.message : String(e);
                    alert('Erro processamento img (' + msg + ')');
                    return null;
                }
            };


            
            const stats = useMemo(() => {
                const treeLogs = logs.filter(l => l.type === 'tree' && l.status !== 'IMPEDIDO');
                const disposalLogs = logs.filter(l => l.type === 'disposal');

                const totalFormSec = treeLogs.reduce((acc, log) => acc + (log.formDurationSec || 0), 0);
                const totalManejoPuroSec = treeLogs.reduce((acc, log) => acc + (log.effectiveDurationSec || 0), 0);
                const totalDisposalSec = disposalLogs.reduce((acc, log) => acc + (log.durationSec || 0), 0);

                // Calcula o tempo de manejo rodando no relógio atual de forma paralela
                const activeRunningTrees = pendingTrees.filter(t => t.statusFila === 'executando');
                let runningManejo = 0;
                if (activeRunningTrees.length > 0) {
                    const minStartTime = Math.min(...activeRunningTrees.map(t => t.executionStartTime || Date.now()));
                    runningManejo = Math.floor((Date.now() - minStartTime) / 1000);
                } else if (activeAction && activeAction.type === 'tree' && !activeAction.isPaused) {
                    runningManejo = elapsed;
                }

                const runningDisposal = (activeDisposal) ? disposalElapsed : 0;
                const runningPause = (activeAction?.isPaused || activeAction?.type === 'pause') ? pauseElapsed : 0;

                const hmTotalEfetivo = totalFormSec + totalManejoPuroSec + totalDisposalSec + runningManejo + runningDisposal;
                const journeySec = journeyElapsed;
                const pausesSec = logs.filter(l => l.status === 'PAUSA').reduce((acc, log) => acc + (log.durationSec || 0), 0) + runningPause;
                const logisticSec = Math.max(0, journeySec - hmTotalEfetivo - pausesSec);

                return {
                    work: hmTotalEfetivo, 
                    preparo: totalFormSec, 
                    manejo: totalManejoPuroSec, 
                    disposal: totalDisposalSec,
                    logistics: logisticSec, 
                    journey: journeySec, 
                    totalTrees: logs.filter(l => l.type === 'tree').length,
                    treesPruned: treeLogs.filter(t => t.pruningTypes?.some(p => !p.includes('CORTE'))).length,
                    treesSuppressed: treeLogs.filter(t => t.pruningTypes?.some(p => p.includes('CORTE'))).length
                };
            }, [logs, journeyElapsed, activeAction, activeDisposal, elapsed, pauseElapsed, disposalElapsed, pendingTrees]);

            const finalizeAndClearAll = async () => {
                await idbKeyval.clear();

            const renderGpsWarning = () => {

            if (view === 'setup') {

                    <div className="fade-in bg-slate-50 min-h-screen pb-24">
                        <AppHeader title="Configuração de Turno" subtitle="Marechal Cândido Rondon - PR" />

                                                try {
                                                    const cleanCap = parseCommaFloat(activeAction.cap);
                                                    const cleanHeight = parseCommaFloat(activeAction.height);
                                                    const treeId = generateTreeId(activeAction.species, cleanCap, gps.lat, gps.lng);
                                                    const coordsStr = safeCoords(gps.lat, gps.lng);
                                                    
                                                    // Auditoria Silenciosa de GPS
                                                    let auditGps = "GPS OK (ONLINE)";
                                                    if (gps.lat && gps.lng) {
                                                        if (activeAction.endereco && activeAction.endereco.match(/^-?[0-9.]+,\s*-?[0-9.]+$/)) {
                                                            auditGps = "GPS OK (OFFLINE)";
                                                        }
                                                    } else {
                                                        if (gps.status === 'denied' || gps.status === 'error') {
                                                            auditGps = shift.gps_abertura ? "AUDITORIA: GPS DESATIVADO (FALLBACK ABERTURA)" : "AUDITORIA: GPS DESATIVADO (FALLBACK CENTRO PADRAO)";
                                                        } else {
                                                            auditGps = "AUDITORIA: SINAL GPS AUSENTE/LENTO (FALLBACK)";
                                                        }
                                                    }
                                                    
                                                    // Atualiza retroativamente o storagePath das fotos de Antes com o treeId gerado
                                                    const updatedPhotosBefore = (activeAction.photosBefore || []).map((photo, i) => {
                                                        if (!photo) return null;
                                                        const fileExt = photo.storagePath.split('.').pop() || 'jpg';
                                                        const newStoragePath = `${shift.journeyDate || 'SEM_DATA'}/${shift.placa || 'SEM_PLACA'}/ANTES_${i + 1}/${treeId}/${treeId}_ANTES_${i + 1}.${fileExt}`;
                                                        return { ...photo, storagePath: newStoragePath };
                                                    });

                                                    const nowTime = Date.now();
                                                    const newTree = {
                                                        ...activeAction,
                                                        cap: cleanCap,
                                                        height: cleanHeight,
                                                        treeId,
                                                        photosBefore: updatedPhotosBefore,
                                                        type: 'tree',
                                                        statusFila: 'executando',
                                                        executionStartTime: nowTime,
                                                        startTime: nowTime,
                                                        totalPausedSeconds: 0,
                                                        endereco: activeAction.endereco || shift.bairro_local,
                                                        desc: `${activeAction.species} [${activeAction.osId || (activeAction.pruningTypes?.[0] || 'MANEJO')}]`,
                                                        treeCoords: coordsStr,
                                                        gps_auditoria: auditGps,
                                                        pruningTypes: activeAction.pruningTypes || []
                                                    };

                                                    setPendingTrees(prev => [...prev, newTree]);
                                                    
                                                    // Redireciona automaticamente ao Dashboard limpando a ação ativa
                                                    setActiveAction(null);
                                                    setView('dashboard');
                                                    
                                                    // Rola a tela suavemente para baixo após um tempo mínimo de renderização do react
                                                    setTimeout(() => {
                                                        window.scrollTo({ top: document.body.scrollHeight || 2000, behavior: 'smooth' });
                                                    }, 150);
                                                } catch (err) { alert("ERRO AO ENFILEIRAR: " + err.message); }
                                            }} 
                                            className="w-full py-5 rounded-[2rem] bg-emerald-600 text-white font-black uppercase text-sm shadow-xl flex items-center justify-center gap-3 transition-all active:scale-95 disabled:grayscale disabled:opacity-50 border-b-4 border-emerald-700">
                                            <i className="fas fa-plus text-sm"></i>
                                            Cadastrar e Enfileirar Árvore
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            

            if (view === 'active_service') {
                if (!activeAction) { setTimeout(() => setView('dashboard'), 0); return null; }
                const totalElapsed = elapsed - (activeAction.totalPausedSeconds || 0);
                
                return (
                    <div className="p-6 screen-fade flex flex-col min-h-screen no-scrollbar">

                        <div className="flex justify-between items-center mb-4">
                            <button 
                                onClick={() => {
                                    // Sincroniza fotos e progresso atual na fila antes de sair
                                    if (activeAction.fromFilaIdx !== undefined) {
                                        setPendingTrees(prev => {
                                            const list = [...prev];
                                            list[activeAction.fromFilaIdx] = {
                                                ...list[activeAction.fromFilaIdx],
                                                photosAfter: activeAction.photosAfter || []
                                            };
                                            return list;
                                        });
                                    }
                                    setView('dashboard');
                                    setActiveAction(null);
                                }}
                                className="px-4 py-2 bg-slate-100 text-slate-800 rounded-full text-xs font-black uppercase tracking-wider flex items-center gap-2 border-2 border-slate-200 active:scale-95 transition-all shadow-sm"
                            >
                                <i className="fas fa-chevron-left text-[10px]"></i> Minimizar e Voltar
                            </button>
                            <span className="bg-emerald-500/10 text-emerald-600 border border-emerald-200/50 px-3 py-1 rounded-full text-[9px] font-black uppercase tracking-widest animate-pulse">
                                Executando
                            </span>
                        </div>
                        
                        <div className="text-center mt-2">
                            <span className="bg-audit-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Em Curso</span>
                            <h2 className="text-xl font-black text-slate-800 uppercase mt-5 leading-tight">{activeAction.desc}</h2>
                            <p className="text-xs text-slate-400 font-mono mt-2">ID: {activeAction.treeId}</p>
                        </div>
                        
                        <div className="flex-1 flex flex-col justify-center items-center">
                            <div className="text-7xl font-black text-slate-900 timer-glow leading-none font-mono tracking-tighter">
                                {formatDuration(totalElapsed)}
                            </div>
                        </div>
                        
                        <div className="mt-auto space-y-4 pb-8">
                            {/* Comparativo Visual do Antes para Evitar Confusão de Árvore */}
                            {activeAction.photosBefore && activeAction.photosBefore.length > 0 && (
                                <Card className="border-2 border-slate-200 shadow-sm bg-white rounded-3xl p-4">
                                    <div className="flex items-center gap-2 mb-3">
                                        <i className="fas fa-eye text-audit-600 text-xs"></i>
                                        <Label className="!mb-0 uppercase text-[10px] font-black text-slate-800 tracking-wider">Visualização do Antes (Guia Visual)</Label>
                                    </div>
                                    <div className="grid grid-cols-3 gap-2">
                                        {activeAction.photosBefore.map((p, i) => p && (
                                            <div key={i} className="aspect-square rounded-2xl overflow-hidden border border-slate-100 shadow-inner relative">
                                                <img 
                                                    src={p.localPreview || p.base64} 
                                                    className="w-full h-full object-cover" 
                                                    alt={`Antes ${i + 1}`}
                                                    onClick={() => setZoomPhoto(p.localPreview || p.base64)}
                                                />
                                                <span className="absolute bottom-1 right-1 bg-black/60 text-white text-[8px] px-1 rounded font-bold">Antes {i + 1}</span>
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            )}

                            {/* Botões de Ação de Execução Paralela */}
                            <div className="flex justify-center w-full">
                                <button 
                                    onClick={() => setView('pause_during_tree')} 
                                    className="w-full bg-amber-500 text-slate-900 py-5 rounded-[1.8rem] border-b-4 border-amber-600 font-black text-sm uppercase shadow-xl flex items-center justify-center gap-2 active:scale-95 transition-all"
                                >
                                    <i className="fas fa-pause text-xs"></i> Interromper Poda
                                </button>
                            </div>
                            
                            <Card className="border-2 border-audit-900 shadow-xl">
                                <Label required>3 Fotos de Depois</Label>
                                <div className="mb-4">
                                    <label className="w-full py-5 rounded-2xl bg-white hover:bg-slate-50 active:scale-[0.98] transition-all text-slate-800 border-2 border-dashed border-slate-300 flex items-center justify-center gap-3 cursor-pointer text-xs font-black uppercase shadow-lg">
                                        <i className="fas fa-camera text-base text-emerald-600"></i>
                                        (Bater ou adicionar 3 fotos de uma vez)
                                        <input 
                                            type="file" 
                                            accept="image/*" 
                                            multiple 
                                            className="hidden" 
                                            onChange={async e => {
                                                const files = Array.from(e.target.files);
                                                if (files.length === 0) return;
                                                if (files.length !== 3) {
                                                    alert("⚠️ SELEÇÃO INCORRETA!\n\nVocê deve escolher EXATAMENTE 3 fotos da galeria (nem mais, nem menos) para atender às exigências de faturamento do contrato.");
                                                    e.target.value = ""; // Reseta o input
                                                    return;
                                                }
                                                
                                                const list = [...(activeAction.photosAfter || [])];
                                                for (let i = 0; i < files.length; i++) {
                                                    const processed = await processPhoto(files[i], `DEPOIS_${i + 1}`);
                                                    list[i] = processed;
                                                }
                                                setActiveAction(prev => ({ ...prev, photosAfter: list }));
                                            }}
                                        />
                                    </label>
                                    <p className="text-[9px] font-bold text-slate-500 uppercase text-center mt-2 tracking-wider">
                                        💡 Dica: As fotos podem ser tiradas com a câmera ou inseridas da galeria em sequência.
                                    </p>
                                </div>

                                <div className="grid grid-cols-3 gap-2 mb-2">
                                    {[0, 1, 2].map(i => (
                                        <PhotoUpload 
                                            key={i} 
                                            label={`F${i + 1}`} 
                                            preview={activeAction.photosAfter?.[i]} 
                                            onCapture={async f => { 
                                                const processed = await processPhoto(f, `DEPOIS_${i + 1}`); 
                                                setActiveAction(prev => { 
                                                    const list = [...(prev.photosAfter || [])]; 
                                                    list[i] = processed; 
                                                    return { ...prev, photosAfter: list }; 
                                                }); 
                                            }} 
                                        />
                                    ))}
                                </div>
                                
                                <button 
                                    disabled={(activeAction.photosAfter?.filter(p => p).length < 3)} 
                                    onClick={async () => {
                                        const now = Date.now();
                                        const execDuration = Math.floor((now - activeAction.executionStartTime) / 1000);
                                        const effectiveDuration = execDuration - (activeAction.totalPausedSeconds || 0);
                                        const coordsStr = activeAction.treeCoords || safeCoords(gps.lat, gps.lng);
                                        
                                        const log = { 
                                            ...activeAction, 
                                            endTime: now, 
                                            durationSec: Math.floor((now - activeAction.startTime) / 1000), 
                                            executionDurationSec: execDuration, 
                                            effectiveDurationSec: effectiveDuration, 
                                            coords: coordsStr, 
                                            lat: coordsStr ? safeFloat(coordsStr.split(',')[0]) : null, 
                                            lng: coordsStr ? safeFloat(coordsStr.split(',')[1]) : null, 
                                            status: 'OK', 
                                            gps_auditoria: activeAction.gps_auditoria || (
                                                gps.lat && gps.lng ? (
                                                    activeAction.endereco && activeAction.endereco.match(/^-?[0-9.]+,\s*-?[0-9.]+$/) ? "GPS OK (OFFLINE)" : "GPS OK (ONLINE)"
                                                ) : (
                                                    gps.status === 'denied' || gps.status === 'error' ? (
                                                        shift.gps_abertura ? "AUDITORIA: GPS DESATIVADO (FALLBACK ABERTURA)" : "AUDITORIA: GPS DESATIVADO (FALLBACK CENTRO PADRAO)"
                                                    ) : "AUDITORIA: SINAL GPS AUSENTE/LENTO (FALLBACK)"
                                                )
                                            ), 
                                            timestamp: new Date().toISOString() 
                                        };
                                        
                                        safeAddLog(log);
                                        
                                        // Remove da fila de pendentes se veio dela
                                        if (activeAction.fromFilaIdx !== undefined) {
                                            setPendingTrees(prev => prev.filter((_, i) => i !== activeAction.fromFilaIdx));
                                        }
                                        
                                        setActiveAction(null); 
                                        setView('dashboard');
                                    }} 
                                    className="w-full mt-4 py-5 rounded-2xl bg-audit-900 text-white font-black uppercase shadow-xl disabled:opacity-50">
                                    Finalizar e Salvar
                                </button>
                            </Card>
                        </div>
                    </div>
                );
            }

            if (view === 'global_pause_form' || view === 'pause_during_tree') {
                const isOther = activeAction?.tempPauseReason === 'Outros';
                
                return (
                    <div className="p-6 screen-fade no-scrollbar flex flex-col min-h-screen bg-slate-50">
                        {/* Header Voltar */}
                        <div className="flex items-center justify-between mb-8">
                            <button 
                                onClick={() => setView(activeAction?.type === 'tree' ? 'active_service' : 'dashboard')} 
                                className="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors border border-slate-100">
                                <i className="fas fa-arrow-left"></i>
                            </button>
                            <div className="text-right">
                                <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter italic">Interrupção</h2>
                                <p className="text-[10px] font-black text-amber-600 uppercase tracking-[0.2em]">Registro de Parada</p>
                            </div>
                        </div>

                        <div className="space-y-6 flex-1">
                            <Card gradient="bg-amber-500">
                                <div className="flex items-center gap-4 py-2">
                                    <div className="w-12 h-12 bg-white/30 rounded-2xl flex items-center justify-center text-slate-900 shadow-inner">
                                        <i className="fas fa-pause text-xl"></i>
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-[11px] font-black text-slate-900 uppercase leading-tight">Motivação da Parada</p>
                                        <p className="text-[8px] font-bold text-amber-900 uppercase tracking-widest mt-1">Sinalize o motivo real da interrupção</p>
                                    </div>
                                </div>
                            </Card>

                            <Card className="bg-white border-2 border-slate-100 shadow-xl p-8 rounded-[2.5rem]">
                                <Label required className="uppercase text-[10px] tracking-widest text-slate-400 mb-4">Selecione o Motivo</Label>
                                <div className="grid grid-cols-1 gap-3">
                                    <select 
                                        className="w-full bg-slate-50 border-2 border-slate-100 p-5 rounded-2xl font-black text-slate-700 uppercase appearance-none focus:ring-2 focus:ring-amber-500 transition-all text-sm" 
                                        value={activeAction?.tempPauseReason || ''} 
                                        onChange={e => setActiveAction({ ...activeAction, tempPauseReason: e.target.value })}>
                                        <option value="">Selecione...</option>
                                        {PAUSE_REASONS.map(r => <option key={r} value={r}>{r}</option>)}
                                    </select>
                                </div>

                                {isOther && (
                                    <div className="mt-6 animate-in fade-in slide-in-from-top-2 duration-300">
                                        <Label required className="uppercase text-[10px] tracking-widest text-slate-400 mb-2">Descreva Detalhadamente</Label>
                                        <textarea 
                                            className="w-full bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl font-black text-slate-700 uppercase focus:ring-2 focus:ring-amber-500 transition-all text-xs" 
                                            rows="4" 
                                            placeholder="MOTIVO DA PARADA..." 
                                            value={activeAction.customPauseReason || ''} 
                                            onChange={e => setActiveAction({ ...activeAction, customPauseReason: e.target.value.toUpperCase() })} 
                                        />
                                    </div>
                                )}
                            </Card>
                        </div>

                        <div className="pt-8 pb-4">
                            <button 
                                disabled={!activeAction?.tempPauseReason || (isOther && !activeAction.customPauseReason)} 
                                onClick={() => {
                                    const now = Date.now(); 
                                    const pauseCoords = safeCoords(gps.lat, gps.lng);
                                    setActiveAction({ 
                                        ...activeAction, 
                                        type: activeAction?.type || 'pause', 
                                        isPaused: true, 
                                        pauseStartTime: now, 
                                        startTime: activeAction?.startTime || now, 
                                        pauseCoords 
                                    });
                                    setPauseElapsed(0); 
                                    setView('active_pause_screen');
                                }} 
                                className="w-full py-6 rounded-[2rem] bg-amber-500 text-slate-900 font-black text-xl uppercase shadow-2xl flex items-center justify-center gap-4 border-b-4 border-amber-700 active:scale-95 transition-all disabled:opacity-50 disabled:grayscale">
                                <i className="fas fa-hand-pause text-xl"></i>
                                Confirmar Pausa
                            </button>
                        </div>
                    </div>
                );
            }

            if (view === 'active_pause_screen') {
                return (
                    <div className="p-6 screen-fade flex flex-col min-h-screen bg-slate-900 text-white no-scrollbar relative overflow-hidden">
                        {/* Background Decals */}
                        <div className="absolute top-[-10%] right-[-10%] w-64 h-64 bg-amber-500/10 rounded-full blur-3xl"></div>
                        <div className="absolute bottom-[-10%] left-[-10%] w-96 h-96 bg-amber-500/5 rounded-full blur-3xl"></div>
                        
                        <div className="text-center mt-16 px-4 z-10">
                            <div className="flex justify-center mb-6">
                                <div className="w-16 h-16 rounded-full bg-amber-500 flex items-center justify-center text-slate-900 shadow-[0_0_30px_rgba(245,158,11,0.4)] animate-pulse">
                                    <i className="fas fa-pause text-2xl"></i>
                                </div>
                            </div>
                            <span className="bg-amber-500/20 text-amber-500 px-4 py-1.5 rounded-full text-[10px] font-black uppercase tracking-[0.2em] border border-amber-500/30">Operação Suspensa</span>
                            <h2 className="text-3xl font-black uppercase mt-8 text-white tracking-tighter leading-tight drop-shadow-lg">
                                {activeAction.tempPauseReason === 'Outros' ? activeAction.customPauseReason : activeAction.tempPauseReason}
                            </h2>
                        </div>

                        <div className="flex-1 flex flex-col justify-center items-center z-10">
                            <div className="text-8xl font-black text-amber-500 pause-glow font-mono tracking-tighter scale-110">
                                {formatDuration(pauseElapsed)}
                            </div>
                            <p className="text-[10px] font-bold text-slate-500 uppercase tracking-[0.3em] mt-8">Tempo Total de Interrupção</p>
                        </div>

                        <div className="mt-auto px-4 pb-12 z-10">
                            <button 
                                onClick={async () => {
                                    const pDur = Math.floor((Date.now() - activeAction.pauseStartTime) / 1000);
                                    const logCoords = activeAction.pauseCoords || safeCoords(gps.lat, gps.lng);
                                    if (activeAction.type === 'pause') {
                                        const log = { 
                                            ...activeAction, 
                                            endTime: Date.now(), 
                                            durationSec: pDur, 
                                            status: 'PAUSA', 
                                            timestamp: new Date().toISOString(), 
                                            coords: logCoords 
                                        };
                                        safeAddLog(log); 
                                        
                                        setActiveAction(null); 
                                        setView('dashboard');
                                    } else {
                                        setActiveAction({ 
                                            ...activeAction, 
                                            isPaused: false, 
                                            totalPausedSeconds: (activeAction.totalPausedSeconds || 0) + pDur 
                                        });
                                        setView('active_service');
                                    }
                                }} 
                                className="w-full bg-emerald-500 text-slate-900 py-7 rounded-[2.5rem] font-black text-2xl uppercase shadow-[0_20px_40px_rgba(16,185,129,0.3)] border-b-4 border-emerald-700 active:scale-95 transition-all flex items-center justify-center gap-4">
                                <i className="fas fa-play text-xl"></i>
                                Retomar Operação
                            </button>
                            <p className="text-center text-[9px] font-bold text-slate-600 uppercase mt-8 tracking-widest">Sinalize o término da parada para retornar ao prontuário</p>
                        </div>
                    </div>
                );
            }

            if (view === 'disposal_form') {
                const isStart = !activeDisposal || activeDisposal.step === 'start';
                
                return (
                    <div className="p-6 screen-fade no-scrollbar flex flex-col min-h-screen bg-slate-50">
                        {/* Header Voltar */}
                        <div className="flex items-center justify-between mb-8">
                            <button 
                                onClick={() => setView('dashboard')} 
                                className="w-12 h-12 rounded-2xl bg-white shadow-sm flex items-center justify-center text-slate-400 hover:text-slate-600 transition-colors border border-slate-100">
                                <i className="fas fa-arrow-left"></i>
                            </button>
                            <div className="text-right">
                                <h2 className="text-xl font-black text-slate-800 uppercase tracking-tighter italic">Destinação</h2>
                                <p className="text-[10px] font-black text-blue-600 uppercase tracking-[0.2em]">{isStart ? 'Início de Carga' : 'Ponto de Descarte'}</p>
                            </div>
                        </div>

                        <div className="space-y-6 flex-1 flex flex-col">
                            <Card gradient="bg-blue-600">
                                <div className="flex items-center gap-4 py-2">
                                    <div className="w-12 h-12 bg-white/20 rounded-2xl flex items-center justify-center text-white shadow-inner">
                                        <i className={`fas ${isStart ? 'fa-truck-loading' : 'fa-truck-ramp-box'} text-xl`}></i>
                                    </div>
                                    <div className="flex-1">
                                        <p className="text-[11px] font-black text-white uppercase leading-tight">
                                            {isStart ? 'Autorizar Início de Transporte' : 'Confirmar Descarregamento'}
                                        </p>
                                        <p className="text-[8px] font-bold text-blue-100 uppercase tracking-widest mt-1">
                                            {isStart ? 'Registe a foto da carga preparada' : 'Registe a foto no local de destino'}
                                        </p>
                                    </div>
                                </div>
                                {!isStart && (
                                    <div className="mt-6 pt-4 border-t border-white/10 flex justify-between items-center">
                                        <span className="text-[8px] font-black text-blue-200 uppercase tracking-widest">Tempo de Percurso</span>
                                        <span className="text-lg font-mono font-black text-white tracking-tighter">{formatDuration(disposalElapsed)}</span>
                                    </div>
                                )}
                            </Card>

                            <Card className="flex-1 min-h-[300px] flex flex-col justify-center bg-white border-2 border-slate-100 shadow-xl overflow-hidden relative">
                                <div className="absolute top-4 left-4 z-10">
                                    <span className="bg-slate-900 text-white px-3 py-1 rounded-full text-[9px] font-black uppercase shadow-lg">Captura Obrigatória</span>
                                </div>
                                <PhotoUpload 
                                    label={isStart ? "FOTO INÍCIAL DA CARGA" : "FOTO FINAL DA DESTINAÇÃO"} 
                                    preview={isStart ? activeDisposal?.photoBefore : activeDisposal?.photoAfter} 
                                    fullWidth
                                    onCapture={async f => { 
                                        const type = isStart ? 'DEST_INICIO' : 'DEST_FIM';
                                        const p = await processPhoto(f, type); 
                                        if (isStart) {
                                            setActiveDisposal({ step: 'start', photoBefore: p, type: 'disposal' }); 
                                        } else {
                                            setActiveDisposal({ ...activeDisposal, photoAfter: p }); 
                                        }
                                    }} 
                                    className="!h-full !border-0 !rounded-0"
                                />
                            </Card>

                            <div className="mt-auto pt-8 pb-4">
                                {isStart ? (
                                    <button 
                                        disabled={!activeDisposal?.photoBefore} 
                                        onClick={() => { 
                                            setActiveDisposal({ ...activeDisposal, step: 'running', startTime: Date.now() }); 
                                            setView('dashboard'); 
                                        }} 
                                        className="w-full py-6 rounded-[2rem] bg-blue-600 text-white font-black text-xl uppercase shadow-2xl flex items-center justify-center gap-4 border-b-4 border-blue-800 active:scale-95 transition-all disabled:opacity-50 disabled:grayscale">
                                        <i className="fas fa-play text-xl"></i>
                                        Iniciar Viagem
                                    </button>
                                ) : (
                                    <button 
                                        disabled={!activeDisposal?.photoAfter} 
                                        onClick={async () => {
                                            const now = Date.now(); 
                                            const dispCoords = safeCoords(gps.lat, gps.lng);
                                            const log = { 
                                                ...activeDisposal, 
                                                endTime: now, 
                                                durationSec: Math.floor((now - activeDisposal.startTime) / 1000), 
                                                coords: dispCoords, 
                                                lat: safeFloat(gps.lat), 
                                                lng: safeFloat(gps.lng), 
                                                status: 'OK', 
                                                timestamp: new Date().toISOString(), 
                                                type: 'disposal' 
                                            };
                                            safeAddLog(log); 
                                            
                                            setActiveDisposal(null); 
                                            setDisposalElapsed(0); 
                                            setView('dashboard');
                                        }} 
                                        className="w-full py-6 rounded-[2.5rem] bg-slate-900 text-emerald-400 font-black text-xl uppercase shadow-2xl flex items-center justify-center gap-4 border-b-4 border-emerald-600 active:scale-95 transition-all disabled:opacity-50 disabled:grayscale">
                                        <i className="fas fa-check-double text-xl"></i>

                                    Baixar Arquivo
                                </button>
                                
                                <button 
                                    onClick={async () => { 
                                        if (navigator.share && navigator.canShare) {
                                            const safeDate = shift?.journeyDate ? shift.journeyDate.split('/').reverse().join('-') : 'HOJE';
                                            const placaSh = (shift?.placa || 'SEM_PLACA').replace(/[^a-zA-Z0-9]/g, '');
                                            const nomeArquivo = `RAD_MCR_${safeDate}_${placaSh}.zip`;
                                            const file = new File([downloadedBlob], nomeArquivo, { type: 'application/zip' });
                                            if (navigator.canShare({ files: [file] })) {
                                                try {
                                                    await navigator.share({
                                                        title: 'RAD Poda - Expediente',
                                                        text: `Segue o arquivo do turno (${nomeArquivo}) para conferência.`,
                                                        files: [file]
                                                    });
                                                    return;
                                                } catch (e) { console.log('Compartilhamento abortado', e); }
                                            } else {
                                                alert("Este celular não permite anexar arquivos diretamente daqui.");
                                            }
                                        } else {
                                            alert("O seu navegador não suporta compartilhamento direto. Aperte em BAIXAR ARQUIVO e envie pelo WhatsApp pela sua galeria/arquivos.");
                                        }
                                    }} 
                                    className="w-full py-4 rounded-xl bg-[#25D366] text-white font-black text-[10px] uppercase shadow-lg shadow-[#25D366]/40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
                                    <i className="fab fa-whatsapp text-2xl"></i>
                                    Compartilhar
                                </button>
                            </div>
                            
                            <button
                                onClick={async () => {
                                    await idbKeyval.clear();
                                    window.location.reload();
                                }} 
                                className="w-full py-4 rounded-xl bg-white text-emerald-700 font-black uppercase shadow-xl hover:scale-105 transition">
                                Iniciar Novo Turno
                            </button>
                        </div>
                    </div>
                );
            }

            if (confirmModal) {
                return (
                    <div className="fixed inset-0 z-[99999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 screen-fade">
                        <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center">
                            <i className="fas fa-exclamation-triangle text-amber-500 text-4xl mb-4"></i>
                            <h3 className="text-lg font-black text-slate-800 uppercase leading-tight mb-2">{confirmModal.title}</h3>
                            <p className="text-sm text-slate-500 mb-8 whitespace-pre-line">{confirmModal.body}</p>
                            <div className="space-y-3">
                                <button onClick={confirmModal.onConfirm} className="w-full bg-audit-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm">
                                    {confirmModal.confirmLabel}
                                </button>
                                <button onClick={confirmModal.onCancel} className="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black uppercase text-xs">
                                    {confirmModal.cancelLabel}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Sistema de Proteção Anti-Cópia
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.keyCode === 123) event.preventDefault(); // F12
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 67 || event.keyCode === 74)) event.preventDefault(); // Control+Shift+I/C/J
            if (event.ctrlKey && event.keyCode === 85) event.preventDefault(); // Control+U
        });
    </script>
</body>
</html>
