        const generateTreeId = (species, cap, lat, lng) => {
            const safeLat = (!lat || isNaN(parseFloat(lat))) ? '0.0000' : parseFloat(lat).toFixed(4);
            const safeLng = (!lng || isNaN(parseFloat(lng))) ? '0.0000' : parseFloat(lng).toFixed(4);
            const normalized = `${species.trim().toUpperCase()}_${parseFloat(cap || 0).toFixed(1)}_${safeLat}_${safeLng}`;
            return CryptoJS.MD5(normalized).toString().substring(0, 12).toUpperCase();

                        const tags = EXIF.getAllTags(this);
                        const conv = (dms, ref) => { if(!dms) return null; let dd = dms[0] + dms[1]/60 + dms[2]/3600; return (ref==="S"||ref==="W") ? -dd : dd; };
                        resolve({ dateTime: tags.DateTimeOriginal || tags.DateTime, lat: conv(tags.GPSLatitude, tags.GPSLatitudeRef), lng: conv(tags.GPSLongitude, tags.GPSLongitudeRef) });
                    });
                });

                // Compression rules that avoid React RAM bloat
                const options = { maxSizeMB: 0.1, maxWidthOrHeight: 1024, useWebWorker: true, initialQuality: 0.7 }; 

                try {
                    const compressedFile = await imageCompression(file, options);
                    const metadata = await getExifData(file);
                    
                    const fileExt = file.name.split('.').pop();
                    const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 9)}.${fileExt}`;
                    const storagePath = `${shift.journeyDate || 'SEM_DATA'}/${shift.placa || 'SEM_PLACA'}/${photoType}/${fileName}`;

                    let base64 = await imageCompression.getDataUrlFromFile(compressedFile);

                    // Watermark
                    const img = new Image();
                    img.src = base64;
                    await new Promise(res => { img.onload = res; });
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width; canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);
                    const fontSize = Math.floor(canvas.width / 35);
                    ctx.font = `bold ${fontSize}px monospace`; 
                    ctx.fillStyle = 'white'; 
                    ctx.strokeStyle = 'black'; 
                    ctx.lineWidth = Math.max(1, fontSize / 8);
                    
                    const dateStr = metadata.dateTime || new Date().toLocaleString('pt-BR');
                    const lat = metadata.lat || gps.lat; 
                    const lng = metadata.lng || gps.lng;
                    const gpsStr = (lat && lng) ? `${parseFloat(lat).toFixed(6)}, ${parseFloat(lng).toFixed(6)}` : "GPS N/A";
                    const text = `${dateStr} | GPS: ${gpsStr}`;
                    ctx.strokeText(text, 20, canvas.height - 25); 
                    ctx.fillText(text, 20, canvas.height - 25);
                    
                    base64 = canvas.toDataURL('image/jpeg', 0.6); // 0.6 para leveza na RAM

                    

                    return {
                        base64: base64, 
                        localPreview: base64, 
                        storagePath: storagePath,
                        publicUrl: base64,
                        metadata: { ...metadata, originalDate: metadata.dateTime, gps_lat: metadata.lat, gps_lng: metadata.lng },
                        capturedAt: new Date().toISOString()
                    };
                }
                catch (e) { alert("Erro processamento img (" + e.message + ")"); return null; }

                            </div>

                const isEmergencia = source === 'emergencia';

                                            <i className={`fas ${f.id === 'emergencia' ? 'fa-bolt' : f.id === 'manutencao' ? 'fa-screwdriver-wrench' : f.id === 'os' ? 'fa-clipboard-list' : 'fa-skull-crossbones'} text-sm`}></i>

                                        <div className="flex items-center gap-2 mb-2">
                                            <i className="fas fa-hashtag text-[8px] text-slate-400"></i>
                                            <Label required={isOsRequired} className="!mb-0">Identificador (OS / PROTOCOLO)</Label>

                                        <input 
                                            className="w-full bg-transparent border-none p-0 focus:ring-0 font-black uppercase text-lg placeholder:text-slate-200" 
                                            placeholder="EX: OS-00000" 
                                            value={activeAction.osId || ''} 
                                            onChange={e => setActiveAction({ ...activeAction, osId: e.target.value.toUpperCase() })} 
                                        />
                                    </div>
                                </div>

                                <div className="space-y-4">
                                    <div>
                                        <div className="flex items-center gap-2 mb-3">
                                            <i className="fas fa-bolt-lightning text-[10px] text-amber-500"></i>
                                            <Label required className="!mb-0">Intervenção na Rede COPEL?</Label>
                                        </div>
                                        <div className="grid grid-cols-2 gap-3">
                                            {['NÃO', 'SIM'].map(opt => (
                                                <button 
                                                    key={opt}
                                                    onClick={() => setActiveAction({ ...activeAction, copelRequired: opt })}
                                                    className={`py-3 rounded-[1.2rem] font-black text-[10px] uppercase border-2 transition-all ${activeAction.copelRequired === opt ? (opt === 'SIM' ? 'bg-amber-500 text-white border-amber-600' : 'bg-slate-900 text-white border-slate-900') : 'bg-white text-slate-300 border-slate-50'}`}>
                                                    {opt === 'SIM' ? 'Sim (Solicitar)' : 'Não Necessário'}
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                            </Card>

                            {/* 2. Serviços e Detalhes */}
                            <Card gradient="bg-audit-600">
                                <div className="flex items-center gap-3 mb-6">
                                    <div className="w-10 h-10 bg-audit-50 rounded-xl flex items-center justify-center text-audit-600">
                                        <i className="fas fa-gears text-sm"></i>
                                    </div>
                                    <Label required className="!mb-0">Serviços a Executar</Label>
                                </div>
                                
                                <div className="space-y-3 mb-6">
                                    {isCorteFixo && (
                                        <div className="flex items-center gap-4 p-5 bg-red-50 border-2 border-red-200 rounded-[2rem] shadow-sm animate-pulse">
                                            <div className="w-12 h-12 bg-red-600 rounded-2xl flex items-center justify-center text-white">
                                                <i className="fas fa-skull text-xl"></i>
                                            </div>
                                            <div className="flex-1">
                                                <p className="font-black text-red-900 uppercase text-xs">Corte Total</p>
                                                <p className="text-[8px] font-bold text-red-600 uppercase">AÇÃO MANDATÓRIA PROTOCOLO</p>
                                            </div>
                                            <div className="w-8 h-8 bg-red-600 rounded-full flex items-center justify-center text-white">
                                                <i className="fas fa-check text-xs"></i>
                                            </div>
                                        </div>
                                    )}

                                    {isEmergencia && (
                                        <div className="grid grid-cols-1 gap-3">
                                            {[
                                                { id: 'PODA EMERGENCIAL', label: 'Poda Emergencial', icon: 'fa-triangle-exclamation', color: 'amber' },
                                                { id: 'CORTE EMERGENCIAL', label: 'Corte Emergencial', icon: 'fa-radiation', color: 'red' }
                                            ].map(t => (
                                                <button 
                                                    key={t.id}
                                                    onClick={() => setActiveAction({ ...activeAction, pruningTypes: [t.id] })}
                                                    className={`p-5 rounded-[2rem] border-2 transition-all flex items-center gap-4 ${activeAction.pruningTypes?.includes(t.id) ? `bg-${t.color}-50 border-${t.color}-200` : 'bg-white border-slate-50'}`}>
                                                    <div className={`w-12 h-12 rounded-2xl flex items-center justify-center text-white shadow-lg ${activeAction.pruningTypes?.includes(t.id) ? `bg-${t.color}-600` : 'bg-slate-200'}`}>
                                                        <i className={`fas ${t.icon} text-lg`}></i>
                                                    </div>
                                                    <div className="text-left flex-1">
                                                        <p className={`font-black uppercase text-xs ${activeAction.pruningTypes?.includes(t.id) ? `text-${t.color}-900` : 'text-slate-400'}`}>{t.label}</p>
                                                        <p className="text-[8px] font-bold text-slate-300 uppercase leading-none mt-1">Acionamento Prioritário</p>
                                                    </div>
                                                    <div className={`w-6 h-6 rounded-full flex items-center justify-center transition-all ${activeAction.pruningTypes?.includes(t.id) ? `bg-${t.color}-600 text-white` : 'text-transparent'}`}>
                                                        <i className="fas fa-check text-[10px]"></i>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    )}

                                    {isPodaRotina && (
                                        <div className="grid grid-cols-1 gap-2">
                                            {TIPOS_PODA_DATA.map(t => (
                                                <button 
                                                    key={t.id}
                                                    onClick={() => { 
                                                        const current = activeAction.pruningTypes || []; 
                                                        setActiveAction({ ...activeAction, pruningTypes: current.includes(t.id) ? current.filter(x => x !== t.id) : [...current, t.id] }); 
                                                    }}
                                                    className={`p-4 rounded-[1.8rem] border-2 transition-all flex items-center gap-4 ${activeAction?.pruningTypes?.includes(t.id) ? 'bg-emerald-50 border-emerald-200' : 'bg-white border-slate-50'}`}>
                                                    <div className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${activeAction?.pruningTypes?.includes(t.id) ? 'bg-audit-600 text-white' : 'bg-slate-50 text-slate-200'}`}>
                                                        <i className="fas fa-leaf text-sm"></i>
                                                    </div>
                                                    <span className={`flex-1 text-[11px] font-black uppercase text-left ${activeAction?.pruningTypes?.includes(t.id) ? 'text-audit-900' : 'text-slate-400'}`}>{t.label}</span>
                                                    <div className={`w-5 h-5 rounded-full flex items-center justify-center border-2 transition-all ${activeAction?.pruningTypes?.includes(t.id) ? 'bg-audit-600 border-audit-600 text-white scale-110' : 'border-slate-100 text-transparent'}`}>
                                                        <i className="fas fa-check text-[8px]"></i>
                                                    </div>
                                                </button>
                                            ))}
                                        </div>
                                    )}
                                </div>

                                <div className="space-y-4">
                                    <div className="bg-slate-50 p-6 rounded-[2rem] border-2 border-slate-100 shadow-inner">
                                        <div className="flex items-center gap-2 mb-4">
                                            <i className="fas fa-tag text-[10px] text-slate-400"></i>
                                            <Label required className="!mb-0 uppercase tracking-widest text-[10px]">Espécie da Árvore</Label>
                                        </div>
                                        <input 
                                            list="especies" 
                                            className="w-full bg-transparent border-none p-0 focus:ring-0 font-black uppercase text-xl placeholder:text-slate-200" 
                                            placeholder="PESQUISAR NOME..." 
                                            value={activeAction.species || ''} 
                                            onChange={e => setActiveAction({ ...activeAction, species: e.target.value.toUpperCase() })} 
                                        />
                                        <datalist id="especies">
                                            {LISTA_ESPECIES.map(s => <option key={s} value={s} />)}
                                        </datalist>
                                    </div>

                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-slate-50 p-6 rounded-[2.2rem] border-2 border-slate-100">
                                            <Label required className="uppercase text-[9px] tracking-widest text-slate-400">CAP (cm)</Label>
                                            <div className="flex items-center gap-2">
                                                <input 
                                                    type="number" 
                                                    className="w-full bg-transparent border-none p-0 focus:ring-0 font-black text-2xl" 
                                                    placeholder="0" 
                                                    value={activeAction.cap || ''} 
                                                    onChange={e => setActiveAction({ ...activeAction, cap: e.target.value })} 
                                                />
                                                <span className="text-slate-300 font-black">cm</span>
                                            </div>
                                        </div>
                                        <div className="bg-slate-50 p-6 rounded-[2.2rem] border-2 border-slate-100">
                                            <Label required className="uppercase text-[9px] tracking-widest text-slate-400">Altura (m)</Label>
                                            <div className="flex items-center gap-2">
                                                <input 
                                                    type="number" 
                                                    className="w-full bg-transparent border-none p-0 focus:ring-0 font-black text-2xl" 
                                                    placeholder="0" 
                                                    value={activeAction.height || ''} 
                                                    onChange={e => setActiveAction({ ...activeAction, height: e.target.value })} 
                                                />
                                                <span className="text-slate-300 font-black">m</span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </Card>

                            {/* 3. Impedimento */}
                            <div 
                                onClick={() => setActiveAction({ ...activeAction, status: activeAction.status === 'IMPEDIDO' ? 'OK' : 'IMPEDIDO' })}
                                className={`p-6 rounded-[2.5rem] border-2 transition-all cursor-pointer group shadow-sm flex items-center gap-5 ${activeAction.status === 'IMPEDIDO' ? 'bg-red-600 border-red-700 text-white shadow-red-200' : 'bg-white border-slate-50 hover:border-red-100'}`}>
                                <div className={`w-12 h-12 rounded-2xl flex items-center justify-center transition-all shadow-md ${activeAction.status === 'IMPEDIDO' ? 'bg-white text-red-600 scale-110 animate-pulse' : 'bg-red-50 text-red-500'}`}>
                                    <i className="fas fa-hand text-lg"></i>
                                </div>
                                <div className="flex-1">
                                    <span className={`text-xs font-black uppercase leading-tight block ${activeAction.status === 'IMPEDIDO' ? 'text-white' : 'text-slate-600'}`}>
                                        Relatar Impedimento Técnico
                                    </span>
                                    <span className={`text-[8px] font-bold uppercase block mt-1 ${activeAction.status === 'IMPEDIDO' ? 'text-red-100' : 'text-slate-300'}`}>
                                        Clique para sinalizar interrupção
                                    </span>
                                </div>
                                <div className={`w-12 h-6 rounded-full p-1 transition-colors relative ${activeAction.status === 'IMPEDIDO' ? 'bg-red-800' : 'bg-slate-100'}`}>
                                    <div className={`w-4 h-4 bg-white rounded-full transition-transform duration-300 shadow-sm ${activeAction.status === 'IMPEDIDO' ? 'translate-x-6' : 'translate-x-0'}`}></div>
                                </div>
                            </div>

                            {activeAction.status === 'IMPEDIDO' && (
                                <div className="space-y-4 animate-in fade-in slide-in-from-top-4 duration-500">
                                    <div className="bg-red-50 p-6 rounded-[2rem] border-2 border-red-200 shadow-inner">
                                        <Label required className="text-red-900 uppercase text-[10px] tracking-widest">Motivo da Paralisação</Label>
                                        <textarea 
                                            className="w-full bg-transparent border-none p-0 focus:ring-0 font-black uppercase text-sm placeholder:text-red-200 mt-2" 
                                            placeholder="DESCREVA DETALHADAMENTE O PROBLEMA..." 
                                            rows="4" 
                                            value={activeAction.problemReport || ''} 
                                            onChange={e => setActiveAction({ ...activeAction, problemReport: e.target.value.toUpperCase() })} 
                                        />
                                    </div>
                                    <div className="bg-white p-6 rounded-[2rem] border-2 border-red-100 shadow-xl">
                                        <div className="flex items-center gap-3 mb-4">
                                            <div className="w-8 h-8 bg-red-600 rounded-xl flex items-center justify-center text-white shadow-lg shadow-red-200">
                                                <i className="fas fa-camera text-xs"></i>
                                            </div>
                                            <Label required className="!mb-0 uppercase text-[10px] tracking-widest text-red-900">Evidência Fotográfica</Label>
                                        </div>
                                        <PhotoUpload 
                                            label="CAPTURAR PROBLEMA" 
                                            preview={activeAction.photoProblem} 
                                            fullWidth
                                            onCapture={async f => setActiveAction({ ...activeAction, photoProblem: await processPhoto(f, 'IMPEDIMENTO') })} 
                                        />
                                    </div>
                                </div>
                            )}

                            {/* 4. Fotos (Antes/Depois) */}
                            {activeAction.status !== 'IMPEDIDO' && (
                                <Card gradient="bg-audit-700">
                                    <div className="flex items-center gap-3 mb-8">
                                        <div className="w-10 h-10 bg-white rounded-xl flex items-center justify-center text-audit-600 shadow-md">
                                            <i className="fas fa-images text-sm"></i>
                                        </div>
                                        <div>
                                            <Label required className="!mb-0 !text-white text-xs">Evidências: ANTES DA EXECUÇÃO</Label>
                                            <p className="text-[8px] font-bold text-audit-200 uppercase tracking-widest">Mínimo 3 fotos obrigatórias</p>
                                        </div>
                                    </div>
                                    
                                    <div className="grid grid-cols-3 gap-3">
                                        {[0, 1, 2].map(i => (
                                            <div key={i} className="group relative">
                                                <div className={`absolute -top-2 -right-2 w-6 h-6 rounded-full flex items-center justify-center text-[10px] font-black z-20 shadow-lg border-2 ${activeAction.photosBefore?.[i] ? 'bg-emerald-500 border-white text-white' : 'bg-slate-100 border-slate-50 text-slate-300'}`}>
                                                    {i + 1}
                                                </div>
                                                <PhotoUpload 
                                                    label={`FOTO ${i + 1}`} 
                                                    preview={activeAction.photosBefore?.[i]} 
                                                    onCapture={async f => { 
                                                        const processed = await processPhoto(f, `ANTES_${i + 1}`); 
                                                        setActiveAction(prev => { 
                                                            const list = [...(prev.photosBefore || [])]; 
                                                            list[i] = processed; 
                                                            return { ...prev, photosBefore: list }; 
                                                        }); 
                                                    }} 
                                                />
                                            </div>
                                        ))}
                                    </div>
                                </Card>
                            )}

                            {/* Botão de Finalização / Ação Principal */}
                            <div className="pt-8">
                                {activeAction.status === 'IMPEDIDO' ? (
                                    <button 
                                        disabled={!activeAction.species || !activeAction.problemReport || !activeAction.photoProblem} 
                                        onClick={async () => {
                                            const treeId = generateTreeId(activeAction.species, activeAction.cap || 0, gps.lat, gps.lng);
                                            const coordsStr = safeCoords(gps.lat, gps.lng);
                                            const now = Date.now();
                                            const log = { 
                                                ...activeAction, 
                                                treeId, 
                                                type: 'tree', 
                                                executionStartTime: now, 
                                                executionDurationSec: 0, 
                                                effectiveDurationSec: 0, 
                                                durationSec: 0, 
                                                formDurationSec: Math.floor((now - (activeAction.startTime || now)) / 1000), 
                                                endTime: now, 
                                                status: 'IMPEDIDO', 
                                                coords: coordsStr, 
                                                lat: safeFloat(gps.lat), 
                                                lng: safeFloat(gps.lng), 
                                                timestamp: new Date().toISOString() 
                                            };
                                            safeAddLog(log);
                                            try {  } catch (e) { console.error('pushToSupabase impedimento:', e); }
                                            setActiveAction(null); 
                                            setView('dashboard');
                                        }} 
                                        className="w-full py-6 rounded-[2rem] bg-red-600 text-white font-black uppercase text-lg shadow-2xl flex items-center justify-center gap-4 transition-all active:scale-95 disabled:grayscale disabled:opacity-50 border-b-4 border-red-800">
                                        <i className="fas fa-hand text-xl"></i>
                                        Registrar Impedimento
                                    </button>
                                ) : (
                                    <button 
                                        disabled={
                                            !activeAction.species || 
                                            !activeAction.cap || 
                                            !activeAction.height || 
                                            (parseFloat(activeAction.cap) < 1 || parseFloat(activeAction.cap) > 2000) || 
                                            (parseFloat(activeAction.height) < 0.5 || parseFloat(activeAction.height) > 60) || 
                                            (!isCorteFixo && !activeAction.pruningTypes?.length) || 
                                            (isOsRequired && !activeAction.osId) || 
                                            (activeAction.photosBefore?.filter(p => p).length < 3)
                                        } 
                                        onClick={() => {
                                            try {
                                                const now = Date.now();
                                                const treeId = generateTreeId(activeAction.species, activeAction.cap, gps.lat, gps.lng);
                                                const coordsStr = safeCoords(gps.lat, gps.lng);
                                                const duplicate = logs.find(l => l.treeId === treeId && l.type === 'tree');
                                                
                                                const proceedWithNew = () => { 
                                                    setActiveAction({ 
                                                        ...activeAction, 
                                                        treeId, 
                                                        type: 'tree', 
                                                        executionStartTime: now, 
                                                        formDurationSec: Math.floor((now - activeAction.startTime) / 1000), 
                                                        desc: `${activeAction.species} [${activeAction.osId || (activeAction.pruningTypes?.[0] || 'MANEJO')}]`, 
                                                        treeCoords: coordsStr, 
                                                        pruningTypes: activeAction.pruningTypes || [] 
                                                    }); 
                                                    setView('active_service'); 
                                                };

                                                if (duplicate) {
                                                    showConfirm('⚠️ Árvore já registada hoje!', `ID: ${treeId}\nEspécie: ${activeAction.species}\n\nO que deseja fazer?`, () => {
                                                        const continuationState = { 
                                                            ...activeAction, 
                                                            ...duplicate, 
                                                            photosBefore: activeAction.photosBefore?.length ? activeAction.photosBefore : duplicate.photosBefore, 
                                                            isContinuation: true, 
                                                            executionStartTime: now, 
                                                            formDurationSec: (duplicate.formDurationSec || 0) + Math.floor((now - activeAction.startTime) / 1000), 
                                                            treeCoords: coordsStr 
                                                        };
                                                        setLogs(logs.filter(l => l.treeId !== treeId));
                                                        setActiveAction(continuationState); 
                                                        setConfirmModal(null); 
                                                        setView('active_service');
                                                    }, () => { 
                                                        setConfirmModal(null); 
                                                        proceedWithNew(); 
                                                    }, 'Continuar Anterior', 'É Outra Igual');
                                                } else {
                                                    proceedWithNew();
                                                }
                                            } catch (err) { alert("ERRO AO INICIAR: " + err.message); }
                                        }} 
                                        className="w-full py-6 rounded-[2.5rem] bg-slate-900 text-emerald-400 font-black uppercase text-lg shadow-2xl flex items-center justify-center gap-4 transition-all active:scale-95 disabled:grayscale disabled:opacity-50 border-b-4 border-emerald-600">
                                        <i className="fas fa-play text-xl"></i>
                                        Iniciar Manejo
                                    </button>
                                )}
                            </div>
                        </div>
                    </div>
                );
            }

            if (view === 'active_service') {
                if (!activeAction) { setTimeout(() => setView('dashboard'), 0); return null; }
                const totalElapsed = elapsed - (activeAction.totalPausedSeconds || 0);
                
                return (
                    <div className="p-6 screen-fade flex flex-col min-h-screen no-scrollbar">
                        <div className="text-center mt-6">
                            <span className="bg-audit-600 text-white px-5 py-1.5 rounded-full text-[10px] font-black uppercase">Em Curso</span>
                            <h2 className="text-xl font-black text-slate-800 uppercase mt-5 leading-tight">{activeAction.desc}</h2>
                            <p className="text-xs text-slate-400 font-mono mt-2">ID: {activeAction.treeId}</p>
                        </div>
                        
                        <div className="flex-1 flex flex-col justify-center items-center">
                            <div className="text-7xl font-black text-slate-900 timer-glow leading-none font-mono tracking-tighter">
                                {formatDuration(totalElapsed)}
                            </div>

                                                l.status,
                                                new Date(l.startTime).toLocaleTimeString(),
                                                l.endTime ? new Date(l.endTime).toLocaleTimeString() : '',
                                                formatHMS(l.durationSec),
                                                formatHMS(l.effectiveDurationSec || l.executionDurationSec),
                                                formatHMS(l.formDurationSec),
                                                formatHMS(l.totalPausedSeconds),
                                                c[0], c[1],
                                                l.endereco || l.location_name || '',
                                                motivoPausa,
                                                obsImpedimento,
                                                l.problemReport || l.desc || ''
                                            ].join(";");
                                        }).join("\n");
                                        zip.file("PLANILHA_ATIVIDADES.csv", "\ufeff" + csvHeader + csvRows);

                                        // Novo arquivo de detalhes do turno EXAUSTIVO para RAM
                                        const stringsTurno = [
                                            ["--- IDENTIFICAÇÃO GERAL ---", ""],
                                            ["DATA", exportShift.journeyDate],
                                            ["HORÁRIO ABERTURA", exportShift.journeyStartTime ? new Date(exportShift.journeyStartTime).toLocaleTimeString() : 'N/A'],
                                            ["OPERADOR PRINCIPAL", exportShift.operador],
                                            ["RESPONSÁVEL CONFERÊNCIA", exportShift.responsavel_empresa || 'N/A'],
                                            ["LOCAL DA OPERAÇÃO", exportShift.bairro_local || 'N/A'],
                                            ["MUNCK (PLACA)", exportShift.placa],
                                            ["APOIO (PLACA)", exportShift.placaAux || 'N/A'],
                                            ["GPS ABERTURA", exportShift.foto_unificada?.coords || 'N/A'],
                                            ["--- EQUIPE OPERACIONAL (RH) ---", ""],
                                            ...(CHECKLIST_RH.map(r => [r.cargo, exportShift.checklist?.[r.id] || 'NÃO INFORMADO'])),
                                            ["--- DIÁLOGO DIÁRIO DE SEGURANÇA (DDS) ---", ""],
                                            ["HORÁRIO DDS", exportShift.horario_dds || 'N/A'],
                                            ...(CHECKLIST_DDS.map(d => [d.tema, exportShift.checklist?.[d.id] ? 'ABORDADO' : 'NÃO MARCADO'])),
                                            ["--- CHECKLIST EQUIPAMENTOS (EPC/LOGÍSTICA) ---", ""],
                                            ...(CHECKLIST_EQUIPAMENTOS.map(e => [e.equip, exportShift.checklist?.[e.id] ? 'CONFIRMADO' : 'NÃO CONFERIDO'])),
                                            ["--- CHECKLIST EPIs ---", ""],
                                            ...(CHECKLIST_EPIS.map(epi => [epi.mat, exportShift.checklist?.[epi.id] ? 'OK' : 'NÃO CONFERIDO'])),
                                            ["--- CHECKLIST DOCUMENTAL ---", ""],
                                            ...(CHECKLIST_DOCUMENTAL.map(doc => [doc.item, exportShift.checklist?.[doc.id] ? 'CONFERIDO' : 'PENDENTE']))
                                        ];
                                        const turnoCSV = stringsTurno.map(row => row.join(";")).join("\n");
                                        zip.file("AUDITORIA_TURNO_RAM.csv", "\ufeff" + turnoCSV);
                                        
                                        try {
                                            if (typeof XLSX !== 'undefined') {
                                                const wb = XLSX.utils.book_new();

                                                // ── ABA 1: ATIVIDADES DE CAMPO ──────────────────────────────
                                                const colsAtiv = ["#","ID ÁRVORE (SISTEMA)","DATA","OPERADOR","PLACA","TIPO","PROTOCOLO / OS","NOME VULGAR","NOME CIENTÍFICO","CAP (cm)","ALTURA (m)","TIPO DE INTERVENÇÃO","STATUS","INÍCIO","FIM","HM TOTAL","HM MANEJO","HM SISTEMA","HM PAUSA","LATITUDE","LONGITUDE","ENDEREÇO","MOTIVO DA PAUSA","DESCRIÇÃO DO IMPEDIMENTO","OBSERVAÇÕES GERAIS"];
                                                const rowsAtiv = exportLogs.map((l, idx) => {
                                                    const c = parseCoords(l.coords);
                                                    const speciesParts = (l.species || 'N/A').split('/');
                                                    const nomeVulgar     = speciesParts[0]?.trim() || l.species || 'N/A';
                                                    const nomeCientifico = speciesParts[1]?.trim() || '';
                                                    const motivoPausa    = l.type === 'pause' ? (l.tempPauseReason === 'Outros' ? (l.customPauseReason || l.pauseReason || 'N/A') : (l.pauseReason || l.tempPauseReason || 'N/A')) : '';
                                                    const obsImpedimento = (l.type === 'tree' && l.status === 'IMPEDIDO') ? (l.problemDesc || l.desc || '') : '';
                                                    const tipoIntervencao = l.type === 'tree' ? ((l.pruningTypes || []).join(" | ") || (l.status === 'IMPEDIDO' ? 'IMPEDIMENTO' : 'ROTINA')) : (l.type === 'pause' ? `PAUSA: ${motivoPausa}` : l.type?.toUpperCase() || '');
                                                    return [
                                                        idx + 1,
                                                        l.treeId || l.id || (l.type === 'tree' ? `ARV_${idx}` : `LOG_${idx}`),
                                                        exportShift.journeyDate,
                                                        exportShift.operador,
                                                        exportShift.placa,
                                                        l.type?.toUpperCase(),
                                                        l.osId || 'ROTINA',
                                                        nomeVulgar,
                                                        nomeCientifico,
                                                        l.cap ? parseFloat(l.cap) : '',
                                                        l.height ? parseFloat(l.height) : '',
                                                        tipoIntervencao,
                                                        l.status,
                                                        l.startTime ? new Date(l.startTime).toLocaleTimeString() : '',
                                                        l.endTime   ? new Date(l.endTime).toLocaleTimeString()   : '',
                                                        formatHMS(l.durationSec),
                                                        formatHMS(l.effectiveDurationSec || l.executionDurationSec),
                                                        formatHMS(l.formDurationSec),
                                                        formatHMS(l.totalPausedSeconds),
                                                        c[0], c[1],
                                                        l.endereco || l.location_name || '',
                                                        motivoPausa,
                                                        obsImpedimento,
                                                        l.problemReport || l.desc || ''
                                                    ];
                                                });
                                                const wsAtividades = XLSX.utils.aoa_to_sheet([colsAtiv, ...rowsAtiv]);
                                                // Largura das colunas
                                                wsAtividades['!cols'] = [6,22,10,18,10,8,14,22,22,8,8,30,12,8,8,10,10,10,10,12,12,30,25,30,30].map(w=>({wch:w}));
                                                XLSX.utils.book_append_sheet(wb, wsAtividades, "Atividades Campo");

                                                // ── ABA 2: AUDITORIA DO TURNO ───────────────────────────────
                                                const wsTurno = XLSX.utils.aoa_to_sheet(stringsTurno);
                                                wsTurno['!cols'] = [{wch:35},{wch:40}];
                                                XLSX.utils.book_append_sheet(wb, wsTurno, "Auditoria Turno");

                                                // ── ABA 3: RESUMO POR ESPÉCIE ───────────────────────────────
                                                const speciesCount = {};
                                                exportLogs.filter(l => l.type === 'tree' && l.status === 'OK').forEach(l => {
                                                    const sp = (l.species || 'N/A').split('/')[0].trim().toUpperCase();
                                                    if (!speciesCount[sp]) speciesCount[sp] = { podas:0, cortes:0, total:0 };
                                                    const isCorte = (l.pruningTypes || []).some(p => p.toLowerCase().includes('supressão') || p.toLowerCase().includes('corte'));
                                                    if (isCorte) speciesCount[sp].cortes++; else speciesCount[sp].podas++;
                                                    speciesCount[sp].total++;
                                                });
                                                const resumoRows = Object.entries(speciesCount)
                                                    .sort((a,b) => b[1].total - a[1].total)
                                                    .map(([sp, v]) => [sp, v.total, v.podas, v.cortes]);
                                                const wsResumo = XLSX.utils.aoa_to_sheet([
                                                    ["ESPÉCIE (NOME VULGAR)","TOTAL","PODAS","CORTES / SUPRESSÃO"],
                                                    ...resumoRows,
                                                    [],
                                                    ["TOTAL GERAL", resumoRows.reduce((s,r)=>s+r[1],0), resumoRows.reduce((s,r)=>s+r[2],0), resumoRows.reduce((s,r)=>s+r[3],0)]
                                                ]);
                                                wsResumo['!cols'] = [{wch:30},{wch:8},{wch:8},{wch:20}];
                                                XLSX.utils.book_append_sheet(wb, wsResumo, "Resumo por Espécie");

                                                const xlsxBuffer = XLSX.write(wb, { bookType: 'xlsx', type: 'array' });
                                                zip.file("RELATORIO_RAD_CONSOLIDADO.xlsx", xlsxBuffer);
                                            }
                                        } catch (errXlsx) { console.error("Falha ao gerar XLSX offline: ", errXlsx); }
                                        
                                        const imgs = zip.folder("EVIDENCIAS");
                                        const getImageData = async (imgObj) => {
                                            if (!imgObj) return null;
                                            const data = imgObj.base64 || imgObj.localPreview;
                                            if (data && data.includes(',')) return data.split(',')[1];
                                            return null;
                                        };

                                        const ddsBase64 = await getImageData({ base64: exportShift.foto_unificada?.base64, dds_image_path: exportShift.dds_image_path });
                                        if (ddsBase64) imgs.file("01_ABERTURA.jpg", ddsBase64, { base64: true });

                                        for (let idx = 0; idx < exportLogs.length; idx++) {
                                            const l = exportLogs[idx];
                                            const pPausa = await getImageData(l.tempPausePhoto); 
                                            if (pPausa) imgs.file(`LOG_${idx}_PAUSA.jpg`, pPausa, { base64: true });
                                            
                                            const pImp = await getImageData(l.photoProblem); 
                                            if (pImp) imgs.file(`LOG_${idx}_IMPEDIMENTO.jpg`, pImp, { base64: true });
                                            
                                            const pDestA = await getImageData(l.photoBefore); 
                                            if (pDestA) imgs.file(`LOG_${idx}_DEST_A.jpg`, pDestA, { base64: true });
                                            
                                            const pDestD = await getImageData(l.photoAfter); 
                                            if (pDestD) imgs.file(`LOG_${idx}_DEST_D.jpg`, pDestD, { base64: true });

                                            if (l.photosBefore) {
                                                for (let i = 0; i < l.photosBefore.length; i++) { 
                                                    const data = await getImageData(l.photosBefore[i]); 
                                                    if (data) imgs.file(`ARV_${idx}_ANTES_${i + 1}.jpg`, data, { base64: true }); 
                                                }
                                            }
                                            if (l.photosAfter) {
                                                for (let i = 0; i < l.photosAfter.length; i++) { 
                                                    const data = await getImageData(l.photosAfter[i]); 
                                                    if (data) imgs.file(`ARV_${idx}_DEPOIS_${i + 1}.jpg`, data, { base64: true }); 
                                                }
                                            }
                                        }

                                        const blob = await zip.generateAsync({ type: "blob", compression: "STORE", streamFiles: true });
                                        
                                        const a = document.createElement("a"); 
                                        a.href = URL.createObjectURL(blob); 
                                        a.download = `RAD_MCR_${journeyDate}.zip`; 
                                        a.click();
                                        
                                        setDownloadedBlob(blob); 
                                        setView('download_confirm');
                                    } catch (e) { alert("Erro ao Gerar ZIP. " + e.message); } finally { setIsExporting(false); }
                                }} 
                                className="w-full py-6 rounded-[2.5rem] bg-slate-900 text-white font-black text-xl shadow-2xl mt-2 uppercase flex items-center justify-center gap-3 disabled:opacity-50 border-b-4 border-slate-700 active:scale-95 transition-all">
                                <i className={isExporting ? "fas fa-spinner fa-spin" : "fas fa-cloud-upload-alt"}></i> 
                                {isExporting ? "ENVIANDO..." : "FINALIZAR E ENVIAR"}
                            </button>
                            
                            <button onClick={() => setView('dashboard')} className="mt-8 text-slate-400 font-black uppercase text-[10px] underline">Voltar</button>
                            <p className="text-[8px] font-bold text-slate-300 mt-6 leading-tight max-w-[200px] mx-auto uppercase tracking-wider opacity-60">© Aplicativo Original<br/>Autor do Sistema: Engenheiro Florestal Thyêgo Nunes Alves Barreto, CREA-PR PE-048841/D</p>
                        </div>
                    </div>
                );
            }

            if (view === 'download_confirm') {
                const hmacSecret = shift?.id_banco || 'MCR_RAD_V21_FALLBACK';
                const safetyHmac = CryptoJS.HmacSHA256('safe', hmacSecret).toString().slice(0, 20);
                localStorage.setItem('mcr_safety_exit', 'safe'); 
                localStorage.setItem('mcr_safety_exit_hmac', safetyHmac);
                
                return (
                    <div className="min-h-screen bg-emerald-600 flex flex-col items-center justify-center p-8 text-center text-white screen-fade">
                        <div className="w-24 h-24 bg-white rounded-full flex items-center justify-center mb-6 shadow-2xl animate-bounce">
                            <i className="fas fa-check text-4xl text-emerald-600"></i>
                        </div>
                        <h1 className="text-4xl font-black mb-2 uppercase">Finalizado!</h1>
                        <p className="font-medium opacity-80 mb-6 max-w-xs mx-auto">O arquivo ZIP contém as fotos e a <b>PLANILHA EXCEL</b> prontas.</p>
                        
                        <div className="bg-white/10 border border-white/20 p-4 rounded-xl mb-6 w-full max-w-sm mx-auto shadow-inner">
                            <p className="text-[9px] font-black uppercase text-emerald-200 flex items-center gap-2 justify-center mb-1"><i className="fas fa-envelope mt-0.5"></i> E-mail de Envio (RAD):</p>
                            <p className="text-sm font-black text-white px-2 py-1 select-all tracking-wide underline decoration-emerald-400/30 underline-offset-4">danieladefreitasmcr@gmail.com</p>
                        </div>
                        <div className="space-y-3 w-full max-w-sm">
                            <div className="grid grid-cols-2 gap-3 mb-4">
                                <button 
                                    onClick={() => { 
                                        const a = document.createElement("a"); 
                                        a.href = URL.createObjectURL(downloadedBlob); 
                                        a.download = shift?.journeyDate ? `RAD_MCR_${shift.journeyDate.split('/').reverse().join('-')}.zip` : `RAD_MCR_REBACKUP.zip`; 
                                        a.click(); 
                                    }} 
                                    className="w-full py-4 rounded-xl bg-white/20 font-black text-[10px] uppercase border border-white/30 flex flex-col items-center justify-center gap-2 hover:bg-white/30 transition-colors">
                                    <i className="fas fa-download text-xl"></i>
                                    Baixar Arquivo
                                </button>
                                
                                <button 
                                    onClick={async () => { 
                                        if (navigator.share && navigator.canShare) {
                                            const safeDate = shift?.journeyDate ? shift.journeyDate.split('/').reverse().join('-') : 'HOJE';
                                            const nomeArquivo = `RAD_MCR_${safeDate}.zip`;
                                            const file = new File([downloadedBlob], nomeArquivo, { type: 'application/zip' });
                                            if (navigator.canShare({ files: [file] })) {
                                                try {
                                                    await navigator.share({
                                                        title: 'RAD Poda - Expediente',
                                                        text: `Segue o arquivo do turno (${nomeArquivo}) para conferência.`,
                                                        files: [file]
                                                    });
                                                    return;
                                                } catch (e) { console.log('Compartilhamento abortado', e); }
                                            } else {
                                                alert("Este celular não permite anexar arquivos diretamente daqui.");
                                            }
                                        } else {
                                            alert("O seu navegador não suporta compartilhamento direto. Aperte em BAIXAR ARQUIVO e envie pelo WhatsApp pela sua galeria/arquivos.");
                                        }
                                    }} 
                                    className="w-full py-4 rounded-xl bg-[#25D366] text-white font-black text-[10px] uppercase shadow-lg shadow-[#25D366]/40 flex flex-col items-center justify-center gap-2 active:scale-95 transition-transform">
                                    <i className="fab fa-whatsapp text-2xl"></i>
                                    Compartilhar
                                </button>
                            </div>
                            
                            <button 
                                onClick={async () => { 
                                    await idbKeyval.clear(); 
                                    localStorage.removeItem('mcr_safety_exit'); 
                                    localStorage.removeItem('mcr_safety_exit_hmac'); 
                                    window.location.reload(); 
                                }} 
                                className="w-full py-4 rounded-xl bg-white text-emerald-700 font-black uppercase shadow-xl hover:scale-105 transition">
                                Iniciar Novo Turno
                            </button>
                        </div>
                    </div>
                );
            }

            if (confirmModal) {
                return (
                    <div className="fixed inset-0 z-[99999] bg-black/70 backdrop-blur-sm flex items-center justify-center p-6 screen-fade">
                        <div className="bg-white w-full max-w-sm rounded-[2rem] p-8 shadow-2xl text-center">
                            <i className="fas fa-exclamation-triangle text-amber-500 text-4xl mb-4"></i>
                            <h3 className="text-lg font-black text-slate-800 uppercase leading-tight mb-2">{confirmModal.title}</h3>
                            <p className="text-sm text-slate-500 mb-8 whitespace-pre-line">{confirmModal.body}</p>
                            <div className="space-y-3">
                                <button onClick={confirmModal.onConfirm} className="w-full bg-audit-900 text-white py-4 rounded-2xl font-black uppercase shadow-lg text-sm">
                                    {confirmModal.confirmLabel}
                                </button>
                                <button onClick={confirmModal.onCancel} className="w-full bg-slate-100 text-slate-500 py-4 rounded-2xl font-black uppercase text-xs">
                                    {confirmModal.cancelLabel}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return null;
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Sistema de Proteção Anti-Cópia
        document.addEventListener('contextmenu', event => event.preventDefault());
        document.addEventListener('keydown', event => {
            if (event.keyCode === 123) event.preventDefault(); // F12
            if (event.ctrlKey && event.shiftKey && (event.keyCode === 73 || event.keyCode === 67 || event.keyCode === 74)) event.preventDefault(); // Control+Shift+I/C/J
            if (event.ctrlKey && event.keyCode === 85) event.preventDefault(); // Control+U
        });
    </script>
</body>
</html>
